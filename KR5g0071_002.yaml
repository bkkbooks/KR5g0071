body:
  text: 唐馬總撰列子八卷天有所短地有所長聖有所否物有所通思士不妻而感思女不夫而孕鬼者歸也歸其真宅真宅太虛也貧者士之常死者民之終醉者墜車雖疾不死死生驚懼不入其胸中禽獸之智亦有與人同者牝牡相偶母子相親避平依險違寒就溫居則有羣行則有列飮則有攜食則鳴侶宋人養猿號曰狙公欲與狙茅先誑之曰朝三而暮四衆狙皆怒又許朝四而暮三而衆狙皆喜聖人以智籠羣愚亦猶狙公以智籠羣狙矣覺有八徴夢有六候陰氣壯則夢涉水而恐懼陽氣壯則夢涉火而燔飽夢與飢夢取藉帶而寢則夢蛇鳥銜髮則夢飛天將陰則夢火身將疾則夢食飲酒者憂歌舞者哭晝想夜夢神形所遇陳大夫云吾國有亢倉子能以耳視而目聽魯侯聞之大驚以上卿禮致之亢倉子曰臣體合于神心合于無顔回能仁而不能反賜能辨而不能訥由能勇而不能怯師能莊而不能同兼四子之有以易仲尼仲尼不許也目將眇者先睹秋毫鼻將窒者先覺燋朽故物不至則不反荆南冥靈以五百歲為春五百歲為秋上古有大椿以八千歲為春八千歲為秋菌芝生于朝死于晦蠓蚋因雨而生見陽而死越東有輒沐國生長子則食之謂之宜弟其大父死則其大母棄之謂之鬼妻孔子東遊見兩小兒辨鬭問其故一兒曰我以日始出去人近日中時去人遠一兒云日初出遠日中時近一兒曰日初出大如車輪及日中如盤盂豈不為近則大遠則小者乎一兒曰日初出蒼蒼凉凉至日中有若探湯豈不為近而遠而凉者乎孔子不能決小兒曰丘誰謂汝多智乎楊朱曰人得百年之壽者千中無一疾病哀苦居其半矣愼耳目之觀聽規死後之餘榮失當年之樂不肆意于一時何異乎纍梏也勤能使益寒能使溫晏子曰吾一死之後豈關我耶焚之亦可沈之亦可之亦可露之亦可棄之溝壑亦可納諸石槨亦可唯所遇耳楊朱曰生民之不得休息為四事故一為壽二為名三為位四為貨有此四者畏畏人畏威畏刑此之謂遁人也人不婚宦情欲失半人不衣食君臣道息出不由門行不從徑也以是求利不亦難乎晉文公欲伐衛公子鋤笑之問其故對曰臣笑臣鄰之人有送妻歸家者道見桑婦悅而與之言顧視其妻巳有人招之公乃引師還未至而有伐其北鄙者孔子之徑能舉國門之關而不肯以力聞狐丘大夫謂孫叔敖曰人有三怨子知之乎爵高者人妒之官大者主惡之祿厚者人怨之孫叔敖曰吾爵益高吾志益下吾官益大吾心益小吾祿益厚吾施益溥可以免乎楊子鄰人亡一羊相率追之岐路之中復有岐矣曰大道以多岐亡羊學者以多方喪生本一末異也人有亡鈇者意鄰子盜之視鄰子行步顔色皆將竊也俄而抇其谷得鈇見鄰子無似竊鈇者齊人有欲得金者淸旦往市適見貨金者因攫奪而去吏捕問之對曰取金之時不見人但見金也莊子十卷水之積也不厚則其大舟也無力至人無己神人無功聖人無名日月出矣而爝火不息其于光也不亦難乎時雨降矣而猶浸灌其于澤也不亦勞乎鷦鷯巢于深林不過一枝偃鼠飮河不過滿腹瞽者無以與乎文章之觀聾者無以與乎鐘鼓之聲豈唯形骸有聾盲哉夫智亦有之不知至言之極妙以為狂而不信此智之聾盲形固可使如槁木心固可使如死取其寂寞無形耳大智間間小智間間其寐也魂交其覺也形開道惡乎隱而有真僞言惡乎隱而有是非此自是而非彼彼亦自是而非此與彼各有一非于體中也案此注今在彼亦一是非此亦一是非下疑本文脫二句也可乎可可于巳者即謂之可不可乎不可不可于巳者即謂之不可六合之外聖人存而不論六合之內聖人論而不議春秋經世先王之志聖人議而不辨不就利不違害夢飮酒者旦而哭泣夢哭泣者旦而畋獵此寤寐之事變也方其夢也不知其夢由此觀之當死之時不知其死而自適其志夢之中又占其夢焉則無以異于寤也覺而後知其夢當所遇無不足也何為方生而憂死哉昔者莊周夢為胡蝶栩栩然胡蝶也自喻適志與不知周也俄然覺則蘧蘧然周也不知周之夢為胡蝶與胡蝶之蘿為莊周與吾生也有涯而知也無涯以有涯隨無涯殆巳以有限之性尋無極之智安得不困哉遁天倍情忘其所受天性所受各有本分不可逃亦不可加也適來夫子時也時自生也適去夫子順也理當死也安時而處順哀樂不能入哀樂生於得失也若任其所受哀樂無所措其間也顔回曰回之家貧唯不飮酒不茹單者數月矣若此則可以為心齊乎曰是祭祀之齊非心齊也回曰敢問心齊仲尼曰若一志無聽之以耳而聽之以心無聽之以心而聽之以氣聽止於耳心止於符氣也者虛而待物也唯道集虛虛者心齊也虛其心則其道集于懷也天下有大戒二其一命也其一義也子之愛親命也不可解於心臣之事君義也無適而非君也無所逃於天地之間顔闔將傅衛靈公太子而問蘧伯玉曰與之無方則危吾國與之有方則危吾身如何小人之性引之制則憎己緃其無度則亂伯玉曰善哉問乎正汝身哉形莫若就心莫若和形不乖逆和而不同就不欲入就者形順入者遂與同也和不欲出和者義淸出者自顯伐也山木自寇也膏火自煎也桂可食故伐之漆可用故割之人皆知有用之用而莫知無用之用有用則與彼為功無用則自全其生人不忘其所忘而忘其所不忘此謂誠忘生則愛之死則棄之故德者世之所不忘也利者理之所不存也故忘形者非忘也不忘形而忘德乃誠忘也古之真人其寢不夢無意想也其覺無憂當所遇而安不知悅生不知惡死與化為體其心志所居而安曰志其容寂雖行而無傷於靜凄然似秋暖然似春殺物非為義也生物非為仁也役人之役適人之適捨己效人殉彼傷義案郭注作殉彼傷我泉涸魚相與處於陸相詬以濕相濡以沫不如相忘於江湖與其不足而相愛豈若有餘而相忘與其譽堯而非桀不如兩忘而化其道忘善惡遺死生與化一者安知堯桀所在耶夫大塊載我以形勞我以生佚我以老息我以死得者時也失者順也所過之時世謂之得時不暫停順往而去世謂之失安時處順哀樂不能入也父母於子東西南北唯命之從陰陽於人不翅為父母也自古或有能違父母之命未有能違陰陽之變而拒晝夜之節也魚相忘於江湖人相忘於道術各自足而相忘天下莫不皆能至人常足故常忘也長於上古而不為老日新也隳肢體黜聰明離形去智同於大通此謂之坐忘至人之用心若鏡不將不迎應而不藏故能勝物而無傷物來則鑒鑒不以心故雖天下來照而無勞心鳧脛雖短續之則憂鶴脛雖長斷之則悲自三代以下天下莫不以物易其性矣小人則以身殉利士則以身殉名大夫則以身殉家聖人則以身殉天下此數者事業不同殉身一也臧與穀二人相與牧羊而俱亡羊問臧奚事則挾策讀書問穀奚事則博塞以遊二人者事不同亡羊均也伯夷死名於首陽之下盜跖死利於東陵之上二人死雖不同其於殘生傷性一也何必伯夷之是而盜跖之非則天下盡殉也彼其所殉仁義也則俗謂之君子其所殉貨財也則俗謂之小人其所殉一也至於殘生損性又惡取君子小人於其間哉夫不自見而見彼不自得而得彼是得人之得而不自得其得也適人之適而不自適其適也雖盜跖伯夷是同為淫僻純朴不殘孰為犧樽白玉不毁孰為圭璋道德不廢安取仁義性情不離安用禮樂夫殘朴以成器工匠之罪也毀道德以成仁義聖人之過也跖之徒問於跖曰盜亦有道乎跖曰夫妄意室中之藏聖也入先勇也出後義也知可否智也分均仁也五者不備而能成盜者天下未之有也五者所以禁盜不為盜資也由是觀之善人不得聖人之道不立跖不得聖人之道不行天下善人少而不善人多則聖人之利天下者少而害天下者多絶聖棄智大盜乃止摘玉毁珠小盜不起焚符破璽而民朴鄙剖斗折衡而民不爭喜怒相疑愚智相欺善否相非誕信相譏而天下衰矣至道之精杳杳冥冥至道之極昏昏默默愼汝內全真也閉汝外守其分也多智為敗智無涯故敗也世俗之人皆喜人之同乎己而惡人之異於己也大人之教若形之於影聲之於響有問而應之盡其所懷子貢教漢陰為圃者作桔橰圃者忿然作色而笑曰夫有機械者必有機事有機事者必有機心機心存乎胸中則純白不備純白不備則神生不定神生不定則道不載吾非不知羞而不為事求可功求成用力少見功多者聖人之道也三人行而一人惑所適者猶可致也惑者少也二人惑則勞而不至惑者多也視而可見者形與色聽而可聞者名與聲悲夫世人以形色名聲為足以得彼之情夫形色名聲果不足以得彼之情也則知者不言言者不知而世豈識之哉夫播糠眯目則天地四方易位矣蚊虻噆膚則通夕不寢外物加之雖小而傷性巳大也鵠不日浴而白烏不日黔而黑自然已各足矣平易恬憺則憂患不能入邪氣不能襲故其德全而神不虧矣不為福先不為禍始感而後應無所倡也迫而後動㑹至乃動不得巳而後起故無天灾無物纍無人非無鬼責其生若浮其死若休喜怒者道之過好惡者德之失一而不變靜之至也靜而一者不可變也不與物交淡之至也物自來耳無交物之情形勞而不休則弊精用而不巳則勞野語有之曰衆人重利廉士重名賢士尚志聖人貴精附之以文益之以博文滅質博溺心古之所謂得志者非軒冕之謂也今之所謂得志者軒冕之謂也軒冕之在身非性命也物之儻來寄也寄之其來不可禦其去不可止故不為軒冕肆志不為窮約趨俗井蛙不可以語於海者拘於墟也夏蟲不可以語於氷者篤於時也曲士不可以語於道者束於教也自細視大者不盡自大視細者不明騏驥驊騮一日而馳千里捕鼠不如狸狌言殊伎也鴟梟夜撮蚤察毫末晝出瞋目而不見丘山言殊性也道無終始物有死生莊子釣於濮水楚王使大夫二人往先焉曰願以境內纍矣莊子持竿不顧曰吾聞楚有神龜死巳三千歲矣王巾笥而藏之廟堂之上此龜者寧其死為留骨而貴乎寧其生而曳尾塗中乎惠子曰子非魚安知魚之樂耶莊子曰子非我安知我不知魚之樂耶惠子曰我非子固不知子矣子固非魚也子之不知魚之樂全矣奚為奚據奚避奚處奚就奚去奚樂奚患擇此八者莫足以活身唯無擇而任其所遇乃全也髑髏曰死無君於上無臣於下亦無四時之事從然以天地為春秋雖南面王樂不能過也莊子不信曰吾使司命復生汝骨肉肌膚反汝父母妻子閭里知識子欲之乎髑髏曰吾安能棄南面王樂而復為人間之勞乎夫畏途者十殺一人則父子兄弟相戒也必盛卒徒而後出焉不亦智乎故人之所畏者袵席之上飲食之間而不知戒者過也十殺一人人大畏之至於色欲之害而莫肯畏之斯愚民也莊子行於山中見大木枝葉茂盛伐木者止其旁而不取問其故曰無所可用莊子曰此木以不材得終其天年出山案出山上原書有夫字釋文夫者夫子謂莊子也藏本有夫子字舍故人之家故人命豎子殺鴈豎子曰其一能鳴其一不能鳴請奚殺主人曰殺不鳴者明日弟子問莊子曰山中之木以不材得終主人之鴈以不材死先生將何處焉莊子曰周將處夫材與不材之間似之而非也故未免乎異木先伐甘泉先竭鳥莫知於鷾鴯其畏人也襲諸人間末有自疏外於人而人存之者畏人而入於人間此鳥所以稱智也舜讓天下於子州支伯子州支伯曰余適有幽憂之病方且治之未暇治天下也春耕種足以勞動秋收斂足以休息能尊生者雖富貴不以養傷身雖貧賤不以利纍形案此下舊訛作王孫子帝王之功聖人之餘事也非所以完身養生也今世俗之君子多危身棄生以殉物豈不悲哉有人於此以隨侯之珠彈千仞之雀世必笑之是何也其以所用者重所要者輕也夫生者豈特隨侯珠之重哉列禦寇不受鄭子陽遺粟曰君非自知我也以人之言而遺我粟至其罪我也又恐以人之言吾所以不受也子貢問原憲先生何病也原憲應之曰吾聞無財之謂貧學而不能行之謂病今憲貧也非病也子貢退有愧色知足者不以利自纍審自得者失之而不懼行修於內者無位而不怍窮於道之謂窮抱仁義之道而遭亂世之患何窮之有智者謀之武者遂之仁者居之古之道也廢上非義也殺民非仁也人比其難我享其利非廉也搖脣鼓舌擅生是非好面譽人者亦好背而毀之也湯放其主武王殺紂自是之後以強凌弱以衆暴寡湯武以來皆亂人之徒也人之情目欲視色耳欲聽聲口欲察味志氣欲盈人上夀百歲中夀八十下壽六十除病瘦死鶡冠子三卷案書闕舊不標目今依録補之王孫子一卷案書闕諸本誤以莊子雜篇繫其下今正之申子三卷劉向云申子名不害河東人鄭時賤臣挾術以干韓昭侯秦兵不敢至學本黃老急刻無恩非霸王之事三寸之篋運而天下定六寸之基正而天下治妒妻不難破家亂臣不難破國一妻擅夫衆妻皆亂一臣專君羣臣皆蔽智均不相使力均不相勝鼓不預五音而為五音主百世有聖人猶隨踵千里有賢人是比肩愼子十二卷名到學本黃老滕輔注小人食于力君子食于道詩往志也書往誥也春秋往事也愛赤子不慢其保絶險者不慢其御措鈞石使禹察之不能識也懸於權衡則毫髮辨矣兩貴不相事兩賤不相使家富則疏族聚家貧則兄弟離非不相愛利不足相容也不聰不明不能為王不瞽不聾不能為公海與山爭水海必得之有權衡者不可欺以輕重有尺寸者不可差以長短有法度者不可巧以詐僞一兔走百人追之積於市過而不顧非不欲分定不可爭也孝子不生慈父之家忠臣不生聖君之下六親不和有孝慈國家昏亂有忠臣六親不和二句一本作正文案二句出老子長短經反經篇引之入注中匠人成棺不憎人死利之所在忘其醜也廊廟之材非一木之枝狐白之裘非一狐之腋藏甲之國必有兵遁有意者必先作具市人可驅而戰安國之兵不由忿起燕丹子三卷丹者燕王喜之子身質于秦始皇之世案此下當有闕文丈夫恥于受辱貞女羞于節虧田光云血勇怒而面赤脈勇怒而面靑骨勇怒而面白光知荆軻者神勇也怒而不變荆軻之燕謂太子曰光揣太子高行厲天美聲盈耳軻出衛都望燕路歷險不以勤望遠不以遐今太子禮之以舊故之恩接之以新人之敬所以不復讓者信知己故也軻曰太子若以燕當秦猶以羊捕狼軻乃請樊於期曰將軍得罪於秦父母妻子皆見焚軻為將軍痛之今願得將軍之首與燕督亢地圖進之秦王必喜喜必見軻軻因左手把其袖右手揕丁鴆切其胸數以燕之罪責以將軍之讐於期執刀自刎頭墜背後兩目不瞑太子聞之伏尸而哭函盛於期首與燕督亢地圖以獻秦武陽為副軻不擇日而發太子賔客皆素衣冠送之易水之上軻起為壽歌曰風蕭蕭兮易水寒壯士一去兮不復還高漸離擊筑宋意和之為壯聲則髮怒衝冠作哀歌則士皆流涕二人皆升車終巳不顧也軻至咸陽秦王大喜陛㦸見荆軻軻捧樊於期首柙并地圖以次進羣臣皆呼萬歲秦武陽大恐荆軻顧笑武陽前謝曰北蕃蠻夷之鄙人未見天子願陛下少假借之使得畢事於前秦王曰軻起督亢圖進之荆軻發圖圖窮而匕首見因左手把秦王袖右手揕其胸數之曰從我計則生不從則死秦王曰乞聽琴聲而死召姬人鼓琴琴聲曰羅縠單衣可掣而絶八尺屛風可超而越轆轤之劎可負而拔軻不解音秦王從琴聲劒拔之秦王斷軻兩手軻因倚柱而笑箕踞而罵曰吾為豎子所欺事不濟也谷子五卷樂氏注名臺總按其序云周時有豪士隱者居谷自號谷先生無鄉里族姓名字此蘇秦作書記之也鬼之言遠猶司馬相如假無是公云爾自古及今其道一也變化無窮各有所歸或隂或陽或柔或剛或開或間或弛或張是以聖人守司其門戶審察其先後口者心之門戶智謀皆從之出或遙聞而相思或前進而不御世無常貴事無常師抱薪赴火燥者先燃平地注水濕者先濡此相應也智者不用其所短而用愚人之所長也不用其所拙而用愚人之所工也牆壞於有木毁於有節人動我靜人言我聽能固能去在我而問知性則寡纍知命則不憂憂纍去則心平心平而仁義著矣以德養民猶草木之得時以仁化人猶天生草木以雨潤澤之尹文子二卷劉歆注案歆奏七略不聞注尹文子疑有訛序云文子出於周之尹氏齊宣王時居稷下余黃初末始到京師繆熙伯以此書見示聊定之此仲長統序文案統卒于漢獻帝延康元年則安得于魏黃未定此書恐序出僞託名有三科一曰命物之名方圓黑白是也二曰毀譽之名善惡貴賤是也三曰況謂之名賢愚愛憎是也法有四呈一曰不變之法君臣上下是也二曰齊等之法能鄙同異是也三曰理衆之法慶賞刑罰是也四曰平準之法律度權量是也有理而無益於治者君子不言有能而無益於事者君子不為工倕不貴獨巧貴與衆共巧今世之人行欲獨賢事欲獨能辨欲出羣勇欲絶衆田駢曰天下之士莫肯處其門庭臣其妻子必遊宦諸侯之朝名利引之也彭曰雉兔在野衆皆逐之分未定也雞豕滿市莫有志者分定故也兩智不能相使兩貴不能相臨兩辨不能相屈力均敵故也專用聰明則功不成專用晦昧則事必悖一明一晦衆之所載祿薄者不可與經亂賞輕者不可與入難處上者不可不慎也尹文子見宣王宣王不言而歎尹文子曰何歎王曰吾歎國中寡賢尹文子曰國中悉賢誰處王下誰為王使人有字長子曰盜少子曰毆盜出行其父在後追而呼之曰盜盜吏聞因而縳之其父呼毆喻吏遽而聲不轉但言毆毆吏因而毆之幾至於死公孫文子一卷案文當作尼王應麟漢藝文志考證洪邁容齊續筆及太平御覽初學記隋書音樂志所援引可據心者衆智之要物皆求於心修心而不知命猶無室而歸君子行善必有報小人行不善必有報樂者先王所以飾喜也軍旅者先王所以飾怒也舟從流於河而無維楫求安不可得也人有三百六十節當天之數形體有骨肉如地之厚有孔竅血脈如川谷也多食甘者有益於肉而骨不利多食苦者有益於骨而筋不利多食辛者有益於筋而氣不利陸賈新語二卷太中大夫陸賈也陽出雷電陰成雪霜善言古者合之於今能述遠者考之於近道為智者設馬為御者良賢為聖者用辨為智者通秦以刑罰為巢故有覆巢破卵之患文公種米曾子枷羊智者所短不如愚者所長案枷原書作駕淮南子注連枷所以備之舊訛牧今從藝文聚近河之地濕近山之木長山出雲而丘阜生氣四瀆東流而百川無西衆口毁譽浮石沈木羣邪相抑以為曲犬不夜吠雞不夜鳴家若無聲官府若無事亭落若無人閭里不訟耆老不愁君子之治也玉斗酌酒金碗刻鏤所以夸小人非厚己也朝錯新書三卷高皇帝不用同姓為親故能以誅暴亂令之所加莫不從兵之所誅莫不服呂后專制社稷不傾若髮漢書云如帶公羊云如線案漢書云如帶十字疑是小注善為政者士實於朝野牛馬實於陸鳥獸實於林上及飛鳥下及蟲魚載之如地包之如海陛下之地東西盡冠蓋之民南北極寒暑之和胸奴不得當一縣號令不時命曰傷天焚林斬木不時命曰傷地斷獄立刑不當命曰傷人賈誼新書八卷寒者利裋褐飢者甘糟糠秦二世立天下莫不引領而觀其政是故勞民易為政也主之與臣若日與星貴之與賤若白與黑如身之使臂臂之使指天子如堂羣臣如陛衆庶如地若經制不定猶渡江無維楫也中流遇風波船必覆矣採銅者棄其田疇家鑄者損其農事建武函谷臨晉三關以備山東諸侯也不如定地勢使無可備天下一通也與正人居不能無正人也猶生長於楚不能無楚語志有四興朝廷之志淸以嚴祭祀之志思以和軍旅之志精以厲喪紀之志憂以愁言有四術敬以正朝廷之言和以序祭祀之言併聲氣軍旅之言悲不足喪紀之言翟王使使至楚楚王誇使者以章華之臺臺甚高三休乃至楚王曰翟國亦有此臺乎對曰翟王茅茨不翦綵椽不刻猶以為作之者勞居之者佚楚王大怍吕氏春秋二十六卷靡曼皓齒鄭衛之音伐命之斧肥肉厚酒爛腸之食雷則掩耳電則掩目耳聞所惡不如不聞目見所惡不如無見强令之則不樂强令之哭則不悲不由中心也流水不腐戶樞不蠧動也形氣亦然水泉東流日夜不休上不竭下不滿案滿當作漏耳有所聞不學而不如聾目有所見不學而不如盲戎人生乎楚楚人生乎戎則楚人戎言戎人楚言亡國之主則可化成賢主也櫻桃為鳥所含故曰含桃案此係羞以含桃下高誘注文勇凶德兵凶器今有利劍刺則不中擊則不及與惡劍無異也水出於山而歸於海非惡山而欲海高下使然也人謂兔絲無根其根不連屬耳茯苓是也磁石召針皆相引猶聖人南面而立則天下莫不延頸周文王使人相案疑抇字之訛即古掘字地得枯骨令吏衣冠葬之天下聞之曰文王賢矣澤及於枯骨齊人好勇者其一人居東郭一人居西郭卒然相遇飮酒曰酒須肉乎各抽刀自割相啖遂至於死石可破不可奪堅丹可磨不可奪赤性受於天也魯有醜者其父出見美者商咄反而告其鄰曰商咄不如吾子也是至美不如至惡愛子不知其醜也人有臭者其親戚兄弟妻妾知識無能與居者自屏於海海上有人悅其臭者晝夜隨之不離也趙襄子攻翟勝方飮而有憂色曰江河之大不過三日一朝而下翟勝兩城亡將及我矣孔子聞之曰憂所以昌喜所以亡管仲為魯所縛檻車載之使役人送于齊皆謳歌而引車管仲恐魯悔而止之又欲速至齊國謂役人曰我為汝唱汝和我也役人不倦取道甚速管仲可謂能因矣因役人用勢欲走乃為歌唱勸令走也有道之士貴以近知遠以今知古以所見知所不見故審堂下之陰而知日月之行見瓶水之冰知天下之寒嘗一臠之肉知一鑊之味有人方且過江引嬰兒欲投於水人問其故對曰其父善游其父雖善游其子未必能邪楚國之政有似如此不如吾者吾不與處與我齊者吾不與處無益我也周旦云君子屈於不知己而伸於知己穴深一尋則人臂不及智亦有不至者樂羊伐中山歸而有責功之色魏文侯以謗書兩篋示之樂羊北面再拜曰一寸之書亦亡何須兩篋人驥俱走則人不勝驥居於車上則驥不勝人猶人主爭官事與驥俱走無異也目之見也藉於照心之智也藉於理無骨之蟲不可令知氷春生秋死不知冬氷十里之間耳不能聞帷牆之外目不能見三畝之間心不能知而欲東至開悟南撫多鷃案原作西服壽靡北懷儋耳何以得哉四極之國名管夷吾百里奚霸王之船驥絶江者託於船致遠者託於驥楚王問詹何治國之道對曰何聞治身不聞治國國之本在身也詹何隱者管仲曰君子有三色歡然喜樂者鐘鼓之色愀然淸淨者縗絰之色沸然充盈者兵革之色洧水大有富人溺者有人得富者尸請贖而求金甚多富人黨以告鄧㭊㭊曰但安之必無買此者得尸者患其不贖又告鄧㭊㭊曰但安之必無人更賣義必無不贖案原書無末句疑是注文言不欺心言所以喻心言心相離則不祥也以繩墨取木則宮室不成材難得也引其紀萬目起引其綱萬目張治民如此也決積水於千仞之溪誰能當者戎夷去齊往魯天大寒與弟子一人宿於郭外寒轉甚謂其弟子曰可以衣活我我國士也天下所惜子不肖也不足惜也弟子曰不肖人安能與國士衣乎戎夷歎息乃解衣與弟子戎夷至夜半而死弟子乃活晏子遭崔杼之患援綏而乘其僕將馳晏子曰安之疾不必生徐不必死鹿生於山命懸於廚今晏命有所懸矣以龍致雨以形逐影同則相召氣同則相合聲比則相應故鼓宮宮應鼓角角動王德不通民欲不達此國之鬱也樹鬱則蠧水鬱則汙國鬱則萬灾聚矣天為高矣日月星長雲氣雨露未嘗休也地為大矣水泉草木毛羽裸鱗未嘗息也冠所以飾頭衣所以飾身今人斷首以易冠殺身以易衣則不知所為矣世之趨利似此亦不知所為也黃帝之貴亦死堯舜之賢亦死孟賁之勇亦死相玉者患石似玉相劍者患劍似吳干將賢主患辨者似通人亡國之主似智亡國之臣似忠子夏過衛有讀史記者曰晉師三豕渡河子夏曰非也是巳亥得十良馬不如得一伯樂得十良劍不如得一歐冶得地千里不如得一賢人夏不衣裘非不愛裘也暖有餘冬不用䈉非不愛䈉也清有餘火燭一隅則半室無光骨節早成身必不長吕不韋始皇時相國乃集儒士為十二紀八覽六論曝於咸陽市有能增損一字與千金無敢易者十二紀之禮此不抄淮南子二十二卷以湯沃沸亂乃愈甚猶鞭噬狗捶踶馬而欲教之雖伊尹造父不能化故體道者逸而不窮任數者勞而無功色者白立而五色成道者一立而萬物成聾者學歌無以自樂夫內心不開而强學問如聾者效歌出於口越而散矣冰迎春則釋為水水向冬則凝為冰以道為竿以德為綸禮樂為鈎仁義為餌投之江浮之海萬物皆得歷陽之都一夕成湖歷陽淮南縣也有一人告歷陽母曰見城門有血則有走無顧此後門吏故汚血於門限母便上北山縣果陷水中母遂化作石也案高誘注無母化石句越舼蜀艇不能無水而浮烏號弓溪子弩不能無而射人主誅暴則多飄風法苛則多蟲螟殺不辜則多赤地令不時則多淫雨南方有不死之草北方有不釋之冰食水者善浮而耐寒魚屬也食土者無心而惠蚯蚓是也食木者多力而熊羆是也食草者善走而愚糜鹿是也食桑者有絲而蛾蠶是也食肉者勇敢而悍虎豹是也食氣者神明而壽蛇之王喬赤松是也食榖者智慧而天人是也晝生者父莫生者似母勇士一人為三軍雄聖人若鏡不將不迎應而不藏乞火不若取燧寄汲不如鑿井譬羿請不死之藥于西王母姮娥竊而食之不知不死之藥所由生也生有七尺之形死為一棺之土安知喜憎利害耶天地雖大可以矩表知之星月之行可以律歷知之倉頡作字天雨粟鬼夜哭倉頡黃帝史臣也造文字則詐僞生故鬼哭也今執政者薄德增刑有似執彈而欲來鳥揮梲而欲狎犬揮梲挾杖也木擊折軸水戾破舟不怨木石而罪巧拙何也智有不周債少者易償職寡者易守文王智而好問故聖武王勇而好問故勝力勝其任則舉之者不重智能其事則為之者不難風疾而波興木茂而鳥集相生之勢也天下之物莫凶於溪毒良醫藏之有所用也草莽猶不可棄況復人乎溪毒附子也假輿馬者足不勞而致千里乘舟楫者不假游而絶江海譬智不任己才力十圍之木能持千鈞之屋五寸之楗能制開闔之門非材有巨細所居要耳使孔墨為天下天下盡儒墨得其要也聖人之道若中衢置樽過者斟酌雖多少不同而各得其宜也衢六通樽酒樽慈父愛子聖王養民火自若冰自寒性使然也及其用力賴其功如失火舟中矣同心救火也車無三寸轄則不可馳戶無五寸楗則不可閉故君子所須要也三月嬰兒未知利害而慈母愛焉情也治國者若設網引其綱萬目張多欲虧義多憂害智多懼妨勇虎豹以文彩來射猿狖以捷來刺故子路以勇死萇以智困治國者若張琴瑟大䋎小絶䋎音綻急也吹而欲無眯涉水而欲無濡不可得也廣厦宏屋連闥通房人所安也鳥入之而憂深林藂薄人入之而畏鳥入之則安深溪峭岸峻木尋枝猿狖所樂人則栗也翻棊丸於地圓者走澤方者處高戴哀者聞歌而泣戴樂者見哭則笑强戚者雖哭不哀强歡者雖笑不樂芻狗士龍始成則衣以綺繡及其用畢則棄之土壤芻狗事以謝過土龍事以請雨稟道通物所為各異得道一也猶屠牛而烹其肉或甘劑萬方本一牛也伐豫章或為棺槨或為梁柱亦一木也蕭條者形之君寂寞者音之主客有見子賤子賤曰客獨有三過望我而笑是慢也交淺而言深是患藏本作亂也語不稱名原作師是反也賓答曰望君而公也語不稱師通也交淺而言深志也客一體耳或以為君子或以為小人此視之異也待騕裊飛而駕之則世莫有乘者待毛嬙西施而配之則終身無家矣待古英俊而用之則無人矣驥千里一日而通駑馬十駕旬日亦至猶人才不足專恃鳥窮則啄獸窮則觸人窮則詐峻刑嚴法不可以禁姧道德之論譬如日月江南河北不能易其指馳騖千里不能改其處趣舍禮俗猶宅之居也東家謂之西西家謂之東扣門求火無不與者饒足也故林中不貨薪湖上不鬻魚者有餘也叔向云不乘人之利不迫人之險墨者田鳩欲見秦惠王三年不得見一至楚楚王悅之物固有近之而遠遠之而近故大人之行不可掩以繩未得獸者惟恐創少已得惟恐創多古人婚禮不稱主人必稱父母兄弟案句是注文原作諸父兄師友舜不告瞽叟而娶非禮立子以長文王舍伯邑考非制禮三十而家文王十六而生武王非法治國有常利民為本政教有經令行為上苟利于民不必法古苟周於事不必循常法度制令各因其宜變古未可非循俗不足多百川異源皆歸於海百家異業皆務於治盲者行于道人謂左則左謂右則右遇君子則得其平易遇小人則陷於溝壑東面而望不見西牆南向而視不覩北方唯無向者無所不通也父溺則攬父髮而拯之非敢驕侮以救死也至賞不費至刑不濫楚人乘船遇風波至而恐死自投于水中非不貴生畏死惑於畏死而反忘生也人之嗜欲亦復如此溜藏本作霤水足以溢壺榼江河不能滿漏巵醉者超江淮以為尋常之溝俯入城門以為七尺之閨酒濁其神也馬免人於難者死葬之以蓋之以衾牛有德於人葬之以大車用兵之道示之以柔乘之以剛示之以弱乘之以强若欲西者示之以東使知吾所出而不知吾所入鬼無跡水無創若電之激不可備也高城深池矢石如雨廣澤平原白刃交接士卒爭先者為其賞信罰明也古之善將者暑不張蓋寒不被裘所以程寒暑也軍通井而後飮軍食熟而後食所以同饑渴也合戰必立矢石所及之處所以同安危也天下莫相憎於膠漆膠漆相賊膠漆相抱不得還其本也天下莫相愛於冰炭冰炭相息冰得炭則解故得歸其木也蘭生幽谷不為莫服而不芳舟在江河不為莫乘而不浮人有嫁其女者教之曰愼無為善女問其故曰善尚不為況不善乎拘囹圄者患曰長當死市者患日短嫁女於消渴者夫死則言女妨案句參注文狐白之裘天子被之為狐計者不如走澤先針而後縷可以成帷先縷而後針不可以成衣因媒而嫁不因媒而成因人而交不因人而親君子不容非日月不應非氣被羊裘而賃顧其事過也衣貂裘而籠甚可怪也非禮為禮譬裸而追狂人盜而與乞者竊簡寫法律蹲踞誦詩書馬似鹿者千金天下無千金之鹿畫孟賁之目大而不可畏畫西施之面美面不可悅同汚無異塗衆曲不容衆枉不容正故人衆則食狼狼衆則食人郢人買屋棟與之車轂大雖可而長不足孕婦見則子缺脣文公棄衽席咎犯辭歸晉文公棄席之黑者捐故舊也故咎犯辭去知天將赦而多殺人或知天赦而多活人其望赦同刑罪異也侏儒問天高於長人長人曰吾不知也曰爾去天近于我也問事當問近者郢人自賣其母而語買者曰此母老矣望善飴之此大不義而欲為小義佳人不同體美人不同面而皆悅於目梨橘棗栗不同味皆調於口一棊不足以見智一不足以見悲遺腹子不思父無愛心也案原作無貌於心也湯沐具而蟻蝨相弔大厦成而燕雀相賀釣者靜之網者動之罩者抑之罾者舉之為道異得魚一也屠者食籗羮為車者多步行陶人用缺盆匠人居狹廬田中之水流入海附耳之語聞千里中夏用䈉至冬不去舉衣過水至陸不下此不知變也靨䩉在頰則好在顙則醜繡為被則宜為冠則穢案原書穢作譏注人非之也山雲蒸柱礎潤茯苓抽絲死絲無根而生蛇無足而行魚無耳而聽蟬無口而鳴鶴千歲極其樂蜉蝣朝生暮死亦盡其樂林木茂而斧斤入質的張而弓矢集明珠蚌之病也我之利也舟覆乃見善游馬奔乃見良馭百星之明不如一月之光十牖之開不如一戶之明披蓑救火鑿瀆止水乃益多也狂人傷人莫之怨嬰兒詈老莫之疾無心也鴻鵠在卵也一指蔑之則破及其羽翅成也背靑天膺摩赤霄哺且豫不能得也㦸以攻城鏡以照形宮人得㦸則以刈葵盲人得鏡則以蓋巵堯八眉眉理八字也楚人有烹狙召鄰鄰者以為狗羮食甚美後聞其狙據地吐之未始知味也邯鄲有吹者託名李奇人爭學之後知其非皆棄其曲未始知音也李奇趙之善音者原蠶一歲再熟非不利也王法禁之為其殘葉離先稻熟農夫耨之不以小利傷大穫也稻米落地而生曰離稻意林卷二
