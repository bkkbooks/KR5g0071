body:
  text: 意林卷一唐馬總鬻子一卷藝文志云名熊著子十二篇今一卷六篇發政施令為天下福謂之道上下相親謂之和不求而得謂之信除天下之害謂之仁信而能和者帝王之器聖王在位百里有一士猶無有也王道衰千里一士則猶比肩也知善不信謂之狂知惡不改謂之惑昔文王見鬻子年九十文王曰嘻老矣鬻子曰若使臣捕虎逐麋臣巳老矣坐策國事臣年尚少太公金匱二卷武王問太公曰殷巳亡其三人今可伐乎太公曰臣聞之知天者不怨天知己者不怨人先謀後事者昌先事後謀者亡且天與不取反受其咎時至不行反受其殃非時而生是為妄成故夏條可結冬氷可釋時難得而易失也武王平殷還問太公曰今民吏未安賢者未定如何太公曰無故無新如天如地得殷之財與殷之民共之則商得其賈農得其田也一目視則不明一耳聽則不聰一足步則不行選賢自代上下各得其所武王問五帝之戒可得聞乎太公曰黃帝云豫在民上搖搖恐夕不至朝故金人三緘其口愼言語也堯居民上振振如臨深淵舜居民上兢兢如履薄氷禹居民上栗栗如恐不滿湯居民上翼翼懼不敢息道自微而生禍自微而成愼終與始完如金城行必慮正無懷僥幸書履忍之須臾乃全汝軀書鋒刀利皚皚無為汝開書刀源泉滑滑連旱則絶取事有常賦斂有節書井太公六韜六卷文王曰君務舉賢不獲其功何也太公曰舉而不用是有求賢之名而無用賢之實也文王曰舉賢若何太公曰按賢察名選才考能名實俱得之也文王曰國君失民者何也太公曰不愼所與也君有六守三寶六守者仁義忠信勇謀三寶者農工商六守長則君安三寶完則國昌國柄借人則失其威淵乎無端孰知其源涓涓不塞將成江河兩葉不去將用斧柯熒熒不救炎炎奈何天下非一人天下天下之天下也取天下者若逐野鹿而天下共分其肉太公云伏羲神農教而不誅黃帝堯舜誅而不怒聖人恭天靜地和人敬鬼文王在岐召太公曰吾地小奈何太公曰天下有粟賢者食之天下有民賢者牧之屈一人下伸萬人上惟聖人能行之冠雖敝加于首履雖新履于地武王問太公曰士高下有差乎太公曰人有九差惡口舌為衆所憎夜卧早起此妻子之將知人飢渴習人劇易此萬人之將戰戰栗栗日愼一日此十萬之將知天文悉地理理四海如妻子此天下之將軍中之事不聞君命武王問太公曰吾欲令三軍親其將如父母攻城則爭先登野戰則爭先赴聞金聲而怒聞鼓音而喜可乎太公曰作將冬日不服裘夏日不操扇天雨不張蓋幔出隘塞過泥塗將先下步軍未舉火將不食士非好死而樂傷其將知飢寒勞苦也用兵之害猶豫最大赴之若驚用之若狂當之者破近之者亡使如疾雷不暇掩耳也貧窮忿怒欲決其志者名曰必死之士辨言巧辭善毁善譽者名曰間諜飛言之士曾子二卷君子愛日以學及時而成難者不避易者不從旦就業夕自省可謂守業年三十四十無藝則無藝矣至五十不以善聞則無聞矣鄙夫鄙婦相會于牆之陰可謂密矣明日或有知之故士執仁與義莫不聞也蓬生麻中不扶自白沙在涅與之皆黑君子之遊苾乎如入蘭芷之室久而不聞則與之化矣小人之遊戲乎如入鮑魚之室久而不聞則亦化矣故君子愼其去就也與君子遊如日之長加益不自知也與小人遊如履薄冰幾何而不行陷乎天圓地方則是四角不掩也聞之夫子曰天道曰圓地道曰方晏子八卷景公作臺臺成復欲作鍾晏子諫曰斂民作鍾民必哀斂哀以謀樂不祥景公嬖妾死名曰嬰子公守之三日不食膚著于席而不去晏子曰外有良醫將作神之事公信之屏而沭浴晏子令棺入殮死者公大怒晏子曰巳死不復生公乃止仲尼聞之曰星之昭昭不如日月之靉靉景公時雨雪三日被狐白之裘坐于堂側謂晏子曰三日雨雪天下何不寒晏子曰夫賢君飽則知人飢溫則知人寒公乃去裘冠足以修敬不務其飾衣足以掩形不務其美土事不文木事不鏤足以示民也景公曰吾欲霸諸侯若何晏子曰官未具也臣聞仲尼處陋巷廉隅不正則原憲侍志意不通則仲由侍德不辱案德不辱今本晏子作德不盛行不厚則顏回侍今君未有能侍故未具也君擇臣使之臣雖賤亦擇君事之一心可以事百君百心不可以事一君晏子治阿三年毀聞于國景公召而問之對曰嬰築蹊徑急門閭之政淫民惡之舉儉罰偷墮民惡之決獄不畏強貴強貴惡之左右取求非法不豫左右惡之事貴人不能過禮貴人惡之是三邪毀于外二讒去于內臣請改轍更治三年必有譽也景公病水數十日夢與二日鬬而不勝使占夢者占之占者至門晏子使對曰公病陰也與二日鬬日陽也不勝疾將退也三日而愈公賞占夢者占夢者辭曰晏子之力也公問晏子晏子曰臣若自對則不信也景公病疽在背欲見不得問國子國子曰如火色如日大如未熟李也公問晏子晏子曰色如蒼玉大如璧公曰不見君子不知野人之拙也晏子使楚楚王令左右縳一人作盜者過王問何處人也對曰齊人也王視晏子齊國善盜乎晏子曰橘生江南江北則作枳地土使然也今民生長于齊不盜入楚則盜臣不知也楚王自取弊晏子使楚楚王以晏子短作小門于大門之側晏子曰往詣狗國從狗門入今來使入楚不可從狗門入也遂大門入楚王問齊之臨淄都無人耶對曰臨淄三百閭張袂成帷揮汗成雨比肩繼踵何容無人也曾子將行晏子送之曰贈人以財不若以言案今本晏子作贈人以軒不若以言和氏之璧井里璞耳良工修之則成國寶習俗移性可不愼乎晏子殁後十有七年景公射諸侯大夫皆稱善公曰自晏子殁後不復聞不善之事章對曰君好之則臣服之君嗜之則臣食之尺蠖食黃則黃食蒼則蒼是也公曰善吾不食諂人之言也以魚五十車賜章固不受是章有晏子之遺行也子思子七卷慈父能食子不能使知味聖人能悅人不能使人必悅國有道以義率身無道以身率義荀息是也言而信信在言前令而化化在令外聖人在上而遷其化終年為車無一尺之軫則不可馳案一尺之軫據考工記考定從御覽改百心不可得一人一心可得百人君本也臣枝葉也本美則葉茂本枯則葉凋君子不以所能者病人不以人之不能者愧人小人溺于水君子溺于口也繁于樂者重于憂厚于義者薄于行見長不能屈其色見貴不能盡其辭雖有風雨吾不入其門也君子以心導耳目小人以耳目導心孟子十四卷蜀郡趙臺卿作章句章句曰指事孟子謂惠王曰虐政殺人何異刃耶庖有肥肉廄有肥馬民有飢色野有餓莩此謂率獸食人且人惡之況虐政乎敬老愛幼推心于民天下運掌中也故推恩足以保四海不推恩不足以保妻子孟子云齊人譏管晏此八字有語馬驌釋史因之案譏當作識蓋刪改子誠齊人一節之文舊在不如待時下誤雖有智慧不如乘勢雖有鎡基不如待時飢者易為食渴者易為飮若久塗炭則易政如渴不擇飮也宋人有閔其苗不長揠拔之使其長其子趨而視之苗則稿矣非但無益乃有害也見孺子入井非孺子之父母亦有惻隱之心無惻隱之心非人也無羞惡之心亦非人也無辭讓之心亦非人也無是非之心亦非人也孟子云子路人告之有過則喜禹聞善言則拜枉巳者未能人當以矯枉若自曲何以正人景春曰公孫衍張儀豈不誠大丈夫一怒而諸侯懼安居而天下息孟子曰是焉得為大丈夫乎富貴不能淫貧賤不能移威武不能屈此之謂大丈夫天子不仁不保四海諸侯不仁不保社稷士不仁不保四體今惡死亡而樂不仁猶惡醉而強酒民之歸仁猶水就下存乎人莫良於眸子眸子不能掩其惡胸中正則眸子瞭焉胸中不正則眸子眊焉淳于髠曰男女不親授受嫂溺援之手乎孟子曰不援是豺狼也天下溺則援之以道嫂溺必援以手子産以其乘輿濟人於溱洧孟子聞之曰不知政也不如以時修橋梁案句本趙注齊人有一妻一妾其良人出行則饜飽而反欺其妻云與富貴人共飮食耳夫出妻後伺之見乞人祭餘食之妻乃告妾相與泣於中庭其夫自外來未知猶驕其妻妾由君子枉道得富貴而驕人也非其道伊尹不以一芥與人亦不取一芥於人在野曰草莽之臣在國曰市井之臣性猶湍水決東則東決西則西白羽白性輕白雪白性消白玉白性貞雖俱白其性不同也案此馬參用趙岐劉二家注冬曰飮湯夏日飮水欲問寒暑者中心也仁義忠信樂善不倦天爵也公卿大夫人爵也古之人修天爵而人爵從之今之人修天爵以要人爵得人爵棄天爵終亦亡矣孟子曰仁之勝不仁也猶水勝火今之為仁者猶一杯水救一車薪之火也不熄則謂水不勝火此又與於不仁之甚者也亦終必亡而已矣君子有三樂父母具存一樂仰不愧天俯不怍人二樂得天下英才而教育三樂雞鳴而起孜孜為善者舜之徒也雞鳴而起孜孜為利者跖之徒也九仭無泉猶棄井也古人之關禦暴今人之關為暴今之關出入征稅惡似而非者惡莠亂苗惡佞亂義惡利口亂信惡鄭聲亂雅樂惡紫亂朱惡鄉原亂德堯至湯湯至文王文王至孔子孔子至孟子各五百餘歲案孔子至孟子才百餘歲當依原書管子十八卷倉庫實知禮節國多財遠者來衣食足知榮辱野無積草府不積貨市不成肆朝不合衆治之至也觀其交遊則賢不肖可察一年之計莫若樹榖十年之計莫若樹木終身之計莫若樹人爵祿滿則忠衰室富足則行衰釜鼓滿則人槩之人滿則天槩之故先王不滿也凡赦者小利而大害故久而不勝其禍無赦小害而大利久而不勝其福惠者多赦先易後難法者無赦先難後易惠者民之仇讎法者民之父母堂上遠于百里有事十日而君不知堂下遠于千里有事一月不知門庭遠于萬里有事期年不聞桓公謂管仲曰寡人有大邪三不幸好畋晦夜從禽不反一不幸好酒日夜相繼二寡人有汙行不幸好色姑姊妹有未嫁者三管仲曰惡則惡矣非其急也人君惟不愛與不敏不可耳不愛則亡衆不敏則不及事地大而不耕非其地卿貴而不仁非其卿民衆而不親非其民無翼而飛者聲也無根而固者情也公但謹聲耳齊水躁而復故民貪而勇楚水溺而淸其民輕果好賊越水濁而重其民疾妒秦水泔案泔舊作汨據本書注秦水絶泔今改而滯其民貪戾晉水滯而雜其民好詐宋水徑而淸其民簡易先王治國威不兩措政不二門有法度之制者不可巧以詐偽有權衡之稱者不可欺以輕重有尋尺之數者不可差以短長也桓公問廏吏何事最難吏未答管仲曰臣嘗作圉人惟傅馬棧最難先傅曲木則無所施先傅木則曲無所施楚王好小腰美人省食吳王好劔國士輕死故主好宮室則工匠巧主好文彩則女工靡冬日不盥非愛水也夏日不煬非愛火也為不適于身明王不治宫室非愛小也為傷于本事而妨于教也利之所在雖千仞之山無所不上深泉之下無所不入商人通賈倍道兼行夜以繼日千里不遠利在前也漁人入海海水百仞衝波逆流日夜不出利在水也蛟龍得水而神力人主得民而威成海不辭水故能成大山不辭土故能成高主不厭人故能成衆士不厭學故能成聖烏合之衆初雖有歡後必相吐雖善不親也殺生之柄不制于主而在羣下此寄生之主也五穀民之司命黃金刀幣民之通施農有常業女有常事一農不耕民有飢者一女不織民有寒者桓公謂管仲曰吾欲伐楚楚強不可下如何曰公但鑄錢於莊山往楚貴市生鹿楚王聞之喜必廢農而獵鹿公藏粟五倍楚足錢而無粟公閉關楚降者十分有四道德經二卷生而不有為而不恃元氣生萬物不有道所施不求其報挫其鋭解其紛鋭進也人欲鋭愼進取功名當挫止之法道不自見也紛結恨也當念道無上解釋也和其光雖有獨見之明當如暗昧不曜亂人也同其塵當與衆同垢塵不自别殊多言數窮口開舌舉必有禍患不如守中不如守德於中育養精神愛氣希言也聖人後其身而身先先人後巳天下之先以官長也外其身而身存薄己而厚人人愛之如父母神明祐之如赤子故身外而長存也金玉滿堂莫之能守嗜欲傷神財多纍身富貴而驕自遺其咎夫富當賑貧貴當憐賤反驕恣必被禍患也絶仁棄義民復孝慈德化淳也絶巧棄利盜賊無有上化公正下無私邪曲則全曲己從衆不自專則全也枉則枉屈己而伸人久久自得少則得天道祐謙自受少則得多多則惑財多者惑於守身學多者惑於所聞善行無轍迹善行道者求之身不下堂不出門故無轍迹善言者無瑕謫擇言而出之故無瑕謫知足者富知足則長保祿位故富也死而不妄者壽目不妄視耳不妄聽口不妄言則無怨於天下故能長壽也將欲吸之必固張之先開張之欲令極其奢淫將欲弱之必固強之先強大之欲使遇害將欲廢之必固興之先興之使驕危將欲奪之必固與之先與之者欲極其貪心也是謂微明此四事具道微其效明也失道而後德道衰德生失德而後仁德衰而仁愛見失義而後禮義衰即施禮聘行玉帛也夫禮者忠信之薄禮廢本治末忠信日以消薄而亂之首禮賤質貴文故正曰以消邪亂曰以生貴必以賤為本言欲尊貴當以賤薄為本禹稷躬耕舜陶河濵周公下白屋是也高必以下為基言欲高立先以下為基如築墻造功因卑成高下不堅固高必傾危也上士聞道勤而行之中士聞道若存若亡下士聞道大笑之不笑不足以為道不為下士笑不足名曰道明道若昧明道之人若暗昧無所見也進道若退進取道者若退不及夷道若夷平也大道之人不自别殊若多比上德若谷若深谷不耻垢辱也廣德若不足德行廣大之人若愚頑不足也大方無隅大方正之人無委曲廉隅也大器晚成成器之人如瑚璉不可卒成大音希聲如雷電待時而動喻常愛氣希言也大象無形大法象道之人質朴無形容也物或損之而益取之不得推讓必遠益之而損曾高者崩貪祿致患也名與身孰親名遂則身退也身與貨孰多財多則害身也得與亡孰病好得貨利則病於行甚愛必大費甚愛色費精神甚愛財遇患害所愛者少所費者多故言必大費多藏必厚亡生多藏於府庫死多藏於丘墓生有攻劫之憂死有掘冢探柩之患大成若鈌鈌者滅名藏譽如不備大巧若拙不見其然大辨若訥知無疑口無辨不出戶以知天下以巳身知人身以己家知人家不窺牖以見天道天道與人道同其出彌遠其知彌少謂去其家觀人家去其身觀人身其視雖遠而所見至少也為學日益為政教禮樂之學情欲文飾日以多為道日損謂自然之道情欲文飾日以消損之又損之以至于無為無為而無不為情欲斷絶德與道合則無所不施無所不為善者吾善之不善者吾亦善之不善則教道使就善信者吾信之不信者吾亦信之亦以教道善攝生者陸行不遇兕虎自然合遠避入軍不甲兵不好戰殺塞其兌兌目也不妄視閉其門門口也不妄言終身不勤終身不勤若也開其兌視情欲濟其事濟益情欲之事終身不救禍亂成也大道甚夷而民好徑徑邪不平正也善建者不拔善以道建身建國者不可得引而拔之知者不言貴其行也言者不知駟不及舌多言多患也其政悶悶音門政教寬大悶悶昧昧似不明其民淳淳淳淳親厚其政察察政急疾言決于口聰決于身其民缺缺民不生缺缺日以疏薄也而不肆肆申也聖人雖曲己從人不自申光而不耀雖有獨見之眀如暗昧不炫耀深根固蒂長生久視之道人以氣作根以精作如樹根不深則拔不堅則落言能深藏氣固守精無所泄漏乃長生久視之道以道蒞天下者其鬼不神鬼不敢干犯其精神非其鬼不神其神不傷人聖人在位不傷害人故鬼不干人夫兩不相傷故德交歸焉人能治於陽全其性命鬼得治於陰保其精神故德交歸也人之不善何棄之有當以道伏之蓋三皇之前無棄民德化厚也故立天子置三公欲化不善人也報怨以德修身行善絶禍于未生也圖難于易圖難事先於其時未成也夫輕諾必寡信多易必多難不愼患也其安易持治國治身安靜者易守持也其未兆易謀為之于未有治之于未亂以智治國國之賊使智慧之人治國必背道德妄作威福乃是國之賊不以智治國國之福民守正直不作邪飾曰下相親君臣同力善為士者不武貴道德不好武力也善戰者不怒善以道戰者禁邪于心胸絶禍于未萌無所怨怒代大匠斫者希有不傷其手矣人君行刑罰猶拙人代大匠斫則方圓不得其理還自傷代天殺者失紀綱不得其紀綱還受其殃也天之道損有餘而補不足天道益謙常以中和是尚人之道則不然損不足以奉有餘世俗之人損貧以奉富奪弱以益強也鄰國相望雞犬之聲相聞民至老死不相往來無情欲也知者不博博者不知知道守一則不必博多見聞失要真故不知荀卿子十二卷三十二篇靑出于藍而靑于藍冰生于水而寒于水君子居必擇鄉遊必擇士防邪僻也肉腐出蟲木枯生蠧驕慢在身災禍作矣君子之學入乎耳著乎心布乎四支動靜皆可法則小人之學入乎耳出乎口口耳之間才四寸耳何足以美七尺之軀夫驥一日千里駑馬十駕則亦及之窮無窮極無極也跬步不休跛鱉千里纍土不輟丘山崇成天不言人推其高地不言人歸其厚四時不言百姓期焉與人善言暖若錦帛與人惡言深於矛戟三不祥幼而不肯事長賤不肯事貴不肖不肯事賢是也枉木而求影猶不能察明而務見幽也伯樂不可欺以馬君子不可欺以人川泉深而魚鱉歸之山林茂而禽獸歸之刑政平而百姓歸之禮義備而君子歸之天行有常不為堯存不為桀亡淺不足與測深愚不足與謀智坎井之蛙不可與語東海之樂聖人無兩心天下無二道鳥獸失亡其匹越月逾時必反過故鄉徘徊鳴號躑躅踟蹰然後去何況人乎妻子具而愛衰於親爵祿盈而忠衰於君唯舜及賢者不然歲不寒無以知松柏事不難無以知君子荀卿子名況齊宣王時人春申君再請作蘭陵令因家焉為李斯師後卒於蘭陵魯連子五卷白刃交前不救流矢急不暇緩也財者君之所輕死者士之所重君不能以所輕與士欲得士之所重不亦難乎百足之蟲斷而不蹶持之者衆也人心難知于天天有春夏秋冬以作時人皆深情厚貌以相欺不知宜與不宜將以錦純薦不知時與不時猶冬耕也不知行與不行猶以方作輪也文子十二卷周平王時人師老君齒堅於舌而齒先敝剛強者死之徒柔弱者生之幹先唱者窮之路後動者達之源立井而飮耕田而食不布施以求德不高下以相傾此古人之德也河不滿溢海不湧波景雲見黃龍下祥風至醴泉出聖人順天道也晝冥夜光山崩川涸冬雷夏霜此國之將亡也水濁則魚噞政苛則民亂上多欲下多詐冬日之陽夏日之陰萬物歸之而莫使臯陶喑而為大理天下無虐刑何貴言乎君子猶射差此毫末於彼尋丈量腹而食度形而衣節乎巳者貪心不生神者智之淵神淸則智明智者心之府智公則心平精神難淸而易濁猶盆水也淸之終日乃能見眉不過一撓即不能見方圓也山生金反自刻木生蠧還自蝕人生事還自賊善遊者必溺善騎者必墜使信士分財不如探籌使廉士守財不如閉戶全封有心於平不如無心之不平上學以神聽之學在骨髓矣中學以心聽之學在肌肉矣下學以耳聽之學在皮膚矣鐸以聲自毀膏以明自煎一淵無兩蛟有必爭得鳥者羅之一目一目之羅不可得鳥欲致魚者先通谷欲來鳥者先樹木水積魚聚木茂鳥集目見百步之外不能自見其眥水之勢勝火一杓不能救一車之薪金之勢勝木一刃不能殘一林土之勢勝水一塊不能塞一河飢馬在廄寂然無聲投芻其傍爭心乃生農夫勞而君子食之愚者言而智士擇之日月欲眀浮雲翳之河水欲淸沙土穢之叢蘭欲茂秋風敗之人性欲平嗜欲害之濟溺者以金石不如尺索花太早者不須霜而自落入水憎濡懷臭求芳不可得也乳犬噬虎伏雞搏狸冶不能銷木匠不能斫冰金石有聲不扣不鳴簫管有音不吹不聲事者難成而易敗名者難立而易廢往古來今謂之宙四方上下謂之宇孔子無黔突墨子無暖席非其貪祿慕位欲為天下除害耳獸窮則觸鳥窮則啄人窮則詐人主之有民猶城之有基木之有根根深則本固基厚則土安屈寸而伸尺小枉而大聖人為之今人君不計其大功而求其小善失賢也貴則觀其所舉富則觀其所欲貧則觀其所愛霸王之道扶義而動尊其秀士顯其賢良百姓開戶而待之漬米而儲之不義之兵至於伏尸流血而不服也冬日之扇夏日之裘無用於巳則生塵垢鄧析子一卷二篇劉向云非子産殺鄧析推春秋驗之修名責實案方嵩卿校韓昌黎集云唐人書修似循故修循字通用不别君之事也奉法宣令臣之職也君有三纍親所信以名取士近故疏親臣有四責受重賞而無功居大位而不治為理官而不平在軍陳而奔北勢者君之輿威者君之策臣者君之馬民者君之輪勢固則輿安威定則策徑臣順則馬馴民和則輪利治國者失此必有覆輿奔馬折䇿敗輪之患輪敗䇿折馬奔輿覆則載者亦傾矣慮不先定不可以應卒兵不預整不可以當敵廟算千里帷幄之奇百戰百勝黃帝之師凶飢之歲父死於室子死於戶而不相怨者無所顧也同船涉海中流遇風救患若一所憂同也張羅之畋唱和不差者其利等也故體病者口不能不唾案一作口不能呼心悅者顔不得不笑自見則明借人見則暗自聞則聰借人聞則聲一言而非駟馬不能追一言而急駟馬不能及一作反明君之治民若御奔而無轡重而履氷喜而便賞不必當功怒而便誅不必值罪案便一本並作使忠怠于宦成孝衰于妻子范子十二卷並是陰陽歷數也計然者葵丘濮上人姓辛名文子其先晉國公子也為人有內無外形狀似不及人少而明學陰陽見微而知著其行浩浩其志泛泛案容齋續筆作沈沈不肯自顯諸侯陰所利者七國天下莫知故稱曰計然時遨遊海澤號曰漁父范蠡請見越王計然曰越王為人鳥喙不可同利也案容齋續筆不可下有與字掩目别白黑雖時時一中猶不知天道論陰陽有時誤中耳范子問何用九宮計然曰陰陽之道非獨於一物也聖人之變如水隨形形平則平形險則險胡非子一卷勇有五等案舊無此四字從容齋三筆負長劔赴榛薄析兕豹傅熊羆此獵徒之勇也長劒赴深泉斬蛟龍搏黿鼉此漁人之勇也登高陟危鵠立四望顔色不變此陶缶之勇也剽必刺視必殺此五刑之勇也昔齊桓公以魯為南境魯公憂之三日不食曹沫請擊頸以血濺桓公公懼不知所措管仲乃勸與之盟夫曹沫匹夫之士布衣柔履之人一怒却萬乘之師存千乘之國此君子之勇也墨子十六卷君子自難而易彼衆人自易而難彼靈先灼神蛇先暴君子雖有學行為本焉戰雖有陳勇為本焉喪雖有禮哀為本焉墨子見染絲而歎曰染于蒼則蒼染于黃則黃非獨染絲然也人固亦有染舜染許由桀染子辛案説苑作干辛紂染崇侯也聖人為舟車完固輕利可以任重致遠子自愛不愛父欲虧父而自利弟自愛不愛兄欲虧兄而自利非兼愛也盜愛其室不愛異室故竊異室以利其室亦非兼愛節葬之法三領之衣足以朽肉三寸之棺足以朽骸深則通於泉諸侯不得恣己為政有三公政之三公不得恣己為政有天子政之天子不得恣己為政有天下政之案此女原書兩見皆作有天政之斷指以存脛以免於身者利君子如鐘扣則鳴不扣則不鳴美女處不出則爭求之行而自衒人莫之娶墨子勸弟子學曰汝速學君當仕汝弟子學期年就墨子責仕墨子曰汝聞魯人乎有昆弟五人父死其長子嗜酒不肯預葬其四弟曰兄若送葬我當為兄沽酒葬訖就四弟求酒四弟曰子葬父豈獨吾父也吾恐人欺以酒耳今不學人自子故勸子也遂不復求仕墨子謂門人曰汝何不學對曰吾族無學者墨子曰不然豈謂欲好美而曰吾族無此辭不欲邪欲富貴而曰吾族無此辭不用邪強自力矣甘瓜苦蒂天下物無全美古之學者得一善言附於其身今之學者得一善言務以説人言過而行不及君子服美則益敬小人服美則益驕纒子一卷纒子修墨氏之業以教於世儒有董無心者其言修而謬其行篤而庸言謬則難通行庸則無主欲事子纒子曰文言華世不中利民傾危繳繞之辭者並不為墨子所修勸善兼愛則墨子重之董子曰子信鬼神何異以踵解結終無益也纒子不能應隨巢子一卷執無鬼者曰越蘭問隨巢子曰鬼神之智何如聖人曰聖也越蘭曰怡亂由人何謂鬼神邪隨巢子曰聖人生於天下未有所資鬼神為四時八節以紀育人乘雲雨潤澤以繁長之皆神所能也豈不謂賢於聖人有疏而無絶有後而無遺大聖之行兼愛萬民疏而不絶賢者欣之不肖者則憐之賢而不欣是賤德也不肖不憐是忍人也尸子二十卷鹿馳走無顧六馬不能望其塵所以及者顧也水積則生吞舟之魚土積則生豫章之木學積亦有生焉農夫比粟商賈比財烈士比義卑墻來盜榮辱由中出敬侮由外生樹蔥韭者擇之則蕃仁義亦不可不擇也唯善無基義乃繁滋敬災與凶禍乃不重雞司夜狸執鼠日燭人此皆不全自全日在井中不能燭十步目在足下不可以視遠雖明何益堯瘦舜黑皆為民也陳繩則木之枉者有罪措準則地之廢險者有罪審名分則羣臣不審者有罪農夫之耨去害苗者賢者之治去害義者虎豹之駒未成文而有食牛之氣鴻鵠之羽翼未合而有四海之心見人有善如己有善見人有過如己有過此虞氏盛德也買馬不論足力而以白黑為儀必無走馬矣買玉不論美惡必無良寶矣舉士不論賢良則無士矣孔子云誦詩讀書與古人居讀詩誦書與古人謀玉者色不如雪澤不如雨潤不如膏光不如燭取玉甚難越三江五湖至崑崙之山千人往百人反百人往千人至中國覆十萬之師解三千之圍車輕道近鞭策不用鞭策所用道遠任重見驥一毛不知其狀見畫一色不知其美屠者割肉則知牛長少弓人筋則知牛長少雕人裁骨則知牛長少各有辨焉草木無大小必待春而後生人待義而後成韓子二十卷劉向云秦始皇重韓非書曰寡人得與此人遊死不恨矣李斯姚賈害之與藥令自殺始皇悔遣救之巳不及無與禍鄰禍乃不存臣所以難言者滑澤洋洋見者以謂華而不實敦厚祗恭見者以謂拙而不倫多言繁稱連比物見者以謂虛而無用省而不飾見者以謂訥而不辨激意近親探知人情見者以謂譖而不讓宏大廣博深而不測見者以謂夸而無用臣所以為難言而重患也二柄刑德也虎所以能伏犬者爪牙也若虎釋其爪牙則反伏於犬也故田常請爵祿大斗斛施百姓比齊簡公失德而田常得之韓昭侯醉甚而臥典冠見君寒加衣其上昭侯覺乃罪典衣殺典冠以典衣失事以典冠侵官甚於寒也故明王畜臣不得越官而有功不得陳言而無當越官則死不當則罪香美病形皓齒損精去甚去泰身乃無害使雞司夜令狸執鼠物有所宜才有所施各處其宜故上下無為上失膚寸下失尋常君不可不愼託宴處之娛乘醉飽之時求其所欲則必聽也鄰國有聖人敵國之憂也彌子瑕有寵於衛君竊駕君車君聞之曰子瑕母病而矯駕孝子也與君遊果園食桃不盡以半啖君君曰愛我也及其色衰得罪於君君曰是矯駕吾車者啖我餘桃者以前所賢而後獲罪愛憎變也愛人不得獨利待譽而後利之憎人不得獨害待非而後害之輿人欲人富貴棺人欲人死喪人不貴則輿不用人不死則棺不買非有仁賊利在其中相愛者則比周而相譽相憎者則比黨而相誹誹譽交爭則主惑矣家有常業雖飢不餓國有常法雖危不亡若捨法從私意則臣下飾其智能飾其智能則法禁不立矣君以計畜臣臣以計事君害身而利國臣不為也害國而利身君不為也譬之如水溺者飮之則死渴者飮之則生桓公伐竹失道管仲曰老馬之智可用遂縱馬從而得歸行出山中無水隰朋曰蟻冬居山之陽夏居山之陰蟻壤寸而有水使掘之果得水焉以人言善我者必以人言罪我也置猿於檻則與豚同勢不能逞能也刻削之道鼻莫如大目莫如小鼻大可小小不可大目小可大大不可小舉事亦然古人目短於自見故以鏡觀面身短於自知故以道正巳失鏡無以正鬚眉失道無以知迷惑西門豹性急佩韋以自緩董安于性緩佩以自急斷手續之以玉故世有易身之患舜為匹夫不能正三家有才而無勢雖賢不能制也故立木於高山之上下臨千仞之溪材非長也其位高也不蔽人之美不言人之惡韓昭侯握爪而佯亡求之甚急左右而取備之案一作左右因割其爪而效之昭侯以此察左右之虛實衛嗣君使人過關市關吏乃呵之因以金與關吏關令乃捨嗣君謂關吏曰汝何得受金以明察之案一本作關吏以為明察受下有察字僖侯時宰人上食羮中有生肝乃問之宰人曰當是人置之欲去宰自處也後僖侯將浴湯中有礫僖侯曰有人欲代湯者文公時宰人上食炙而有髮繞之文公召宰人曰汝使吾哽乎宰人頓首曰臣有三罪刀利如干將切肉而髮不斷臣罪一也援錐貫臠而不見髮臣罪二也熾爐炮肉盡赤而髮尚繞臣罪三也有人欲代臣也齊景公惡仲尼為魯政黎且曰去仲尼如吹毛耳乃使黎且以女樂六遺魯哀公哀公樂之果怠於政仲尼諌不納去而之楚鄭人相與爭年一人云吾與堯同年一人云吾與黃帝兄弟同年爭此不決以後罷為勝客有為齊王畫者王問何者最難對曰畫狗馬為最難鬼魅最易狗馬人共知鬼魅無形像也冠雖穿決必戴於上履雖五采必踐之地齊宣王問匡倩曰儒者鼓瑟乎對曰不也瑟者小大聲大小聲大細易位貴賤易序故儒者不為以骨去蟻蟻愈多以魚驅蠅蠅愈至桓公問管仲曰官少而索者多如何管仲曰君勿聽人有請案本作君勿聽左右之請因能而授祿録功而與官宋人有酤酒者斗槩甚平遇客甚謹醖酒甚美懸幟甚高而酒不售遂致於酸問閭長者楊倩倩曰汝狗惡也孺子懷錢挈壺往酤輒有狗齧之猶大臣齧有道之士也故桓公問管仲治國何患患社鼠焚則木焚也稅勿輕勿重重則利入於上輕則利歸於民也晉文公與楚戰問舅犯曰楚衆我寡奈何對曰君其詐之又問雍季曰以詐御民一時之利也與楚戰大勝而歸行賞先雍季而後舅犯曰舅犯之言權也雍季之言萬世之利也齊桓公飮酒醉遺其冠恥之三日不朝管仲曰此有國之恥也公何不雪之以政因發倉賜貧窮三日而民歌之曰公何不更遺其冠也古諺曰政若沐雖有棄髮之費而有長髮之利也飢歲之春從弟不讓一作幼弟不餉穰歲之秋疏客必食一作過客必養非疏骨肉多少之心異也墨子死後有相里氏之墨相芬氏之墨鄧陵氏之墨孔墨之後儒分為八墨離為三也案相芬氏韓非子顯學篇作相夫氏待自之箭則百世無矢矣待自圓之木則千歲無輪矣法度賞罰國之脂澤粉黛也三寸之管無當不可滿也意林卷一意林逸文海昌周廣業輯鶡冠子云扁鵲兄弟三人並醫魏文侯問孰最善扁鵲云長兄神視故名不聞家仲兄神毫毛故名不出門臣針人血脈投人毒藥故名聞諸侯世賢篇錦繡萬花谷後集醫注云出意林神農稽首再拜問于太一小子曰鑿井出泉五味煎煮口别生熟後乃含咀男女異利子識其父曾聞上古之時人壽過百無殂落之咎獨何氣之使耶太一小子曰天有九門中道最良曰月行之名國皇字人老老人出現其方長生長生死衆曜同光神農從其嘗藥以致人命路史後紀炎帝紀注引唐馬總意林袁準正書太歲在酉乞漿得酒太歲在已販妻鬻子則知災祥有自然之理施元之注蘇詩引馬總意林叔敖作期思陂而荆土用贍天中記陂引意林蘭以芳致燒膏以肥見翠以羽殃身蚌以珠破腹女惡蛾眉士惡勝已由來尚矣天中記蘭引意林右計五條皆今本所闕者路史注一則尤為古奧惜羅氏失記書名不知僕射從何録出也意林在明世已非完帙故天中記所載率與廖本相同而亦有兩條絶異者此必别有依據自惟固陋不能博考先就所見集之亦虬龍片甲鳯凰一毛也俟該洽者重為增益焉
