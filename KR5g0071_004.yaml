  text: 意林卷四
  hash: sha256:5cc8f7bd470ec696ce3550574ca4342c4bd998de189610e5655f0e0d06ad5e75
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0071_SBCK_004-1a}
body:
  text: 唐馬總撰風俗通三十一卷應劭序云風者天氣有寒暖地形有險易水泉有美惡草木有剛柔俗者含血之象之而生百里不同風千里不同俗周秦常以八月遣輶軒使者採異代方言藏之祕府及嬴氏之亡遺棄殆盡蜀人嚴君平有千餘言林閭翁孺者才有梗概與雄注續二十七年凡九千字張竦云懸諸日月不刋之書余雖不才敢比隆于斯人神農者神信也農濃也其德濃厚若神五帝黃帝顓頊帝嚳堯舜也黃光也顓專也頊信也嚳考也堯高也舜推也修原作循下同也言推德行修堯之緒三王禮號諡記曰夏禹殷湯周武王禹輔也湯昌也王往也言天下所歸往五伯春秋云齊桓晉文秦繆宋襄楚莊伯者白也長也言其咸建五長功實明白伯者把也言其把持天下之政按秦昭王太后始臨朝也案此條上下當有缺文牧守長不宜數易按尚書有考績孔子曰如有用我者期月而巳三年有成鄭子産從政三年民乃歌之賢聖尚須漸進況中才乎數易豈不紛錯道路也古制本無奴婢奴婢皆是犯事者奴者頑劣婢者卑陋里語云取官漫漫怨死者半昔在淸平之世使明恕君子哀矜折獄尚有怨言況在今時耶應劭三國時人此當時語光武車駕徙都洛陽載素簡紙經凡二千兩董卓蕩覆王室天子西移中外倉卒所載書七十車于道遇雨分半投棄卓又燒觀閣經籍盡作燼所有餘者或作囊帳先王之道幾湮滅矣俗説有功得賜金者皆黃金也按孫子兵書日費千金千金百萬錢也陳平間楚千金贈二疏金五十斤並黃金也或云一金亦是一萬錢也不養並生三子俗説似六畜妨父母按春秋國語越王時民生二子與之餼生三子與之乳母遂滅強吳何害之有不舉父同月子俗云妨父按左傳魯桓公子與父同月因名子同漢明帝亦與光武同月生不宜歸生俗云令人衰按婦人好以女易他男故不許歸封泰山俗説岱宗上有金篋玉策能知人年壽修短武帝探得十八因倒讀之曰八十按岱宗封者立石高一文二尺刻之曰事天以禮立身以義事父以孝成名以仁四方之內莫不師服刻石紀號著功績也其時武帝巳年四十七因何更得十八言倒讀神無福矣余承乏東嶽忝素六載數經祈祀咨問長老更上泰山者云無金篋玉策探籌之事東方朔是太白精黃帝時作風后堯時作務成子後又生于越在越作范蠡在齊作鴟夷子言其變化無常也按朔滑稽之雄俗人因以怪語附之安得神耶彭城相袁元服父伯楚作光祿卿于服中生子自謂年長不孝莫大于無後故收舉之君子不隱其過因以服作字按元服名賀母汝南人祖名京作侍中時安帝加元服百官來賀垂出而孫兒生喜其嘉會因名作賀字元服服父伯楚歷典三郡早喪妻不肯娶臨終敕子便留葬無取汝母喪柩若亡者有知往來不難若無知只為煩耳淸高若此豈有服中生子而名作賀汝南王叔漢父子方出遊二十餘年不還叔漢作尚書郎有人告子方死于汝南即遣兄伯三往迎喪叔漢即發哀詔書賻錢二十萬既而子方從蒼梧還叔漢詣闕乞納賻錢受虛妄罪靈帝詔將相大夫會議之博士任敏議曰凡人中壽七十視父同儕亡可製服也子方在遠人指其處不可驗也罪不可加焉詔書還錢復本官案此下六條今缺汝南張妙會杜士士家娶婦酒後相戲張妙縛杜士捶二十又懸足指士遂致死鮑昱決事云酒後相戲原其本心無賊害之意宜減死也汝南周翁仲婦産一女會屠者産一男翁仲妻密以錢易屠者之男後翁仲作北海相使見鬼主簿周光與兒同祭先塋主簿回謂翁仲日祭所但見屠兒敝衣繿縷持刀割肉别有人帶青綬仿偟東廂不進何也翁仲乃持劎問妻妻具陳其事翁仲曰凡有子者欲承先祖先祖不享何用遂以車馬送還屠家乃迎其女女已嫁賣餅人取歸適安平李文思文思官至南陽太守神不歆非明矣豈得養他人子乎陳留有富翁年九十無男娶田女一宿身死後産一男至長女曰我父娶一宿身亡此子非父之子遂爭財數年不決丞相邴吉決云老翁兒無影不耐寒其時八月中取同歲小兒俱解衣試之老翁兒獨呼寒曰中行果然無影遂以財與之潁川有兄弟同居兩婦俱懷妊長婦數月胎傷不言知産期至俱臥産房候弟婦産得一男夜盜之因爭三年不決丞相黃霸殿前令以兒去兩母各十步叱兩婦令爭取之長婦抱持甚急兒大啼弟婦恐傷放之長婦色喜弟婦愴然霸曰此弟婦子也即劾長婦果然伏罪臨淮有一人持一匹縑到市賣之遇雨披之後有一人求庇廕一頭之地雨霽共爭之丞相薛宣決曰縑數百何用紛粉遂中斷各與半續察之縑主稱冤不巳後人有喜色宣知其情考而伏之周公樂曰勺勺者斟酌先祖之道武王樂曰武武功定天下也舜樂曰韶韶者紹堯也堯樂曰大章章者彰也帝嚳樂曰五英英者華也劉向云商章也物成就可章度也角觸也物觸地載芒角而生也宫者中也徴者祉也物盛大而繁祉羽者宇也物聚藏宇覆之聞宮聲使人溫潤而廣大聞商聲使人方正而好義聞角聲使人齊整而好禮聞徴聲使人隱惻而博愛聞羽聲使人善養而好施琵琶近世樂家所作不知誰也以手琵琶因以得名長三尺五寸法天地人與五行也四象四時易云利見大人大人與聖人其義一也案此下十一條今缺論語云君子上達臧孫紇曰後有達者將在孔丘乎儒者區也别古今賢愚章帝時以賈逵為通儒時人語曰問事不休賈長頭禮云羣居五人長者必異席今呼權貴作長者非也管子云先生施教弟子則之非知古之道是師者之稱諸生弟子學者非一故曰諸先生者當如醒學者譬如醉言生俱醉獨有醒者祭酒禮云飲酒必尊其先也孫卿在齊最是老師故三稱祭酒士詩云殷士膚敏髦士俊秀雅士博達烈士有不易之分處士隱居放言易云師貞丈人吉非徒尊老須德行先人也傳云杖德莫有信者其恩德可信杖也禮云十尺曰丈成人之長也夫者膚也言其智膚敏教也故曰丈夫論語云匹夫匹婦傳云一晝一夜成一日一男一女成一室按古人男女作衣用二匹今人單衣故言匹夫人當龍變起不繫鄉里止繫風俗見善不徙故謂之俗人禮言簡不肖按生子鄙陋不似父母曰不肖今人謙辭亦曰不肖方言曰人不事事而放蕩謂之無賴不可恃賴也猶高祖謂太上皇云大人以臣無賴也司徒中山祝恬字伯休公車徵在道得溫疾過友人謝著鄴令著拒不受至汲郡止客六七曰諸生見恬轉劇欲告汲令恬曰友人尚不相容汲令不相識告之何益死生命也不須醫藥諸生潛告汲令令即汝南應融聞之大驚至疾所泣曰伯休不世英才當作國家幹輔何乃默止客舍不遣人知融遂躬御而歸親自侍疾疾漸損融謂伯休曰吉凶不諱憂怖交心己備凶具對之悲喜伯休停傳舍數十日遂去拜侍中尚書令又拜司薦融自代歷典五郡謝著不為公府所取彭城孝廉張子矯議云君臣不得相襲作名周穆王諱滿至定王時有王孫滿厲王諱胡莊王之子名胡案此下二條今缺俗云五月到官至免不遷今年有茂才除蕭令五月到官破日日入舍視事五月四府所表遷武陵令余為營陵令正觸太歲主簿令余東北上余不從在事五月遷太山守楚辭云風伯飛廉也按周禮祀風師箕星也主簸揚能致風氣戊戌之神作風伯故丙戌日祀于西北按周禮雨師畢星也土中之衆莫水故雨稱師丑之神作雨師故己丑日祀于東北桓帝元嘉中京婦女作愁眉啼粧墜馬髻折腰步齲齒笑愁眉者細而折啼粧者薄拭眼下似啼痕墜馬髻側在一邊折腰步足不任體齲齒若齒痛此事並出梁冀傳曰趙王好大眉人間皆半額楚王好廣領國人皆沒項齊王好細腰後宮有餓死者京師有胡服胡帳胡牀胡箜篌胡笛胡舞按董卓時胡兵填塞是也案此下十五條今缺靈帝宮中遊西園駕四白駝躬自操轡公卿倣效價與馬齊桓帝世謠言如死道邊曲如鈎反封侯梁冀欲樹幼主李固欲立淸河王梁冀遂奏李固死于獄中曝尸路邊如鈎梁冀如李固千里草何靑青十曰卜不得一日生此董卓字也青青盛之貌秦漢以來尊者號室作宮巳前貴賤無别按世本鮌作城郭城盛也郭大也按天子有外屏令臣下屛氣息菀同苑菀藴也薪蒸之所藴積孫子云金城湯池而無粟者太公墨翟不能守之郡者羣也左傳云上大夫受縣下大夫受郡至始皇方以郡監縣縣平也傳舍按使者傳言乃得舍于傳也南北曰阡東西曰陌按易傳上古之時草居露宿冬則山南夏則山北有恙蟲善與人作患故人平居曰無恙城門失火禍及池魚俗説池與魚人姓字居近城門也按城門失火取池水故魚皆死案藝文聚引作城門失火禍及池中魚舊説池仲魚人姓李居近城城門失火延及其家仲焚燒死獄自三王制肉刑始有獄夏曰下臺周曰囹圄令人思愆改惡獄字二犬守言無情狀犬亦得之囚字罪人置諸圓土故囚字從口中人罪字本從自辛苦憂之秦皇謂罪字似皇故改作罪會稽多淫祀家貧不得牛祀者死作牛鳴太守第五倫嚴科絶之桂陽太守李叔堅少時作州從事家有狗作人立叔堅曰此狗喻人人行何害叔堅作縣令解冠榻上狗戴之而走叔堅曰此狗誤觸冠纓冠纓挂其耳矣犬復與人竈前畜火鄰里告之叔堅曰狗能畜火幸不煩人犬遂暴死叔堅至大位商君書四卷夫有高人之行見非於世有獨知之明見怨於人螟螣春生秋死一出而民數年乏食今一人耕百人食有甚於螟螣矣農者少而遊食衆遊食者衆則農怠農怠則治荒以強去弱者弱以弱去強者強上世之士衣不暖膚食不滿腹苦其心意勞其四支古者民叢生而羣處亂乃立君蠧衆則木折大則墻壞不勝而生不敗而亡自古及今未嘗有也使見戰者如餓狼之見肉則可用矣聖人制民也如高下制水如燥濕制火阮子四卷漁人張網于淵以制吞舟之魚明主張法于天下以制強梁之人立法以隄民百姓不能干立防以隄水江河不能犯防而可犯則江河成災法而可干則百姓成害不樹者死無棺不蠶者身無帛不績者凶無縗君子暇豫則思義小人暇豫則思邪高鳥相木而集智士擇土而翔一盜不誅害在穿窬修譽不誅害在詞主正部十卷案隋志正部論八卷後漢王逸撰藝文類聚引作王逸子即正部也凡人矇矇冥冥學以啓志行以處身進于道則成君子非于禮則曰小人君子之舉履德而榮光小人之動陷惡而傷刑皎皎練絲得藍則青得丹則赤得蘗則黃得涅則黑玉不則南山之圓石穿窬之徒不避腰領奔北之士不憚斧漢家窮天涯究取圻左湯谷右虞淵前炎楚後塞門祁連以北黃山以南碣石以東合以西莫不襁來貢仲尼敘書上謂天談下謂民語兼該男女究其表裏淮南浮偽而多恢太幽虛而少效法言雜錯而無主新書繁文而鮮用玉符云案文選注或問玉符答曰赤如雞冠黃如蒸栗白如脂防黑如淳漆此玉之符也言成雅訓辭作典謨此人之符也山神曰螭物精曰魅土精曰羵羊水精曰罔象木精曰畢方火精曰遊光金精曰淸明天下有道則衆精潛藏天以仙人曰子衆人曰芻狗愛其子私其壽賤芻狗聽其天若不學譬如無目而視無脛而走無翅而飛無口而語不可得也桀紂雖有天子之位而無一人之譽猶朽株枯樹逢風則仆明刑審法憐民惠下生者不怨死者不恨諺曰政如氷霜姦宄消亡威如雷霆寇賊不生士緯十卷姚信孔文舉金性太多木性不足背陰向陽雄倬立絲俱生於蠶銅等出於石作繒則賤作錦則貴鑄鈴則小鑄鐘則大經漸車之水歷繞輪之沙趾迹高下不可論凡水溫則成湯寒則成氷氷湯異氣而水性猶同蠶能投練匪湯不綿人性推移蓋此比也琴瑟張而鄭衛作五色成而綺榖生孟軻驅世事于仁義之域行者步中正之塗若使南海無採珠之民崑山無破玉之工則明珠不御于椒室美玉不佩于桂宫通語八卷案史傳及書引之或云殷基或云殷興撰末可知也舊唐志又訛為文禮輪者車之迹楫者舟之羽身之須道如此二物毁彼者雷同而鴉噪稱此者火燎而波駭或問陳蕃忠乎答云單車作討賊之斧直階非亂世之資知其忠不知其智也才貴精學貴講質勝文石建文勝質蔡雍文質彬彬徐幹庶幾也抱朴子四十卷外篇二十卷內篇二十卷洪字稚川淸醪芳醴亂性者也紅華素質伐命者也班翟不能削石作芒針歐冶不能鑄鉛錫作干將漢禁中起居注云李少君欲去武帝夢與同登嵩高山半道有使者乘龍持節從雲中來云太一請少君帝日少君將舍我去矣數日而少君死久之發看唯衣冠在焉以蟻鼻之缺損無價之淳鈞分寸之瑕棄盈尺之夜光朱公所以鬱邑薛燭所以永歎猶人不學仙也學道術乃令變形易貌吞刀吐火坐在立亡興雲起霧召致蛇蟲聚合魚鱉入淵不溺蹴刃不傷陳仲弓異聞記云同郡人張廣定遭亂有女四歲不能行棄冢中以數月糧與之後三年乃還欲收葬之女猶坐冢中問其故女曰糧盡以後見冢角有一物申頸吞氣乃效之轉不復飢尋看乃大也將女還食食飮初小腹痛久乃習之太昊師蜘蛛而結網金天據九扈以正時帝軒俟鳯鳴以調律唐堯見蓂莢而知月道能登虛躡影飮玉醴食翠芝彭祖云天上多尊官新仙者位卑奉事非一也農夫得彤弓以驅烏南夷得衮衣以負薪猶世人得仙丹而不貴也元君老君師也石先生丹法取烏未生毛者以真丹和牛肉飼之長毛羽赤色煞之陰乾服之壽五百歲朱草莖如瑚刻之汁流如血以玉投汁中丸之如泥久即成水以金投之曰金漿以玉投之曰玉醴服之長生上士得道成天官中士得道棲集崑崙下士得道長生世間世人唯競飛蒼走黃依榮逐利素顔紅膚惑其目淸商流徵亂其聽此真理之德也龍淵以靡割常新斧斤以日用速敝寸蛔泛濫迹水之中則謂天下無四海之廣芒蝎宛轉果核之內則謂天下無八極之大漏脯救飢鴆酒止渴非不暫飽死亦及之貴眀珠而賤淵潭愛和璞而惡荆山不知淵潭是明珠所出荆山是和璧所生方今士有待次之滯官無暫曠之職景風起則裘爐息世道夷則奇士退肉芝是萬歲蟾蜍頭上有丹書八字五月五日中時取之以足畫地則水流帶之左手則辟兵行山中見小兒乘車馬長七八寸者肉芝也服之得仙千歲蝙蝠白如雪住則倒懸腦重故也千歲燕窠門向北雲英雲珠雲液雲母雲沙服之用玉水成帝獵于終南山見一人無衣身生黑毛合圍取之絶坑踰岸有如飛鳥及得是婦人自云秦時宮人關東賊至秦王出降驚走入山垂當飢死有老翁令食松實遂不復飢乃是秦王子嬰宫人至成帝二百許歲人將還以穀食之毛稍脫落轉老而死欲長生服山精山精术也陵陽子仲服遠志二十年有子三十七人讀書不忘得道聖人是黃老治世聖人是周孔二人善圍棊者謂之棊聖故嚴子卿馬綏明有棊聖人之名彭祖自嚳佐堯歷夏至殷殷王遣宮女受房中之術有驗乃欲殺之以絶其法彭祖知之乃逃七十年有人見于流沙里語云人在世間曰失一日如牽牛羊詣屠所每進一步去死轉近欲得長生腹中淸欲得不死腹無屎老君姓李名字伯陽長九尺黃色鳥喙隆鼻眉五寸住金樓玉堂雞舌香黃連乳汁治目中百病諺云無肥仙人富道士雖能作金銀皆自貧諺云書三寫魚成魯帝成虎亦如神符今用少驗白石似玉姦佞似賢鸞不挂網麟不墮穽寸醪不能治黃河之濁尺水不能却蕭丘之穿舟以息漏猛㸑以止沸不可得也若使素士晝躬耕以糊口夜薪火以修業則遊夏不足多矣大廈既燒取水于滄海洪潦凌空伐舟于長川則不及矣臣猶手足履冰執不得辭焉高巖將隕非細縷所綴龍門沸騰非掬壤所遏劎戟不長于縫緝可以剸割牛馬錐鑽不可剸割牛馬而長于縫緝材有大小不可棄也六軍如林未必皆勇仁者政之脂粉刑者世之轡策當怒不怒姦臣為虎當殺不殺大賊乃發鑽端之火勺水可滅鵠卵未乳指掌可靡及其乘衝颷燎巨野奮六翮凌朝霞雖智勇不能制也委轡策而乘奔馬于險途捨柂櫓而泛輕舟于江海豈不險哉金舟不能浚陽侯之波玉馬不任騁千里之迹戓輸自售之寶或賣要人之書或父兄貴顯望門而辟命或低頭屈膝積習而見收語曰舉秀才不知書察孝廉父别居寒素淸白濁如泥高第良將怯如黽諺日古人欲達勤讀經今世圖官免治生余謂朋友之交不宜浮雜面而不心揚雄所譏眀鏡舉則傾冠見羲和照則曲影覺周勃社稷之臣不能答錢穀之數識珍者必拾濁水之明珠賞氣者必將穢藪之芳蕙自非懸鑑誰能披泥抽淪玉澄川掇沈珠智大者盤桓以山峙器小者蓬飛而萍浮繩枉木之所憎清公姦願之所讐文王之接吕望桑陰未移而知其可師矣德之見孔眀晷景未改而腹心以委矣貌望豐偉者不必賢形氣尫一作瘁者不必愚伯喈識絶音之器于煙燼之餘平子别逸響之竹于未用之前威儀如龍虎盤旋成規矩酒後體輕耳冠脫帶解遲重者蓬轉而波偃整肅者鹿踊而魚躍口訥者皆搖掌以譜聲不競者皆裨膽以高發以九折同蟻封以呂梁同牛迹禁之彌極不可向也君若畏酒如畏疾一作風憎醉如憎大一本無大字病則無荒沈之咎矣民有穴地而釀油囊懷酒者法輕利重安能令絶乎管輅頓仰三斗而淸辨綺粲揚雄酒不離口而太乃就慕惡者如宵蟲之赴明燭學惡者如輕埃之應飈風有斧無柯無如之何以傾倚屈申者為妍媚以風格端嚴者為田舍豈不惑也窮巷諸生吟誦而向枯簡匍匐而守黃卷低眉屈膝趨事豪貴毛成翼長蟬蛻泉壤自乃軒昂此卑碎之徒也昔西施以心痛臥于道側蘭麝芬芳人皆美之鄰女慕焉人皆憎之猶世人效戴叔鸞阮嗣宗也逢世所貴則蹇驢龍駿之價狐白不可以當暑龍艘不可以乘陸夫良將剛則法天可望而不可干柔則象淵可觀而不可入去如收電可見而不可追住如丘山可觀而不可動春以長矛在前夏以大戟在前秋以弓弩在前冬以刀盾在前此行軍四時應天法也太公云從擊虛萬人無餘一女子當百丈夫風鳴葉者賊在十里鳴條者百里搖枝者四百里金器自鳴及焦器鳴者軍疲也氣如驚鹿敗軍氣也雨露霑衣裳者謂潤兵不霑衣裳者謂泣軍軍兵太一在玉帳之中不可攻也兵地生蟹者宜速移余嘗問嵇生曰左太沖張茂先可謂通人乎君道答曰通人者聖人之次也其間無所復容余聞班固云吕氏望雲而知高祖所在天豈獨開吕氏之目而掩衆人之目耶閹官無情不得謂貞倡獨不飮不可謂廉文王食子羮佯不知非甘也董仲舒學見深而天才鈍以蜉蜂是神龍者非但不識神龍亦不識蜉蜂案蜉蜂未聞太平御覽引之作蜥蝪王仲任撫班固背曰此兒必為天下知名五嶺無冬殞之木南海晉安有九熟之稻老君玉䇿日松脂入地千年作茯苓茯苓千年作琥珀琥珀千年作石膽石膽千年作威喜炙鼓使鳴絞令悲實使鼓速穿早絶一本鼓下有迷字磨刀殺馬立可驗也蜉蜂窠作蠟水沫作浮石落星缸謂吳時星落汲冡書云黃帝仙去其臣有左徹者削木作黃帝之像帥諸侯奉之食鵠胎令人能夜書河伯華陰人以八月上庚日渡可溺死天帝署作河伯鵝鬼吳景帝有疾召巫覡帝試之乃殺鵝埋于苑中架小屋施牀帳以婦人履著其前巫云但見一白鵝不見婦人也帝乃重之獼猴鬼余友人膠永叔嘗養一大獼猴以鐡鎖鎖之于牀間犬齧殺經百日許見鬼者云承塵上有獼猴被瘡流血余從祖得道能分形座上有一葛公與客談話又一公迎來送去余見二陸之文百卷許似未盡也方之他人若江漢與潢汙也嵇生云每讀二陸之文未嘗不廢卷而歎恐其卷盡也陸子十篇誠謂快書其辭富者雖精思不可損也其理約者雖鴻筆不可益也觀此二人豈徒儒雅之士文章之人也抱朴子曰秦時不覺無鼻之醜陽翟憎無癭之人陸君深識文章放蕩不作虛誕之言非不能也陸君之文猶圃積玉無非夜光却後數百年若有幹迹如二陸猶比肩也不謂疏矣孔鄭之門耳聽口受者皆巳滅絶唯託竹素者可謂世寶羈鞍仁義纓鎖禮樂禰衡常云孔融荀彧強可與語餘人酒甕飯囊上世之人冰霜結而不寒資糧絶而不飢獺多則魚擾鷹衆則鳥亂盈丈之尾必非咫尺之軀尋仞之牙必非膚寸之口余友人伯先生以儒墨作城池以機神作干戈洪字稚川丹陽句容人其先葛天氏洪纍遭火典籍盡乃笈徒步借書抄寫賣薪買紙然火披覽所寫皆反覆有字人少能讀之性質容易冠纓垢敝或廣衣大帶或促身修袖或長裾曳地或短不蔽膝時人咸稱抱朴之士因以著書名焉洪貧無僕童籬落不修常披榛出門排草入室洪性不干犯官長不煩擾親族嵇君道作廣州刺史表洪參軍乃非所樂利得避身于南地也洪年十五大作詩賦自謂可行於代至弱冠尋覽殊不稱意一時毁之洪不圍碁摴蒱見人博奕了不觀之意林卷四
