  - {type: variant, offset: 1586, length: 408, content: 于戸部尙書贈右僕射諡曰㦤陳振孫書錄解題稱總仕至大理評事則振孫攷之未審矣梁庾仲容取周秦以來諸家雜記凡一百七家摘其要語爲三十卷名曰子鈔總以其繁略失中復增損以成此書宋高似孫子略稱仲容子鈔每家或取數句或一二百言馬總意林一遵庾目多者十餘句少者一二言比子鈔更爲取之嚴錄之精今觀所采諸子今多不傳者惟頼此僅存其槪其傳于今者如老莊管列諸家亦多與今本不同不特孟子之文如容齋隨筆所云也前有戴叔倫柳伯存二序與文獻通考所載相同其書唐志作一卷叔倫序云三軸伯存序又云六卷今書乃止五卷且攷子鈔原目凡一百七家此本止七十一家又或有錄無書洪氏載總所引書尙有蔣子譙子鍾子張儼黙記裴氏新書袁淮正書袁子正論子張顯析言于子顧子諸葛子陳子要言符子諸書此本不載又通考稱今本相鶴經自意林鈔出而永樂大典有風俗通姓氏篇題曰出馬總意林此本亦並無之合計卷帙當巳失其半非總之原本矣然殘璋斷璧固益可寶貴也乾隆四十七年十月恭校上總纂官兵部侍郞臣紀昀大理寺臣陸錫熊纂修官右贊善臣季學錦, HFL: ''}
  - {type: variant, offset: 1586, length: 539, content: 于戸部尙書贈右僕射諡曰㦤陳振孫書錄解題稱總仕至大理評事則振孫攷之未審矣梁庾仲容取周秦以來諸家雜記凡一百七家摘其要語爲三十卷名曰子鈔總以其繁略失中復增損以成此書宋高似孫子略稱仲容子鈔每家或取數句或一二百言馬總意林一遵庾目多者十餘句少者一二言比子鈔更爲取之嚴錄之精今觀所采諸子今多不傳者惟頼此僅存其槪其傳于今者如老莊管列諸家亦多與今本不同不特孟子之文如容齋隨筆所云也前有戴叔倫柳伯存二序與文獻通考所載相同其書唐志作一卷叔倫序云三軸伯存序又云六卷今書乃止五卷且攷子鈔原目凡一百七家此本止七十一家又或有錄無書洪氏載總所引書尙有蔣子譙子鍾子張儼黙記裴氏新書袁淮正書袁子正論子張顯析言于子顧子諸葛子陳子要言符子諸書此本不載又通考稱今本相鶴經自意林鈔出而永樂大典有風俗通姓氏篇題曰出馬總意林此本亦並無之合計卷帙當巳失其半非總之原本矣然殘璋斷璧固益可寶貴也乾隆四十七年十月恭校上總纂官兵部侍郞臣紀昀大理寺臣陸錫熊纂修官右贊善臣季學錦意林卷二缺文照宋刻補鶡冠子三卷鳥鵲之巢可俯而窺麋鹿之居可招而係此在上者慈心扁鵲兄弟三人並醫魏文侯問曰子三人其孰最善扁鵲鍼人血脈投人毒藥故名聞諸侯王孫子一卷衛公重裘累茵見薪者而屢哭之問曰何故對曰雪下衣薄故失薪衛公顔色大懼乃開府金出倉粟以賑貧窮吾恐鄰國貪養賢以勝吾也, ZTDZ: ''}
