  - {type: line-break, offset: 0, content: '', id: KR5g0071_SBCK_000-1a01}
  - {type: variant, offset: 0, length: 462, content: 御製題武英殿聚珍版十韻有序校輯永樂大典内之散零編並蒐訪天下遺籍不下萬餘種彚爲四庫全書擇人所罕覯有裨世道人心及足資考鏡者剞劂流傳嘉惠來學苐種多則付雕非易董武英殿事金以活字法爲請旣不濫費棗棃又不久淹歲月用力省而程功速至簡且捷考昔沈括筆談記宋慶歴中有畢昇爲活版以膠泥燒成而陸深金臺紀聞則云毘陵人初用鉛字視版印尤巧便斯皆活版之權輿顧埏泥體麤鎔鉛質輭俱不及鋟木之工緻兹刻單字計二十五萬餘雖數百十種之書悉可取給而校讐之精今更有勝於古所云者苐活字版之名不雅馴因以聚珍名之而系以詩稽古搜四庫於今突五車開鐫思壽世積版或充閭張帖唐院集周文梁代餘同爲製活字用以印全書精越鶡冠體昨歲江南所進之書有鶡冠子卽活字版苐字體不工且多訛謬耳富過鄴架儲機圓省雕氏功倍謝鈔胥聯腋事堪例埏泥法似疎毀銅昔悔彼康年間編纂古今圖書集成刻銅字爲活版排印蕆工貯之武英殿歴年旣久銅字或被缺少司事者懼干咎適値乾隆初年京師錢貴遂請毁銅字供鑄從之所得有限而所耗甚多巳爲非計且使銅字尙存則今之印書不更事半功倍乎深爲惜之刊木此慙予旣復羨棃棗還教愼魯魚成編示來學嘉惠志符初乾隆甲午仲夏御題, HFL: ''}
