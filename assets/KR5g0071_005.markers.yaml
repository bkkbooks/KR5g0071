  - {type: variant, offset: 1225, length: 6456, content: 同則述人之所長我者我又加厚焉案天中記引此厚焉下有未有與人交者此而見憎者也二句疑我者我又加信焉難必相恤利必相及事君不爲君所知忠未至也與人交不爲人所信義未至也父母不好學業惡子孫學之可違而學也父母不好士惡子孫友之可違而交也英辭雨集妙句雲來愛惡相攻命之自然也愜快以志人情之所欲也舌下泉咽之名曰胎食得道者生六翮于臂長毛羽于腹飛無階之蒼天度無窮之世俗北方寒而人壽南方暑而人夭如蠶寒而飢則引日多温而飽則引曰少湯契後秦益後益卽臯陶子也典論五卷魏文帝堯崩舜避堯子于南河之南舜崩禹避舜子于陽城禹崩益避禹子于箕山之陰事見史記如彼登山乃勤以求高如彼浮海乃勤以求遠惟心弗勤時亦靡克應瑒云人生固有仁心答云在親曰孝施物曰仁仁者有事之實名非無事之虛稱善者道之母羣行之主序云佞邪穢政愛惡敗俗國有此二事欲不危亡不可得也桓靈之際閹寺專命于上布衣橫議于下干祿者殫貨以奉貴要名者傾身以事勢位成乎私門名定乎横巷由是戸異議人殊論論無常檢事無定價長愛惡興朋黨夷吾侈而鮑叔廉此其志不同也張竦潔而陳遵汚此其行不齊也主與民有三求求其爲己勞求其爲己死求其爲己生法者主之柄吏者民之命法欲簡而明吏欲公而平詩刺艷妻書誡晨婦司隷馮方女有國色避亂揚州袁術登城見而悦之遂取焉甚寵之諸婦教之曰將軍貴人重其志節宜數涕泣示憂愁也若如此必加重馮氏後每見術垂泣術果以謂有心益寵之諸婦乃共絞殺懸之于厠言其哀怨自殺術以其不得志而死厚加殯殮袁紹妻劉氏甚妒忌紹死未殯劉氏殺其妾五人恐死者有知復能寵之乃髠頭黑面以毁其容上洛都尉王琰以功受封其妻泣于内恐琰富貫更取妻妾荆州牧劉表跨有南土子弟驕貴以酒器名三爵上者曰伯雅受七勝中雅受六勝季雅受五勝又設大鍼于杖端有醉者輒以劖刺之驗其醉醒人形性同于庶勞則早斃逸則晚死余喜彈碁畧盡其巧少嘗作賦昔京師有東方安世張公子嘗恨不得與彼數子對之太子篇序云余隆寵忝當上嗣憂惶踧踖上疏自陳欲繁辭博稱則父子之間不文也欲畧言說則喜懼之心不達也里語曰汝無自譽觀汝作家書言其難也魏子十卷源靜則流淸本正則末茂内修則外理形端則影天生君子所以治小人天生小人所以奉君子無君子則無以畜小人無小人則無以養君子錄人一善則無棄人採材一用則無棄材人皆易華嶽以謂卑小故登之而摧傷難天以謂高大故不昇而無殃鼎以希出而世重之釜鐺常用而世輕之古有弟子病師數往看之師至弟于輒起因勞而致死師非不仁弟子非無禮傷于數也薄冰當白日聚毛遇猛火雖欲遠害其勢不可蓼蟲在蓼則生在芥則死非蓼仁而芥賊失于本不可也案藝文聚太平御覧竝作本不可失也諺曰己是而彼非不當與非爭彼是而己非不當與是爭君子表不隱裏明暗同度苦躬一作窮富貴之梯階仲尼無契券于天下而德著古今善惡明也鏡照醜好而人不怨法明善惡而人不恨人物志三卷劉邵案邵旁魏志从力釋文从卩草之精秀者英獸之將羣者雄張良是英韓信是雄任子十卷名奕學所以治巳教所以治人喜能歌舞怒能戰鬬一人之智不如衆人之愚一目之察不如衆目之明生于治長于治知世之所以治者君子也生于亂長于亂知世之所以亂者君子也若不知治亂之所因者凡民也道德之懷民猶春陽之柔物履深冰而不寒結木條而不折天之圓也不中規地之方也不中矩山必有阜河必有曲江漢東流必有迴復木無陰士無徒是以賢人士常不容于世登泰山見天下之大不察細微者視遠故也處高位知人主之貴不䘏卑賤者意滿故也治巳審則可以治人治人審則可以治天下累世一聖是繼踵千里一賢是比肩水可乾而不可奪濕火可滅而不可奪金可柔而不可奪重石可破而不可奪堅諺云富不學奢而奢貧不學儉而儉人情皆然唯聖人能節之木氣人勇金氣人剛火氣人强而躁土氣人智而寛水氣人急而賊神龍不處網罟之水鳯凰不翔罻羅之鄉賢人不入危國智者不輔亂君蕭何守文法曹參務無苛相繼作相天下安武帝輕人命重武功飾宮室厚賦斂土地益廣德惠彌狹桓譚云王者易輔伯者難佐篤論四卷杜恕水性勝火分之以釜甑則火强而水弱人性勝志分之以利欲則志强而性弱攷實性行莫過于鄉閭校才選能莫善于對策陛下謂以今世無良才朝廷乏賢佐豈可追前世之稷契坐待後來之俊乂可能治乎杜氏始出帝堯在周爲唐杜氏漢世有杜周杜飲杜篤畿字伯侯魏書有傳畿長子理字務仲少而機察故名曰理少子恕字務伯恕在河東坐臥恒避父住處恕子預字元凱晉書有傳體論四卷杜恕不動如山難知如陰人有厚德無問小節人有大舉無訾小故隨侯之珠不能無纇夫人臣猶如土也萬物載焉而不辭其重水瀆汚焉而不辭其下草木植焉而不有其功夫行者榮辱之皁白君子居必選鄉遊必擇士至人之治也處國於不傾之地積政於萬全之鄉載德於不止之輿行令於無竭之倉使民於不爭之塗開法於必得之方庶民水也君子舟也水所以載舟亦所以覆舟恕性疎愶但飽食而巳家有書傳頗嘗涉歴父憂行喪在禮多愆孝聲不聞後除中郎又作黄門郎同朝友人問余志余答日見大臣論議或黨甲苦乙所親或黨乙謗甲所親余處甲乙之間幸無毁譽耳傅子一百二十卷木大者發越小者敷揚土是人之母也故人有戀土之心買隣人價貴宅宅可買隣不可得也冠堯之冠行桀之行亦桀也服桀之服行堯之行亦堯也處市井之肆服君子之服在小人之中行賢哲之事猶夜行珮珠玉也亦灼然矣蜘蛛作羅蜂之作窠其巧亦妙矣況復人乎黃金累千不如一賢人而無廉猶衣服之無殺食味之無酸醎郭林宗謂仇季智曰子嘗有過否季智曰暮飯牛牛不食搏牛一下語曰土非璧也談者謂價耳談者之口猶愛憎之心智慧多則引血氣如燈火之於脂膏炷大而明明則膏消炷小而暗暗則膏息息則能長久也雄聲而雌視者虛僞人也氣急而聲重者敦實人也恬築長城人不堪苦白骨山積乃有歌曰生男愼勿舉生女哺用脯不見長城下白骨相撑拄一作棖柱作黄金者是方士取草屑合金燒之故草屑燃金落下太元經十四卷梁國楊泉字德淵怒如烈冬喜如温春鸞鶵鳯子養甡高峙隱耀深林不食滓穢内淸外濁弊衣裹玉十里九坎牛馬低昂天氣左轉星辰右行隂陽運度報返相迎強梁者亡掘强者折大健者跋大利者缺激氣成風湧氣成雨濁霧成雪淸露成霜化淸經十卷濁者不信淵之淸而甘濯其濁矣動則虎發靜如鱗潛若彼赫赫若此洋洋將飛者翼伏將奮者足跼將噬者爪縮將言者口黙將文者且朴鄒子一卷欲知其人視其朋友蒺蔾在田良苗無所措其根佞邪在朝忠無所容其身寡門不入宿臨甑不取塵避嫌也成敗志三卷孫毓字仲案釋文毓字休朗北海平昌人晉豫州刺史隋志晉汝南太守又云長汝太守武帝咸寜間人有毛詩評左傳注等書又有七廟諱議見通典此云字仲蓋有脫誤隋唐志三卷今佚水性雖能流不則不通人性雖能智不教則不達學猶植也不學將落密者天地之際會成敗之機要故陰陽不密則寒暑不能以成歲棟宇不密則九層不可以庇身古今通論三卷王嬰崑崙東南方五千里謂之神州州中有和羮鄉方三千里五嶽之域帝王之宅聖人所生也倉頡造書形立謂之文聲具謂之字字者取其孶乳相生在於竹帛謂之書中論六卷徐偉長作任氏注倚立而思遠不如速行之必至矯首而徇飛不如修翼之必獲孤居而願智不如積學之必達君子不卹年之將暮而憂志之有倦道之於人甚簡且易不若採金攻玉渉艱難也路不險則無以知馬之良任不重則無以知人之材君子相見非但興善將以攻惡惡不廢則善不興療暑莫如親水救寒莫如重裘止謗莫如修身善釣者不易淵而殉魚君子不降席而追道小人恥其面不如子都君子恥其行不如舜禹故小人貴明鑒君子尚至言射以平志御以和心書以綴事教以理煩利口者如激風之至暴雨之集不論是非不識曲期于不窮務于必勝辯者别也言其善分别事非謂言辭㨗給而凌善人也聖人蹈機握杼織成天下之化使萬物順焉人倫正焉登高而建旗則所視者廣順風而奮鐸則所聞者遠非旌色益明鐸聲遠長所託得地而況富貴施政令乎良農不患疆場之不修患風雨之不節君子不患道德之不建而患其時之不至聖人之世不交遊也周道衰而交遊興古之交也近今之交也遠古之交也求賢今之交也爲名取士不由鄕黨考行不本閨閾多助者則稱賢才少愛者則謂不肖馬必待乘而後致遠醫必待使而後愈疾賢者待用而後興理唐子十卷名滂字惠潤生吳太元二年舟循川則游速人順路則不迷大木百尋根積深也滄海萬仞衆流成也淵智達洞累學之功也君子以道成冠以道成輿出門不冠則不敢行行非輿則不可步有父不能孝有兄不能敬而論人父子之義昆弟之節鷹隼羣飛鳯凰遠遊小人成列君子深藏諺曰脂粉雖多醜面不加膏澤雖光不可潤草古人目短于自見故以鏡觀形心短于自治故以禮自防君子不以昏行易操不以夜昧案一本作寤易容夫士有高世之名必有俗之累有絶羣之節必嬰謗嗤之患白骨擬象魚目似珠遥聽遠望無不亂也禍福相轉利害相生如循環而運丸耳其兆不可見其端不可覺良將如山如淵人不知其慼亦不知其歡將勿離旗鼓師之耳目暴至之榮智者不居守財不施謂之錢奴佐鬭者傷預事者亡秦子二卷欲顯白于雪中馳光于日下不可得也顔彦先難云有味如醽而不醉人其味如飮之則醉何也秦子日醉在小人不在君子吾欲錦中而紵表不欲繡外而麻裏猶論者寜匱于辭不匱于理遠難知者天近難知者人因斧以得柯因柯以成用種一粟則千萬之粟滋種一仁則衆行之美備矣鍼雖小入水則沈毛雖大入水則浮性自然也梅子一卷伊尹吕望傅說箕子夷齊柳惠顔淵莊周阮籍易地而居能行所不能行也阮籍孝盡其親忠不忘君明不遺身智不預事愚不亂治自莊周巳來命世大賢其惟阮先生乎按其書晉人也物理論十六卷欲定天下而任小人者猶欲捕麞鹿而張不可得也忿飈焚衣其損多矣忿爨之案太平御覽引物理論作忿爨之未熟覆甑而棄之所吉亦多矣語意亦通則當爲熟上增未字推甑而棄之損益多語曰上不正下參差古者所以不欺其民也割剥富強以養貧弱何異餓耕牛乘馬而飽吠犬棄干將而礪鉛刃也論語聖人之至教王者之大化鄉黨篇則有朝廷之儀聘享之禮堯曰篇則有禪代之事夫文彩之在人猶榮華之在草天地成歲也先春而後秋人君之治也先禮而後刑救嬰孩之疾而不忍鍼艾更加他物以至死也今除肉刑危者更衆何異服他藥也肉刑雖斬其足猶能生育也張倉除肉刑毎歲所殺萬計鍾繇復肉刑歲生二千人也名肉刑者猶鳥獸登俎而作肉漢太宗除肉刑匹夫之仁也非天下之仁也不忍殘人之體而忍殺人故曰匹夫今有弱子當陷大辟問其慈父必乞以肉刑代之苟可以生易死也有道之君能不以此加百姓乎蛇螫在手壯夫斷其腕謂其雖斷不死也曹羲曰縶馴駒以縿絆御悍馬以腐索今制民以輕刑亦如此也但知管子借耳于天下不知堯借人心而後用其耳目昔燕趙之間有三男共娶一女生四子後爭訟廷尉延夀奏云禽獸生子逐母宜以子還母尸三男于市塞一蟻孔而河決息施一車轄而覆乘止立法令者亦宜舉要禮云繼父服齊衰傅子曰母捨巳父更嫁他人舉巳父甚於兩絶天也案一本作與己父絶甚于兩夫也注云絶字舊誤在兩字下則是以天爲夫字耳又制服恐非周孔所制亡秦焚書以後俗儒造之妄進者若卵投石逃誅者走赴深曄若春華之並發馥若秋蘭之俱茂樹上懸瓠非木實也背上被裘非脊毛也此似而非九日養親一日餓之豈得言孝飽多饑少固非孝乎穀馬十日一日餓之馬肥不損於義無傷不可同之一日餓母也漢末有管秋陽者與弟及伴一人避亂俱行天雨雪糧絶謂其弟曰今不食伴則三人俱死乃與弟共殺之得糧達舍後遇赦無罪此人可謂善士乎孔文舉曰管秋陽愛先人遺體食伴無嫌也荀侍中難曰秋陽貪生殺生豈不罪邪文舉曰此伴非會友也若管仲啖鮑叔貢禹食王陽此則不可向所殺者猶鳥獸而能言耳今有犬齧一狸狸齧一鸚䳇何足怪也昔重耳戀齊女而欲食狐偃叔敖怒楚師而欲食伍參賢哲之忿猶欲啖人而況遭窮者乎見虎一毛不知其斑道家笑儒者之拘儒者嗤道家之放皆不見本也止響以聲逐影以形姦爭流蕩不知所止也傅子云孟軻荀卿若在孔門非唯游夏而巳乃冉閔之徒也積薪若山縱火其下火未及燃一杯之水尚可滅也及至火猛風起雖傾河海不能救也秦昭王是積薪而縱火其下始皇燃而方熾二世起風而怒也秦人視山東之民猶猛虎之睨羣羊何隔憚哉范蠡字少伯楚三戸人也使越滅吳巳後乘輕舟遊五湖王令人寫其狀恒朝禮之列仙傳云徐人也傅氏之先出自陶唐傅說之後字休奕子咸字長虞晉書有傳楚漢之際有好事者作世本上錄黄帝下逮漢末班固漢書因父得成遂沒不言彪殊異馬遷也吾觀班固漢書論國體則飾主闕而抑忠臣叙世教則貴取容而賤直節述時務則謹辭章而畧事實非良史也大孝養志其次養形養志者盡其和養形者不失其敬割地利巳天下讐之推心及物天下歸之以信接人天下信之不以信接人妻子疑之見疑妻子難以事君君子修身居位非利名也在乎仁義人皆知滌其器莫知洗其心君子審其宗而後學眀其道而後行子曰學以道達榮不以位顯或云衡以善詩至宰相張禹以善論作帝師豈非儒學之榮乎墨子兼愛是廢親也短喪是忘憂也伊尹耕於有莘孰知非夏之野人呂尙釣於渭濵孰知非殷之漁者遇湯文武然後知其非也面岐路者有行迷之慮仰高山者有飛天之志或乘馬或乘車而俱至秦者所謂形異而實同也謂黃帝後方有舟檝庖羲之時長江大河何所用之經巨海者終年不見其涯測虞淵者終世不知其底故近者不可以度遠也漢世賤軺車而今貴之靑與赤謂之文赤與白謂之章白與黑謂之黼黑與青謂之黻五彩謂之繡始皇塚令匠人作機弩有人穿者卽射之以人魚膏作燭逐兎之犬終朝尋兎不失其迹雖見麋鹿不暇顧也漢高祖度闊而網疎故後世推誠而簡光武教一而網密故後世守常而禮義魏武糺亂以尚猛天下修法而貴理形之正不求影之而影自聲之平不求響之和而響自和德之崇不求名之遠而名自遠西國胡言蘇合香是獸便中國獸便而臭忽聞西極獸便而香則不信矣必得崑山之玉而後寳則荆璞無夜光之美必須南國之珠而後珍則隨侯無明月之稱始皇遠遊並海而不免平臺之變及葬驪山尋見發掘今有鉛錫之鋌雖歐冶百錬猶不如瓦刀有駑駘之馬雖造父駕之終不及飛絶景質鈍故也土不可作鐵而可以作瓦相者曰三亭九候定于一尺之面愚智勇怯形于一寸之目天倉金匱以别貧富貴賤光武鳯翔于南陽燕雀化作鵷鶵二漢之臣焕爛如三辰之附長天長平之卒磊落如秋草之中繁霜使然也長人數丈身横九畝兩頭異頸四臂共骨老人生角男女變化何益於賢愚耶豈有太一之君坐於庶人之座魁罡之神存於匹婦之室傅子曰諸葛亮誠一時之異人也治國有分御軍有法積功興業事得其機入無遺刃出有餘糧知蜀本弱而危故持重以鎭之若姜維欲速立其功勇而無決也馬先生綾機先生名鈞字衡天下之名巧也綾機本五十綜五十六十綜六十先生乃易十二奇文異變因感而作自能成陰陽無窮也案一作猶自然成形隂陽無窮也指南車見周官亦見鬼谷子先生作給事中與高堂隆秦朗爭指南車二子云古無此車記虛言耳先生曰爭虛空言不如試之效也言於明帝明帝詔使作之車乃成翻車先生居在京師城内有地作園而患無水可漑乃作翻車令童兒轉之其功百倍辯上下者莫正乎位興國家者莫貴乎人統内外者莫齊乎分宣德教者莫明乎學秉綱而目自張執本而末自從善賞者賞一善而天下之善皆勸善罰者罰一惡而天下之惡皆除矣世質則官少時文則吏多有虞氏官五十夏后官一百殷有二百周有三百國典之墜猶位喪也位之不建名理廢也以譽取人則權勢移於下而朋黨之交用以功進士則有德者未必授而凡下之人或見任也君子内洗其心以虛受人外設法度立不易方今人稱古多賢患世無人退不三思坐語一世豈不惑邪人之性如水焉置之圓則圓置之方則方澄之則渟而淸動之則流而濁先王知中流之易擾亂故隨而教之謂其偏好者故立一定之法龍舟整檝王良不能執也驥騄齊行越人不敢御也各有所能搆大厦者先擇匠而後簡材治國家者先擇佐而後定民人之學如渴而飮河海大飮則大盈小飮則小盈大觀則大見小觀則小見金以利用錢以輕流此二物飢不可食入粟補吏是賣官也罪人以贖是縱惡也世富錢流則禁盜鑄錢世貧錢滯則禁盜壞錢天下之害莫害於女飾一頭之飾盈千金之價婢妾之服亦重四海之珍公卿大夫刻石作碑鐫石作虎碑虎崇僞陳於三衢妨功喪德異端並起撞亡秦之鍾作鄭衞之樂欲以興治豈不難哉賞不避疎賤罰不避親貴貴有常名而賤不得冒尊有定位而卑不敢逾經之以道德緯之以仁義織之以禮法旣成而後用之謂有孝廉秀才之貢或千里望風承聲而舉故任實者漸消積虛者曰長聞一善言見一善事行之唯恐不及聞一惡言見一惡事遠之唯恐不速懸千金於市市人不敢取者分定也委一錢於路童兒爭之者分未定也三皇貴道而尙德五帝先仁而後義三王先義而後辭鴻毛一羽在水而没者無勢也黄金萬鈞在舟而浮者託舟之也擬金人銘作口銘曰神以感通心由口宣福生有兆禍來有端情莫多妄口莫多言蟻孔潰河淄川傾山病從口入患自口出存亡之機開闔之術口與心謀安危之源樞機之發榮辱隨焉夫有公心必有公道愛巳者不能不愛憎巳者不能不憎民富則安鄉重家敬上而從教貧則危鄕輕家相聚而犯上飢寒切身而不行非者寡矣我欲戰而彼不欲戰者我鼓而進之若山崩河溢當其衝者摧值其鋒者破所謂疾雷不暇掩耳則又誰禦之吳起吮瘡者之膿積恩以感下也史記云吳起吮癰晝戰目相見夜戰耳相聞得利同失利相救陸田者命懸於天人力雖修水旱不時則一年之功棄矣水田制之由人人力苟修則地利可盡傅子曰聖人之道如天地諸子之異如四時四時相反天地合而通焉人之涉也譬如奕棊茍不盡道誰無死地但不幸耳意林卷五, HFL: ''}
