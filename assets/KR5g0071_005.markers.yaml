  - {type: variant, offset: 0, length: 1224, content: 意林卷五唐馬總撰周生烈子五卷序云六蔽鄙夫燉煌周生烈字文逸張角敗後天下潰亂哀苦之間故著此書以堯舜作幹植仲尼作師誡御馬失節其車是碎御天下失節四海失墜桀紂是湯武之梯秦項是大漢之階四逆不興則四順不昇賢哲不可以色貌誘之猶張羅恤鳯施穽誘麟伯樂相馬取之于瘦聖人相士取之于疎聽訟不如使勿訟善斷不如使勿亂理天綱仗八柄運元象撮衆有者天子也撫人物參天意者三公也執分節事修理者士也臨死修善于計巳晚事迫乃歸于救巳微有階者易成基無因者難成時鳩傅隼翼羔披豹皮似質違表是裏非人者天之舌物者神之口天高地厚報應故晚辭者主之弓弩教者君之機關矜賞若春重罰若秋行禮若火流教若水讓一得百爭十失九荀悦申鑒五卷序云夫道本仁義五經以經之羣籍以緯之前鑒旣明今又申之故曰申鑒君臣親而有禮百官和而不同此治國之風也禮俗不一庶人作議此衰國之風也君臣爭盟大夫爭名此乖國之風也上多欲下多端法不定政多門此亂國之風也以割下作能附上作忠此叛國之風也小臣爭寵大臣爭權此害國之風也上不訪下不諌婦言用内政行此亡國之風也善禁者先禁身而後人不善禁者先禁人而後身三曰致武事四曰禁數赦案時事篇十九事三曰置上武之官十七日禁數赦今此有缺誤秦之滅學也書朽于屋壁義絶于朝野學聖不至聖可以盡生學壽不至壽可以盡命君子有三鑒鑒乎前鑒乎人鑒乎鏡下不鉗口上不塞耳則有所聞矣思唐虞于上世瞻仲尼于中古乃知小道者足羞也思伯夷于首陽想四皓于商山乃知穢志者足恥也存張騫于西極念蘇武于朔方乃知懷安者足鄙也仲長統昌言十卷教化以禮義爲宗禮義以典籍爲本常道行于百世權宜用于一時高辛巳往則聞其人不見其書唐虞夏殷則見其書不詳其事周氏巳來載籍具矣後嗣愚王見天下莫與之違奔其私情騁其邪欲君臣宣淫上下同惡目極角觝之觀耳蒙鄭衛之聲入則騁于婦人而不反出則馳于田弋而不還信任親愛寵貴后妃命移運去不自知也建旗伐鼓高烽眀候守邊之猛將非中國之良吏和鑾法駕清道而行便辟揖讓諸夏之威儀非夷狄之有也董賢之于哀帝無骨肉絲髪之親又不能傳其氣定其繼嗣以丈夫宴接之歡自成膠漆也景帝顯位刺史者皆是宦臣子弟猶如豺狼守肉鬼魅侍疾曰在天之内在人之外一本日作口案此節疑有訛缺人愛我我愛之人憎我我憎之天下士有三俗選士而論族姓閥閱一俗交游趨富貴之門二俗畏服不接于貴尊三俗天下之士有三可賤慕名而不知實一可賤不敢正是非于富貴二可賤向盛背衰三可賤天下學士有三姦焉實不知詳與佯通不言一也竊他人之說以成巳說二也受無名者移知者三也知言而不能行謂之疾此疾雖有天醫莫能治也同于我者何必可愛異于我者何必可憎知足以立難成之事能足以圖案句有缺文附者不黨疎者不遺婦人有朝哭良人暮適他士涉歴百庭顔色不愧今公侯之宮美女數百卿士之家侍妾數十晝則以醇酒淋其骨髓夜則以房室輸其血氣人之性有山峙淵渟者患在不通嚴剛貶絶者患在傷士廣大闊蕩者患在無檢和順恭愼者患在少斷端慤淸潔者患在拘狹辯通有辭者患在多言安舒沈重者患在後時好古守經者患在不變勇毅果敢者患在險害疏濯胸臆澡雪腹心使之芬香皓潔白不可汚也道德仁義天性也織之以成其物鍊之以致其精之以發其光幽間則攻人之所短, HFL: ''}
