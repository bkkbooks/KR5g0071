  - {type: variant, offset: 7659, length: 1, content: 涉, ZTDZ: 材君子相見非但興善將以攻惡惡不廢則善不興療暑莫如親水救寒莫如重裘止謗莫如修身善釣者不易淵而釣君子不鄰席而追道小人恥其面不如子都君子恥其行不如舜禹故小人貴明鑒君子尚至言射以平志御以和心書以綴事數以理煩利如激風之至暴雨之集不論是非不議直曲期於不窮激放必勝辯者别}
  - {type: page-break, offset: 7659, content: '', id: KR5g0071_SJB_005-320522c, image: sjb/32/320522c.png}
  - {type: variant, offset: 7661, length: 5, content: 譬如奕棊茍, ZTDZ: 言其善分别事類非謂言辭捷給而淩善人也聖人蹈機掘杼織成天地使萬物順焉人倫正焉登高而建旗則所示者廣順風而奮鐸則所聞者遠非旌色益明鐸聲遠長所託得地而況富貴施政令乎良農}
  - {type: variant, offset: 7667, length: 1, content: 盡, ZTDZ: 患壃場之不修而患風雨之不節君子不患}
  - {type: variant, offset: 7669, length: 5, content: 誰無死地但, ZTDZ: 德之}
  - {type: variant, offset: 7675, length: 2, content: 幸耳, ZTDZ: 建而患其時之不至聖人之世不交遊也周道衰而交遊興古之交也近今之交也遠古之交也求賢今之交也爲名取不由郷黨考行不本閨閾多助者則稱賢才少愛者則謂不肖馬必待乘而後致遠醫必待使而後愈疾賢者待用而後興理}
