  - {type: variant, offset: 10523, length: 400, content: 意林逸文海昌周廣業輯鶡冠子云扁鵲兄弟三人並毉魏文侯問孰最善扁鵲云長兄神眎故名不聞家仲兄神毫毛故名不出門臣針人血脈投人毒藥故名聞諸侯世賢篇錦繡萬花谷後集毉注云出意林神農稽首再拜問于太一小子曰鑿井出泉五味煎煮口别生熟後乃含咀男女異利子識其父曾聞上古之時人壽過百無殂落之咎獨何氣之使耶太一小子曰天有九門中道最良曰月行之名國皇字人老老人出現其方長生長生死衆曜同光神農從其嘗藥以致人命路史後紀炎帝紀注引唐馬總意林袁准正書太歲在酉乞漿得酒太歲在已販妻鬻子則知災祥有自然之理施元之注蘇詩引馬總意林叔敖作期思陂而荆土用贍天中記陂引意林蘭以芳致燒膏以肥見翠以羽殃身蚌以珠破腹女惡蛾眉士惡勝已由來尙矣天中記蘭引意林右計五條皆今本所闕者路史注一則尤爲古奧惜羅氏失記書名不知僕射從何錄出也意林在明世已非完帙故天中記所載率與廖本相同而亦有兩條絕異者此必别有依據自惟固陋不能博考先就所見集之亦虬龍片甲鳯凰一毛也俟該洽者重爲增益焉, ZTDZ: ''}
