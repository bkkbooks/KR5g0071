  - {type: line-break, offset: 955, content: '', id: KR5g0071_SBCK_006-4a01}
  - {type: variant, offset: 958, length: 5, content: 作府庫食道, HFL: 昆弟之節猶彎弓而自射也人性苟有一孝則無所不包猶樹根一植百枝生焉或問齊桓晉文優劣唐子答曰論功則桓兄而文弟論}
  - {type: variant, offset: 964, length: 3, content: 作棃棗, HFL: 則文兄而桓弟大晉應期一舉席卷猶震霆摧枯千鈎壓卵無餘類矣人多患遠見百步而不自知眉頰知眉頰者復不能察百步也君子守眞仗信遭時不容雖有訕辱之恥幽垢之謗猶傷體毛耳鷹隼羣飛鳳凰遠遊小人成列君子深藏諺曰脂粉雖多醜面可加膏澤雖光不可潤草}
  - {type: page-break, offset: 964, content: '', id: KR5g0071_HFL_005-014a, image: hfl/1001/1001-030.png}
  - {type: substitution, offset: 965, original: 棃, replacement: 梨, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-1097}}
  - {type: variant, offset: 969, length: 0, content: '', HFL: 目短於自見故以鏡觀形心短於自治故以禮自防君子不以昏行易操不以夜昧易容夫自}
  - {type: variant, offset: 970, length: 1, content: 言, HFL: 高世之名必有負俗之累有絶羣之節必嬰謗嗤之患白骨擬象魚目似珠遥聽遠望無不亂也禍福相轉利害相生如循環而運丸耳其兆不可見其端不可覺良將如山如淵人不知其慼亦不知其歡將勿離鼓旗師之耳目暴至之榮智者不居守財不施謂之錢奴佐鬥者傷預事者亡秦子二卷欲顯白於雪中馳光於日下不可得也顔彦先難云有味如醽而不醉人其味如黍飲之則醉何也秦子曰醉在小人不在}
  - {type: page-break, offset: 970, content: '', id: KR5g0071_HFL_005-014b, image: hfl/1001/1001-031.png}
  - {type: variant, offset: 972, length: 0, content: '', HFL: 子吾欲錦中而紵表}
  - {type: variant, offset: 973, length: 1, content: 稽, HFL: 欲繡外而麻裏猶論者寧匱於辭不匱於理遠難知者天近難知者人因斧以得柯因柯以成用種一粟則千萬之粟滋種一仁則衆行之美備矣鍼雖小入水則沈毛雖大入水則浮性自能也梅子一卷伊尹吕望傅說箕子夷齊柳惠顏淵莊周阮籍易地而居能行所不能行也阮籍孝盡其親忠不忘君明不遺身智不預事愚不亂治自莊周已來命世大賢其惟阮先生乎按其書晉人也物理論十六卷欲定天下而任小人者猶欲捕麞鹿而張兔罝不可得也忿飈焚衣其損多矣忿爨之熟推甑而棄之損益多語曰上不正下參差古者所以不欺其民也割剥富强以養貧弱何異餓耕牛乘馬而飽吠犬棄干將而礪鉛刃也論語聖人之至教王者之大化郷黨篇則有朝廷之儀聘享之禮堯曰篇則有禪代之事夫文彩之在人猶榮華之在草給事中與高堂隆秦朗争指南車二子云}
  - {type: page-break, offset: 973, content: '', id: KR5g0071_HFL_005-015a, image: hfl/1001/1001-032.png}
  - {type: page-break, offset: 973, content: '', id: KR5g0071_HFL_005-015b, image: hfl/1001/1001-033.png}
