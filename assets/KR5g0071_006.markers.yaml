  - {type: variant, offset: 951, length: 0, content: '', HFL: 彪殊異馬遷也人之涉世譬如奕棋苟不盡道誰無死地但不幸耳唐子一}
  - {type: punctuation, offset: 953, content: (, id: KR5g0071_krp_006-bkkpn32}
  - {type: variant, offset: 953, length: 4, content: 張顯被仁, HFL: 名滂字惠澗生昊太元二年舟循川則游速人順路則不迷大木百尋根積深也滄海萬仞衆流成也淵智達洞累學之功也君子以道成冠以道成輿出門不冠則不敢行行非輿則不可步有父不能孝有兄不能敬而論人父子之}
  - {type: page-break, offset: 953, content: '', id: KR5g0071_HFL_005-013b, image: hfl/1001/1001-029.png}
