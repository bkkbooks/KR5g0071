  - {type: punctuation, offset: 807, content: (, id: KR5g0071_krp_006-bkkpn28}
  - {type: variant, offset: 808, length: 1, content: 雲, HFL: 弈學所以治己教所以治人喜能歌舞怒能戰鬥一人之智不如衆人之愚一目之察不如衆目之明生於治長於治知世之所以治者君子也生於亂長於亂知世之所以亂者君子也若不知治亂之所因者凡民也道德之懷民猶春陽之柔物履深水而不寒結木條而不折天之圓也不中䂓地之方也不中矩山必有阜河必有曲江漢東流必有迴復直木無陰直士無徒是以賢人直士常不容於世登泰山見天下之大不察細者視遠故也處高位知人主之貴不卹卑賤者意滿故也治己審則可以治人治人審則可以治天下累世一聖是繼踵千里一賢是比肩水可乾而不可奪濕火可滅而不可奪熱金可柔而不可奪重石可破而不可奪堅諺云富不學奢而奢貧不學儉而儉人情皆能唯聖人能節之木氣人勇金氣人剛火氣人强而燥土氣人智而寬水氣人急而賊神龍不處網罟之水鳳凰不翔罻羅之郷賢人不入危國智者不輔亂君蕭何守文法曹參務無苛相繼作相天下獲安武帝輕人命重武功飾宫室厚賦斂土地益廣德惠彌狹桓譚云王者易輔伯者難佐篤論四卷杜恕水性勝火分之以釜甑則火强而水弱人性勝志分之以利欲則志强而性弱考實性行莫過於郷閭校才選能莫善於對策杜氏始出帝堯在周爲唐杜氏漢世有杜周杜欽杜篤畿}
  - {type: page-break, offset: 808, content: '', id: KR5g0071_HFL_005-008b, image: hfl/1001/1001-019.png}
  - {type: page-break, offset: 808, content: '', id: KR5g0071_HFL_005-009a, image: hfl/1001/1001-020.png}
  - {type: page-break, offset: 808, content: '', id: KR5g0071_HFL_005-009b, image: hfl/1001/1001-021.png}
  - {type: variant, offset: 810, length: 0, content: '', HFL: 伯侯魏書有傳畿長子理宇務仲少而機察故名曰理少子恕字務伯陛下謂以今世無良才朝廷乏賢佐豈可追望前世之稷契坐待後來之俊乂可能治乎恕在河東坐卧恒避父住處恕子預字元凱晉書有傳體論四卷杜恕不動如山難知如陰人有厚德無問小節人有大舉無訾小故隋侯之珠不能無類夫人臣猶如土也萬物載焉而不辭其重水瀆污焉而不辭其下草木植焉而不有其功夫行者榮辱之皂白君子居必選郷遊必擇}
  - {type: page-break, offset: 810, content: '', id: KR5g0071_HFL_005-010a, image: hfl/1001/1001-022.png}
