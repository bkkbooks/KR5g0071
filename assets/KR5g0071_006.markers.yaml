      ', id: KR5g0071_krp_006-bkkkrnewl73}
  - {type: line-break, offset: 976, content: '', id: KR5g0071_SBCK_006-4a02}
  - {type: variant, offset: 976, length: 0, content: '', HFL: 此車記虛言耳先生曰争虛空言不及如試之效也言於明帝明帝詔使作之車乃成翻車先生居在京師城内有地作園而患無水可溉乃作翻車令童兒轉之其功百倍天地成歲也先春而後秋人君之治也先禮而後刑救嬰孩之疾而不忍鍼艾更加他物}
  - {type: page-break, offset: 976, content: '', id: KR5g0071_HFL_005-016a, image: hfl/1001/1001-034.png}
  - {type: variant, offset: 977, length: 1, content: 承, HFL: 至死也今除肉刑者更衆何異服他藥也肉刑雖斬其足猶能生育也張倉除肉刑每歲所殺萬計鍾繇復肉刑歲生二千人也肉刑名者猶鳥獸登爼而作肉今有弱子當陷大辟問其慈父必乞以肉刑代之苟可以生易死也有道之君能不以此加百姓乎蛇螫在手壯夫斷其腕謂其雖斷不死也曹義曰縶馴駒以縿絆御悍馬以腐索今制民以輕刑亦如死也但知管子借耳於}
  - {type: page-break, offset: 977, content: '', id: KR5g0071_HFL_005-016b, image: hfl/1001/1001-035.png}
  - {type: variant, offset: 979, length: 1, content: 臣, HFL: 下}
  - {type: variant, offset: 981, length: 2, content: 稽古, HFL: 知堯借人心而後用其耳目昔燕趙之間有三男共娶一女生四子後争訟廷尉延壽奏云禽獸生子逐母冝以還母尸三男子於市塞一蟻孔而河决息施一車轄而覆乘止立法令者亦冝舉要禮云繼父服齊衰傳子曰母捨己父更嫁他人與兄父甚於兩絶天也又制服恐非周孔所制亡秦焚書以後俗儒造之妄進者若卵投石逃誅者若走赴深曄若春華之並發馥若秋蘭之俱茂樹上懸瓠非木實也背上被裘非脊毛也此似而非九日養親一日餓之豈得言飽多飢少固非孝乎穀馬十日一日餓之馬肥不損於義}
  - {type: page-break, offset: 981, content: '', id: KR5g0071_HFL_005-017a, image: hfl/1001/1001-036.png}
  - {type: variant, offset: 984, length: 0, content: '', HFL: 傷不可同之一日餓母也漢末有管秋陽者與弟及伴一人避亂俱行天雨雪粮絶謂其弟曰今不食伴則三人俱死乃與弟共殺之得粮達舍後遇赦無罪此人可謂善士乎孔文舉曰管秋陽愛先人遺體食伴無嫌也荀侍中難曰秋陽貪生殺生豈不罪邪文舉曰此伴非會友也若管仲啖鮑叔貢禹食王陽此則不可向所殺者猶鳥獸而能言耳今有犬齧一狸猩齧一鸚䳇何足怪也昔重耳戀齊女而欲食狐偃叔敖怒楚師而欲食五參賢哲之忿猶欲啖人而況遭窮者乎見虎一毛不知其斑道家笑儒者之拘儒者嗤道家之放皆不見本也止響以聲逐影以形姦争流蕩不知所止也傳子曰云孟軻荀卿若在孔門非唯游夏而已乃冉閔之徒也積薪若山縱火其下火未及燃一杯之水尚可滅也及至火猛風起雖傾河海不能救也秦昭王是積薪而縱火其下始皇燃而方熾二世起風而怒也秦人視山東之民猶猛虎之睨羣羊何隔憚哉范蠡字少伯楚三户人也使起滅昊已後乘輕舟遊五湖王令人寫其狀恒朝禮之列仙云徐人也傅氏之先出自陶唐傅說之後玄字休奕子哉字長虞晉書有傳楚漢之際有好事者作世本上録黄帝下逮漢末斑固漢書因父得成大孝養志其次養形養志者盡其和養形者不失其敬割地利己天下讎之推心及物天下歸之以信接人天下信之不以信接人妻子疑之見疑妻子難}
