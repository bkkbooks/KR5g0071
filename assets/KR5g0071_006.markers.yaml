  - {type: variant, offset: 1448, length: 2, content: 耶符, HFL: 邪人之性如水焉置之圓則圓置之方則方澄之淳而清動之則流而濁先王知中流之易擾亂故隨而教之謂其偏好者故立一定之法龍舟整檝王良不能執也驥騄齊行越人不敢御也各有所能搆大厦者先擇匠而後揀材治國家者先擇佐而後定民人之學如渴而飲河海大飲則大盈小飲則小盈大觀則大見小觀則小見金以利用錢以輕流此二物飢不可食入粟補吏是賣官也罪人以贖是縱惡也世富錢流則禁盜鑄錢世貧滯則禁盜壞錢天}
