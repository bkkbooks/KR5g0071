  - {type: variant, offset: 437, length: 306, content: 鳯凰至誹謗之言不誅則忠言達千里之隄以螻蟻之穴漏百材之屋以突之煙焚正書二十五卷袁凖交接廣而信衰于友爵祿厚而忠衰于君曾子妻將適市兒隨啼謂兒曰吾還與汝殺犬妻還曾子援弓將射犬妻日向與兒戲乎曾子曰教化始于童昏若之何其以訓耶正論十九卷袁字耀卿鴟抱鼠而仰號恐鵷鶵之奪己蘇子十八卷名淳衛人也蘭以芳致燒膏以肥見翠以羽殃身蚌以珠碎腹女惡蛾眉士惡多口由來尙矣周之管蔡秦之趙高其惡何比吾欲比之狗馬狗馬能致遠伏狩吾欲比之虎豹虎豹則君子愛其文章吾欲比之蝮蛇蝮蛇則療偏枯之疾吾欲比之鴆鳥鴆鳥又能去公子牙而安魯國惟有靑蠅蒼鼠覆國殘家可比世要十卷桓範字元則魏大司農加脂粉則嫫母進不潔則西施屏今學亦如此學之脂粉亦厚矣伐一樹除一苗猶先看可伐而除之况害, HFL: 騁於婦}
