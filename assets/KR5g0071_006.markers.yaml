  - {type: variant, offset: 1157, length: 159, content: 亦且小人新論十卷華譚字令恩仕晉干雲之枝不育於垤之顚徑寸之珠不産于渟汙之渚志林二十四卷盧達東海之魚墜一鱗崑崙之木棄一葉世人皆能知之孫子十二卷名綽字興公仕晉教之治性猶藥之治病疾若倒懸而求藥于崑崙之山是身後也大光明乎天燈燭何施矣時雨濡乎地漑灌何用焉朱門之家鬼守其闕多藏之室人窺其牆義記十卷名夷衣煖而忘百姓之寒食美而忘百姓之飢, HFL: ''}
