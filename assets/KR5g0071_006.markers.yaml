  - {type: variant, offset: 1455, length: 1, content: 朗, HFL: 而賤不得冒尊有定位而卑不敢逾經之以道德緯之以仁義織之以禮法既成而後用之謂有孝廉秀才之貢或千里望風承聲而舉故任實者漸消積虛者日長聞一善言見一善事行之唯恐不及聞一惡言見一惡事遠之唯恐不遠懸千金於市巿人不敢取者分定也委一錢於路童兒争之者分未定也三皇貴道而尚德五帝先仁而後義三王先義而後亂鴻毛一羽在}
