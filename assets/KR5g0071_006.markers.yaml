  - {type: line-break, offset: 835, content: '', id: KR5g0071_SBCK_006-3b04}
  - {type: variant, offset: 836, length: 0, content: '', HFL: 飛者冀伏將奮者足跼將噬者爪縮將言者口默將文者且朴鄒子一卷欲知其人視其朋友蒺藜在田良苗無所措其根佞邪在朝忠直無所容其身寡門不入宿臨甑不取塵避嫌也成敗志三卷孫毓字仲水性雖能流不導則不通人性雖能智不教則不達學猶植也不學將落密者天地之際會成敗之機要故陰陽不密者寒暑不能以成歲棟宇不密則九層不可以庇身古今通論三卷王嬰崑崙東南方五千里謂之神州州中有和羹郷方三千里五嶽之域帝王之宅聖人所生也倉頡造書}
