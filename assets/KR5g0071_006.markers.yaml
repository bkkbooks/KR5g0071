  - {type: variant, offset: 746, length: 0, content: '', HFL: 反出則馳於田戈而不還信任親愛寵貴后妃命移運去不自知也建旗伐鼓高烽明候守邊之猛將非中國之良吏和鑾法駕清道而行便辟揖讓諸夏之威儀非夷狄之有也董賢之於哀帝無骨肉絲髪之親又不能傳其氣類定其繼嗣以丈夫宴接之歡自成膠漆也景帝顯位刺史者皆是宦臣子弟猶如豺狼守肉鬼魅待疾曰在天之内在人之外人愛我我愛之人憎我我憎之天下士有三俗選士而論族姓閥閱一俗交游趨富貴之門二俗畏服不接於貴尊三俗天下之士有三可賤慕名而不知實一可賤不敢正是非於富貴二可賤向盛背衰三可賤天下學士有三姦焉實不知}
  - {type: page-break, offset: 746, content: '', id: KR5g0071_HFL_005-003b, image: hfl/1001/1001-009.png}
  - {type: variant, offset: 747, length: 1, content: 審, HFL: 不言一}
