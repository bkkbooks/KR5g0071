  - {type: variant, offset: 1323, length: 0, content: '', HFL: 仁也不忍殘人之體而忍殺人故曰匹夫伊尹耕於有莘孰知非夏之野人吕尚釣於渭濱孰知非殷之漁者遇湯武文王然後知其非也面岐路者有行迷之慮仰高山者有飛天之志或乘馬乘車而俱至秦者所謂形異而實同也若謂黄帝後方有舟檝庖羲之時長江大河何所用之經巨海者終年不見其涯測虞淵者終世不知其底故近者不可以度遠也漢世賤軺車而今貴之青與赤謂之文赤與白謂之章白與黑謂之黼黑與青謂之黻五綵謂之繡始皇塚令匠人作機弩有人穿者即射之以人魚膏作燭逐兔之犬終朝尋兔不失其迹雖見麋鹿不暇顧也漢高祖度闊而網踈故後世推誠而簡直光武教一而網密故後世守常而禮義魏武糺亂以尚猛天下修法而貴理形自正不求影之直而影自直聲之平不求響之和而響自和德之崇不求名之遠而名自遠西國胡言蘇合香是獸便中國獸便而臭忽聞西極獸便而香則不信矣必得崑山之玉而後寳則荆璞無夜光之美必須南國之珠而後珍則隋侯無明月之稱始皇遠遊並海而不免平臺之變及葬驪山尋見發掘今有鉛錫之鋋雖歐冶百鍊猶不如瓦刀有駑駘之馬雖造父駕之終不及飛兔絶景質鈍故也土不可作䥫而可以作瓦相者曰三亭九候定於一尺之面愚智勇怯形於一寸之}
