  - {type: line-break, offset: 770, content: '', id: KR5g0071_SBCK_006-3a10}
  - {type: variant, offset: 770, length: 0, content: '', HFL: 天生小人所以奉君子無君子則無畜小人無小人則無以養君子録人一善則無棄人採材一用則無棄材人皆易華嶽以謂卑小故登之而摧傷難天以謂高大故}
  - {type: page-break, offset: 770, content: '', id: KR5g0071_HFL_005-007b, image: hfl/1001/1001-017.png}
  - {type: variant, offset: 771, length: 2, content: 能修, HFL: 昇而無殃鼎以希出而世重之釜鐺常用而世輕之古有弟子病師數往看之師至弟子輙起因勞而致死師非不仁弟子非無禮傷於數也薄氷當白日聚毛遇猛火雖欲遠害其勢不可蓼蟲在蓼則生在芥則死非蓼仁而芥賊失於本不可也諺曰己是而彼非不當與非争彼是而已非不當與是争君子表不隱裏明暗同度苦躬富貴之梯階仲尼無契券於天下而德著古今}
  - {type: variant, offset: 774, length: 2, content: 未必, HFL: 惡明也鏡照醜好而人}
  - {type: page-break, offset: 774, content: '', id: KR5g0071_HFL_005-008a, image: hfl/1001/1001-018.png}
  - {type: variant, offset: 777, length: 3, content: 遇中才, HFL: 怨法明善惡而人不恨人物志三卷劉邵草}
  - {type: 'kr:newline', offset: 778, content: '

