  - {type: line-break, offset: 814, content: '', id: KR5g0071_SBCK_006-3b03}
  - {type: variant, offset: 814, length: 0, content: '', HFL: 之治也處國於不傾之地積政於萬全之鄕載德於不止之輿行令於無竭之倉使民於不争之塗開法於必得之方庶民}
  - {type: variant, offset: 815, length: 1, content: 則, HFL: 也君子舟也水所以載舟亦所以覆舟恕性踈惰但飽食而已家}
  - {type: page-break, offset: 815, content: '', id: KR5g0071_HFL_005-010b, image: hfl/1001/1001-023.png}
  - {type: variant, offset: 817, length: 3, content: 波釣則, HFL: 書傳頗嘗涉歷父憂行喪在禮多愆孝聲不聞後除中郎又作黄門郞同朝友人問余志余答曰見大臣論議或黨甲苦乙所親或黨乙謗甲所親余處甲乙之間幸無毁譽耳傳子一百二十卷木大者發越小者敷揚土是人之母也故人}
  - {type: variant, offset: 821, length: 4, content: 磨我入便, HFL: 戀土之心買鄰人價貴宅宅可買鄰不可得也冠堯之冠行桀之行亦桀也服桀之服行堯之行亦堯也處巿井之肆服君子之服在小人之中行賢哲之事猶夜行珮珠玉也亦灼然矣蜘蛛作羅蜂之作窠其巧亦妙矣況復人乎黄金累千不如一賢人而無廉猶衣服}
  - {type: page-break, offset: 821, content: '', id: KR5g0071_HFL_005-011a, image: hfl/1001/1001-024.png}
  - {type: variant, offset: 827, length: 0, content: '', HFL: 殺食味之酸鹹郭林宗謂仇智季曰子嘗有過否智季曰暮飯牛牛不食搏牛一下語曰士非璧也談者謂價耳談者之口猶愛憎之心智慧多則引血氣}
  - {type: variant, offset: 828, length: 0, content: '', HFL: 燈火}
  - {type: variant, offset: 829, length: 2, content: 何物, HFL: 於脂膏炷大而明明則膏消炷小而暗暗則膏息息則能長久也雄聲而雌視者虛僞人也氣急而聲重者敦實人也蒙恬築長城人不堪苦白骨山積乃有歌曰生男愼勿舉生女餔用餔不見長城下白骨相棖柱作黄金者是方士取草屑合金燒之故草屑燃金落下太元經十四卷梁國楊泉字德淵怒如烈冬喜如温春鸞鶹鳳子養甡高峙隱耀深林不食滓穢内清外濁弊衣褁玉十里九坎牛馬低昂天氣左轉星辰右行陰陽運度報返相迎强梁者亡掘强者折大健者跋大利者缺激氣成風湧氣成雨濁霧成雪清露成霜化清經十卷濁者不信淵生之清而甘濯之濁矣}
  - {type: page-break, offset: 829, content: '', id: KR5g0071_HFL_005-011b, image: hfl/1001/1001-025.png}
  - {type: page-break, offset: 829, content: '', id: KR5g0071_HFL_005-012a, image: hfl/1001/1001-026.png}
  - {type: variant, offset: 832, length: 3, content: 而亹已, HFL: 則虎發靜如鱗潜若彼赫赫若此洋洋}
