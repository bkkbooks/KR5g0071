  - {type: variant, offset: 1558, length: 349, content: 名曰國皇字曰老人出見南方長生不死衆耀同光神農乃從而嘗藥以救人命相牛經一卷寗戚相馬經二卷伯樂相鶴經一卷浮公司馬兵法三卷穰苴國雖大戰必亡天下雖平天下亦危古者國容不入軍軍容不入國國容入軍則軍亂軍容入國則國亂順命上賞犯令上戮孫子兵法十卷名武黃石公記三卷與衆好生者靡不成與衆同惡者靡不傾四民用虛國家無儲四民用足國家安樂汜勝之書二卷相貝經一卷淮南萬畢術一卷首澤浮針取頭中垢塞針孔置水中則浮燒角入山則虎豹自遠惡其息也取大鏡高懸置水盆于其下則見四鄰矣取沸湯置瓮中密以新縑沈中三日成冰取鴻毛縑囊貯之可以渡江不溺馬好嚙人取殭蠶塗其上唇卽差取門冬赤黍漬以狐血陰乾之欲飮酒者取一丸置舌下以含之令人不醉博物志十一卷張華字茂先竹譜一卷戴凱之筆墨法一卷韋仲將筆用羊靑作心明曰羊柱以毫衣羊靑使中心高並去其穢毛使毛不髯茹也新序三十卷, HFL: ''}
