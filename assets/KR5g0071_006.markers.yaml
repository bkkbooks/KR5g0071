  - {type: line-break, offset: 749, content: '', id: KR5g0071_SBCK_006-3a09}
  - {type: variant, offset: 749, length: 1, content: 遇, HFL: 竊他人之記以成已說二也受無名者移知者三也知言而}
  - {type: page-break, offset: 749, content: '', id: KR5g0071_HFL_005-004a, image: hfl/1001/1001-010.png}
  - {type: variant, offset: 751, length: 1, content: 遇, HFL: 能行謂之疾此疾雖有天醫莫能治也同於我者何必可愛異於我者何必可憎智足以立難成之事能足以圖附者不黨踈者不遺婦人有朝哭良人暮適他土涉歷百庭顔色不愧今公侯之宫美女數百卿士之家侍妾數十書則以醇酒淋其骨髓夜則以房室輸其血氣人之性有山峙淵渟者患在不通嚴剛貶絶者患在傷士廣大闊蕩者患在無檢和順恭愼者患在少斷端殻清潔者患在拘狹辯通有辭者患在多言安舒沈重者患在後時好古守經者患在不變勇毅果敢者患在險害䟽濯胷臆澡雪腹心使之芬香皓潔白不可污也道德仁義天性也織之以成其物鍊之以致其精瑩之以發其光幽暗則巧人之所短會同則述人之所長負我者我又加厚焉疑我者我又加信焉難必相恤利必相反事君不爲君所知忠未至也與人交不爲人所信義未至也父母不好學業惡子孫學之可違而學也父母不好士惡子孫友之可違而交也英辭雨集妙句雲來愛相攻}
  - {type: page-break, offset: 751, content: '', id: KR5g0071_HFL_005-004b, image: hfl/1001/1001-011.png}
  - {type: page-break, offset: 751, content: '', id: KR5g0071_HFL_005-005a, image: hfl/1001/1001-012.png}
  - {type: variant, offset: 753, length: 0, content: '', HFL: 之自然}
  - {type: variant, offset: 754, length: 0, content: '', HFL: 愜快以志人情之所欲也嗽舌下泉咽之名曰胎食得道者生六翮於臂長毛羽於腹飛無階之蒼天度無窮之世俗北方寒而人壽南方暑而人夭如蠶寒而飢則引曰多温而飽則引曰少湯契後秦益後益即皋陶子也典論五卷魏文帝堯崩舜避堯子於南河之南舜崩禹避舜子於陽城禹崩益避禹子於基山之陰事見史記如彼登山乃勤以求高如彼浮川乃勤以求遠惟心弗勤時亦靡剋應瑒云人生固有人心答云在親曰孝施物曰仁仁者有事之實名非無事之虛稱}
  - {type: page-break, offset: 754, content: '', id: KR5g0071_HFL_005-005b, image: hfl/1001/1001-013.png}
  - {type: variant, offset: 755, length: 0, content: '', HFL: 者道之母羣行之主序云佞邪穢政愛惡敗俗國有此二事欲}
  - {type: variant, offset: 756, length: 1, content: 善, HFL: 危已不可得也桓靈之際閹寺專命於上布衣橫議於下千禄者殫貨以奉貴要名者傾身以事勢位成乎私門名定乎橫巷由是户異議}
  - {type: variant, offset: 758, length: 0, content: '', HFL: 殊論論無常檢事無定價長愛惡興朋黨夷吾侈而鮑叔廉此其志不同}
  - {type: page-break, offset: 758, content: '', id: KR5g0071_HFL_005-006a, image: hfl/1001/1001-014.png}
  - {type: variant, offset: 759, length: 0, content: '', HFL: 張竦潔而陳遵污此其行不齊也主與民有三求求其謂己勞求其謂己死求其謂己生法者主之柄吏者民之命法欲簡而明吏欲公而平詩刺豔妻書誡晨婦司隸馮方女有國色避亂揚州袁術登城見而悅之遂取焉甚寵之諸婦教之曰將軍貴人重其志節宜數涕泣示憂愁也若如此加重馮氏後每見術垂泣術果以謂有心益寵之諸婦乃共絞殺懸之於厠言其哀怨自殺術以其不得志而死厚加殯殮袁紹妻劉氏甚妬忌紹死未殯劉氏殺其妾五人恐死者有知復能寵之乃髠頭黑面以毁其容上洛都尉王琰以功受封其妻泣於内恐琰富貴更取妻妾荆州牧劉表跨有南土子弟驕貴以酒器名三爵上者曰伯雅受七勝中雅受六勝季雅受五勝又設大鍼於杖端有醉者輒以劖刺之驗其醒醉然人形性同於庶類勞則早斃逸則晩死余喜彈碁略盡其巧少嘗作賦昔京師有東方世安張公子嘗恨不得與彼數子對之太子篇序云余蒙隆寵忝當上嗣憂惶踧踖上䟽自陳欲繁辭博稱則父子之間不文也欲略言直說則喜懼之心不達也里語曰汝無自譽觀汝作家書言其難也魏子十卷源靜則流清本正則末茂内修則外理形端則影直天生}
  - {type: page-break, offset: 759, content: '', id: KR5g0071_HFL_005-006b, image: hfl/1001/1001-015.png}
  - {type: page-break, offset: 759, content: '', id: KR5g0071_HFL_005-007a, image: hfl/1001/1001-016.png}
  - {type: variant, offset: 761, length: 7, content: 能修善而未必遇, HFL: 所以治}
  - {type: 'kr:newline', offset: 770, content: '

