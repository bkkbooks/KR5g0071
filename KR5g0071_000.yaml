front:
  text: 御製題武英殿聚珍版十韻有序
  hash: sha256:55de31d5cced6d35ba36ece6770eff0c121cc4967f98d19a913cdad63dcda6cd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0071_SBCK_000-1a}
body:
  text: 校輯永樂大典内之散零編並蒐訪天下遺籍不下萬餘種彚爲四庫全書擇人所罕覯有裨世道人心及足資考鏡者剞劂流傳嘉惠來學苐種多則付雕非易董武英殿事金以活字法爲請旣不濫費棗棃又不久淹歲月用力省而程功速至簡且捷考昔沈括筆談記宋慶歴中有畢昇爲活版以膠泥燒成而陸深金臺紀聞則云毘陵人初用鉛字視版印尤巧便斯皆活版之權輿顧埏泥體麤鎔鉛質輭俱不及鋟木之工緻兹刻單字計二十五萬餘雖數百十種之書悉可取給而校讐之精今更有勝於古所云者苐活字版之名不雅馴因以聚珍名之而系以詩稽古搜四庫於今突五車開鐫思壽世積版或充閭張帖唐院集周文梁代餘同爲製活字用以印全書精越鶡冠體昨歲江南所進之書有鶡冠子卽活字版苐字體不工且多訛謬耳富過鄴架儲機圓省雕氏功倍謝鈔胥聯腋事堪例埏泥法似疎毀銅昔悔彼康年間編纂古今圖書集成刻銅字爲活版排印蕆工貯之武英殿歴年旣久銅字或被缺少司事者懼干咎適値乾隆初年京師錢貴遂請毁銅字供鑄從之所得有限而所耗甚多巳爲非計且使銅字尙存則今之印書不更事半功倍乎深爲惜之刊木此慙予旣復羨棃棗還教愼魯魚成編示來學嘉惠志符初乾隆甲午仲夏御題意林三絶句集錄裁成庾潁川意林三軸用兹傳漫嫌撮要失備載嘗鼎一臠知味全都護安南政不頗用儒術致政平和奇書五卷銅柱二無忝祖爲馬伏波六經萬古示綱常諸子何妨取所長節度豈徒務佔畢要知制事有良方原序二首三聖相師大易光著天地之功立矣經傳之功生焉輔成一德謂之六學漢收秦業其道方興置講習訓授之官明君臣父子之體雖禮樂文缺亦足以新忠孝仁義之大綱至如曾孔荀孟之述蓋數百千家皆發揮隱微羽翼風敎祖儒尊道持法正名縱横立權變通其要崇儉而有别卽而得序傍行而不流小說去泥而篇簡繁夥罕備于士大夫之家有梁潁川庾仲容略其要會爲子書抄三十卷將以廣搜採異而立言之本或不求全大理評事扶風馬總元會家有子史幼而集錄探其旨趣意必有歸遂增損庾書詳擇前體裁成三軸目曰意林上以防守教之失中以補比事之闕下以佐屬文之緒有疏通廣博潔凈符信之要無僻放拘刻譤蔽邪盪之患君子曰以少爲貴者其是之謂乎余元會之執友故序而記之貞元二年五月二十一日也撫州刺史戴叔倫撰子書起于鬻熊六韜盛于春秋六國時莊老道宗起覆載之功橫日月之照高視六經爲天下式故絶于稱言矣墨翟大賢其旨精儉教名亞孔聖至矣管晏文可謂庶矣而部帙繁廣尋覽頗難梁朝庾仲容抄成三帙汰其沙石簸其粃糠而猶蘭蓀雜于蕭艾璠璵隱于璞石扶風馬總精好前志務于簡要又因庾仲容之抄略存爲六卷題曰意林聖賢則糟粕靡遺流略則精華盡在可謂妙矣隋代博陵李文博攓掇諸子編成理道集十卷唐永興公虞世南亦採前史著帝王略論五卷天后朝宰臣朱翼祖則又述十代興亡論一帙洎扶風意林究子史大略者蓋四人意矣予扁舟塗水留滯廬陵扶風爲余語其本尚且日編錄所取先務于經濟次存作者之意罔失篇目如面古人予懿馬氏之作文約趣深可謂懷袖百家掌握千卷之子用心也遠乎哉旌其可美述于篇首俾傳好事貞元丁卯歲夏之晦文廢瞍河東柳伯存重述意林目錄卷一鬻子一卷太公金匱二卷太公六韜六卷曾子二卷晏子八卷子思子七卷孟子十四卷管子十八卷道德經二卷荀卿子十二卷魯連子五卷文子十二卷鄧析子一卷范子十二卷胡非子一卷墨子十六卷子一卷隨巢子一卷尸子二十卷韓子二十卷卷二列子八卷莊子十卷鶡冠子三卷缺王孫子一卷缺申子三卷愼子十二卷燕丹子三卷鬼谷子五卷尹文子二卷公孫文子一卷陸賈新書二卷晁錯新書三卷賈誼新書八卷呂氏春秋二十六卷淮南子二十二卷卷三鹽鐵論十卷說苑二十卷新序三十卷法言十五卷太經十卷新論十七卷論衡二十七卷正論五卷潛夫論十卷卷四風俗通三十一卷商君書四卷阮子四卷正部十卷士緯十卷通語八卷抱朴子四十卷卷五周生烈子五卷荀悅申鑒五卷仲長統昌言十卷典論五卷魏子十卷人物志三卷任子十卷篤論四卷體論四卷傅子一百二十卷太元經十四卷化淸經十卷鄒子一卷成敗志三卷古今通論三卷中論六卷唐子十卷秦子二卷梅子一卷物理論十六卷臣等謹案意林五卷唐馬總編唐書傳稱其系出扶風不言爲何地人其字傳作會元而此本則題曰元㑹均莫能詳也傳稱其歴任方鎭終于戸部尙書贈右僕射諡曰㦤陳振孫書錄解題稱總仕至大理評事則振孫攷之未審矣梁庾仲容取周秦以來諸家雜記凡一百七家摘其要語爲三十卷名曰子鈔總以其繁略失中復增損以成此書宋高似孫子略稱仲容子鈔每家或取數句或一二百言馬總意林一遵庾目多者十餘句少者一二言比子鈔更爲取之嚴錄之精今觀所采諸子今多不傳者惟頼此僅存其槪其傳于今者如老莊管列諸家亦多與今本不同不特孟子之文如容齋隨筆所云也前有戴叔倫柳伯存二序與文獻通考所載相同其書唐志作一卷叔倫序云三軸伯存序又云六卷今書乃止五卷且攷子鈔原目凡一百七家此本止七十一家又或有錄無書洪氏載總所引書尙有蔣子譙子鍾子張儼黙記裴氏新書袁淮正書袁子正論子張顯析言于子顧子諸葛子陳子要言符子諸書此本不載又通考稱今本相鶴經自意林鈔出而永樂大典有風俗通姓氏篇題曰出馬總意林此本亦並無之合計卷帙當巳失其半非總之原本矣然殘璋斷璧固益可寶貴也乾隆四十七年十月恭校上總纂官兵部侍郞臣紀昀大理寺臣陸錫熊纂修官右贊善臣季學錦意林卷二缺文照宋刻補鶡冠子三卷鳥鵲之巢可俯而窺麋鹿之居可招而係此在上者慈心扁鵲兄弟三人並醫魏文侯問曰子三人其孰最善扁鵲鍼人血脈投人毒藥故名聞諸侯王孫子一卷衛公重裘累茵見薪者而屢哭之問曰何故對曰雪下衣薄故失薪衛公顔色大懼乃開府金出倉粟以賑貧窮吾恐鄰國貪養賢以勝吾也
