  hash: sha256:084b42f6e95e4e6545e236975ade8e205383fefe1021c9d793f758c21f9377dc
body:
  text: 扶風馬緫元會編列子八卷天有所短地有所長聖有所否物有所通思士不妻而感思女不夫而孕鬼者歸也歸其真宅真宅太虚也貧者士之常死者民之終醉者墜車雖疾不死死生驚懼不入其胷中禽獸之智亦有與人同者牝牡相偶母子相親避平依險違寒就温居則有羣行則有列飲則有携食則鳴侣宋人養猿號曰狙欲與狙芧先誑之曰朝三而暮四衆狙皆怒又許朝四而暮三而衆狙皆喜聖人以智籠羣愚亦猶狙公以智籠群狙矣覺有八徵夢有六候陰氣壯則夢涉水而恐懼陽氣壯則夢涉火而燔炳飽夢與飢夢取藉帶而寢則夢蛇鳥銜髮則夢飛天將陰則夢火身將疾則夢食飲酒者憂歌舞者哭晝想夜夢神形所遇陳大夫云吾國有亢倉子能以耳視而目聽魯侯聞之大驚以上卿禮致之亢倉子曰臣體合於神心合於無顔回能仁而不能反賜能辯而不能訥由能勇而不能怯師能莊而不能同兼四子之有以易仲尼仲尼不許也目將眇者先睹秋毫鼻將窒者先覺燋朽故物不至則不及冥靈以五百歲爲春五百歲爲秋荆南上古有大椿以八千歳爲春八千歲爲秋菌芝生於朝死於晦蠓蚋因雨而生見陽而死越東有輙休國生長子則食之謂之宜弟輙休國其大父死則負其大母棄之謂鬼餘孔子東遊見兩小兒辯闘問其故一兒曰我以日始出去人近日中時去人遠一兒云日初出遠日中時近一兒曰日初出大如車輪及日中纔如盤盂豈不爲近則大遠則小者乎一兒曰日初出蒼蒼凉凉至日中有若探湯豈不爲近而熱遠而凉者乎孔子不能决小兒曰丘誰謂汝多智乎揚朱曰人得百年之壽者千中無一疾病哀苦居其半矣慎耳目之觀聽規死後之餘榮失當年之樂不肆意於一時何異乎縲梏也勤能使逸寒能使温晏子曰吾一死之後豈關我耶焚之亦可沈之亦可瘞之亦可露之亦可棄之溝壑亦可納諸石槨亦可唯所遇耳人不婚宦情欲失半人不衣食君臣道息楊朱曰生民之不得休息爲四事故一爲壽二爲名三爲位四爲貨有此四者畏鬼畏人畏威畏刑此之謂遁人也出不由門行不從徑也以是求利不亦難乎晋文公欲伐衛公子鋤笑之問其故對曰臣笑臣鄰人也有人送妻歸家道見桑婦悦而與之言顧視其妻已有人招之公乃引師還未至而有伐其北鄙者孔子曰力能舉國門之關而不肯以力門狐丘大夫謂孫叔敖曰人有三怨子知之乎爵高者人妬之官大者主惡之禄厚者人怨之孫叔敖曰吾爵益高吾志益下吾官益大吾志益小吾禄益厚吾施益溥可以免乎楊子鄰人亡一羊相率追之歧路之中復有歧矣曰大道以多歧亡羊學者以多方喪生本一末異也人有亡鈇者意鄰子盗之視鄰子行步顔色皆將竊也俄而相其谷得鈇見鄰子無似竊鈇者齊人有欲得金者清旦往市適見貨金者因攫奪而去吏捕問之對曰取金之時不見人但見金也莊子十卷水之積也不厚則其負大舟也無力至人無己神人無功聖人無名日月出矣而爝火不息其於光也不亦難乎時雨降矣而猶浸灌其於澤也不亦勞乎鷦鷯巢於深林不過一枝偃鼠飲河不過滿腹瞽者無以與乎文章之觀聾者無以與乎鐘鼓之聲豈唯形骸有聾盲哉夫智亦有之不知至言之極妙以爲狂而不信此智之聾盲形固可使如槁木心固可使如死灰取其寂寞無形耳大智閑閑小智間間其寐也䰟交其覺也形開道惡乎隱而有真僞言惡乎隱而有是非此自是而非彼彼亦自是而非此與彼各有一非於體中也可乎可可於己者即謂之可不可乎不可不可於己者即謂之不可六合之外聖人存而不論六合之内聖人論而不議春秋經世先王之志聖人議而不辯不就利不違害夢飲酒者旦而哭泣夢哭泣者旦而畋獵此寤寐之事變也方其夢也不知其夢由此觀之當死之時不知其死而自適其志夢之中又占其夢焉則無以異於寤也覺而後知其夢當所遇無不足也何爲方生而憂死哉昔者莊周夢爲蝴蝶栩栩然蝴蝶也自喻適志與不知周也俄然覺則蘧蘧然周也不知周之夢爲蝴蝶與蝴蝶之夢爲莊周與吾生也有崖而智也無崖以有崖隨無崖殆已以有限之性尋無極之智安得不困哉遁天倍情忘其所受天性所受各有本分不可逃亦不可加也適來夫子時也時自生也適去夫子順也理當死也安時而處順哀樂不能入哀樂生於得失也若任其所受哀樂無所措其間也顔回曰回之家貧唯不飲酒不茹葷者數月矣若此則可以爲心齋乎曰是祭祀之齋非心齋也回曰敢問心齋仲尼曰若一志無聽之以耳而聽之以心無聽之以心而聽之以炁聽止於耳心止於符炁也者虚而待物也唯道集虚虚者心齋也虚其心則其道集於懷也天下有大戒二其一命也其一義也子之愛親命也不可解於心臣之事君義也无適而非君也無所逃於天地之間顔闔將傅衞靈公太子而問蘧伯玉曰與之無方則危吾國與之有方則危吾身如何小人之性引之軌制則憎己縱其無度則亂邦伯玉曰善哉問乎正汝身哉形莫若就心莫若和形不乖逆和而不同就不欲入就者形順入者遂與同也和不欲出和者義清出者自顯伐也山木自㓂也膏火自煎也桂可食故伐之漆可用故割之人皆知有用之用而莫知無用之用有用則與彼爲功無用則自全其生人不忘其所忘而忘其所不忘此謂誠忘生則愛之死則棄之故德者世之所不忘也利者理之所不存也故忘形者非忘也不忘形而忘德乃誠忘也古之真人其寢不夢無意想也其覺無憂當所遇而安不知悦生不知惡死與化爲體其心志所居而安曰志其容寂雖行而無傷於静凄然似秋暖然似春殺物非爲義也生物非爲仁也役人之役適人之適捨己效人殉彼傷義泉涸魚相與處於陸相呴以濕相濡以沫不如相忘於江湖與其不足而相愛豈若有餘而相忘與其譽堯而非桀不如兩忘而化其道忘善惡遺死生與化一者安知堯桀所在耶夫大塊載我以形勞我以生佚我以老息我以死得者時也失者順也所遇之時世謂之得時不暫停順往而去世謂之失安時處順哀樂不能入也父母於子東西南北唯命之從陰陽於人不啻爲父母也自古或有能違父母之命未有能違陰陽之變而拒晝夜之節也魚相忘於江湖人相忘於道術各自足而相忘天下莫不皆能至人常足故常也長於上古而不爲老日新也隳支體黜聦明離形去智同於大通此謂之坐忘至人之用心若鏡不將不迎應而不藏故能勝物而無傷物來則鑒鑒不以心故雖天下來照而無勞心鳧脛雖短續之則憂鶴脛雖長斷之則悲自三代以下天下莫不以物易其性矣小人則以身殉利士則以身殉名大夫則以身殉家聖人則以身殉天下此數者事業不同殉身一也臧與穀二人相與牧羊而俱亡羊問臧奚事則挾策讀書問穀奚事則博塞以遊二人者事不同亡羊均也伯夷死名於首陽之下盜跖死利於東陵之上二人死雖不同其於殘生傷性一也何必伯夷之是而盜跖之非則天下盡殉也彼其所殉仁義也則俗謂之君子其所殉貨財也則俗謂之小人其所殉一也至於殘生損性又惡取君子小人於其間哉夫不自見而見彼不自得而得彼是得人之得而不自得其得也適人之適而不自適其適也雖盜跖伯夷是同爲淫僻純朴不殘孰爲犠罇白玉不毁孰取珪璋道德不廢安爲仁義性情不離安用禮樂夫殘朴以成器工匠之罪也毁道德以成仁義聖人之過也跖之徒問於跖曰盜亦有道乎跖曰夫妄意室中之藏聖也入先勇也出後義也知可否智也分均仁也五者不備而後能成盜者天下未之有也五者所以禁盜不爲盗資也由是觀之善人不得聖人之道不立跖不得聖人之道不行天下善人少而不善人多則聖人之利天下者少而害天下者多絶聖棄智大盗乃止摘玉毁珠小盜不起焚符破璽而民樸鄙剖斗折衡而民不争嘉怒相疑愚智相欺善否相非誕信相譏而天下衰矣至道之精杳杳冥冥至道之極昏昏默默慎汝内全真也閉汝外守其分也多智爲敗智無崖故敗也世俗之人皆喜人之同乎己而惡人之異於己也大人之教若形之於影聲之於響有問而應之盡其所懷子貢教漢陰爲圃者作桔橰圃者忿然作色而笑曰夫有機械者必有機事有機事者必有機心機心存于胷中則純白不備純白不備則神生不定神生不定則道不載吾非不知羞而不爲事求可功求成用力少見功多者聖人之道也三人行而一人惑所適者猶可致也惑者少也二人惑則勞而不至惑者多也視而可見者形與色聽而可聞者名與聲悲夫世人以形色名聲爲足以得彼之情夫形色名聲果不足以得彼之情也夫播糠眯目則天地四方易位矣蚊虻噆膚則通夕不寐外物加之雖小而傷性已大也鵠不日浴而白烏不日黔而黑自然已各足矣平易恬憺則憂患不能入邪氣不能襲故其德全而神不虧矣不爲福先不爲禍始感而後應無所唱也迫而後動會至乃動不得已而後起故無天灾無物累無人非無鬼責其生若浮其死若休喜怒者道之過好惡者德之失一而不變静之至也静而一者不可變也不與物交淡之至也物自來耳無交物之情形勞而不休則弊精用而不已則勞野語有之曰衆人重利廉士重名賢士尚志聖人貴精附之以文益之以博文滅質博溺心古之所謂得志者非軒冕之謂也今之所謂得志者軒冕之謂也軒冕之在身非性命也物之儻來寄也寄之其來不可禦其去不可止故不爲軒冕肆志不爲窮約趨俗井蛙不可以語於海者拘於墟也夏蟲不可以語於氷者篤於時也曲士不可以語於道者束於教也自細視大者不盡自大視細者不明騏驥驊騮一日而馳千里捕鼠不如狸狌言殊伎也鴟鴞夜撮蚤察毫末晝出瞋目而不見丘山言殊性也道無終始物有死生莊子釣於濮水楚王使大夫二人往先焉曰願以境内累矣莊子持竿不顧曰吾聞楚有神龜死已三千歲矣王巾笥而藏之廟堂之上此龜者寧其死爲留骨而貴乎寧其生而曳尾塗中乎惠子曰子非魚安知魚之樂耶莊子曰子非我安知我不知魚之樂耶惠子曰我非子固不知子矣子固非魚也子之不知魚之樂全奚爲奚據奚避奚處奚就奚去奚樂奚惡擇此八者莫足以活身唯無擇而任其所遇乃舍也髑髏曰死無君於上無臣於下亦無時之事從然以天地爲春秋雖南面王樂不能過也莊子不信曰吾使司命復生汝骨肉肌膚反汝父母妻子閭里知識子欲之乎髑髏曰吾安能棄南面王樂而復爲人間之勞乎夫畏途者十殺一人則父子兄弟相戒以盛卒徒而後出焉不亦智乎故人之所畏者衽席之上飲食之間而不知戒者過也十殺一人人大畏之至於色欲之害而莫肯畏之斯愚民也莊子行於山中見大木枝葉茂盛伐木者止其旁而不取問其故曰無所可用莊子曰此木以不材得終其天年出山舍故人之家故人命竪子殺鴈竪子曰其一能鳴其一不能鳴請奚殺主人曰殺不鳴者明日弟子問莊子曰山中之木以不材得終主人之鴈以不材死先生將何處焉莊子曰周將處夫材與不材之間似之而非也故未免乎異直木先伐甘泉先竭鳥莫知於鷾鴯其畏人也襲諸人間未有自䟽外於人而人存之者畏人而入於人間此鳥所以稱智也王孫子一卷舜讓天下於子州支伯子州支伯曰余適有幽憂之病方且治之未暇治天下也春耕種足以勞動秋收斂足以休息然尊生者雖富貴不以養傷身雖貧賤不以利累形帝王之功聖人之餘事也非所完身養生也今世俗之君子多危身棄生以殉物豈不悲哉有人於此以隋侯之珠彈千仞之雀世必笑之是何也其以所用者重所要者輕也夫生者豈特隋侯之重哉列禦寇不受鄭子陽遺粟曰君非自知我也以人之言而遺我粟至其罪我也又恐以人之言吾所以不受也子貢問原憲先生何病也原憲應之曰吾聞無財之謂貧學而不能行之謂病今憲貧也非病也子貢退有愧色知足者不以利自累審自得者失之而不懼行修於内者無位而不怍窮於道之謂窮抱仁義之道而遭亂世之患何窮之有智者謀之武者遂之仁者居之古之道也廢上非義也殺民非仁也人比其難我享其利非廉也摇脣鼓舌擅生是非好面譽人者亦好背而毁之也湯放其主武王殺紂自是之後以强凌弱以衆暴寡湯武以來皆亂人之徒也人之情目欲視色耳欲聽聲口欲察味志氣欲盈人上壽百歲中壽八十下壽六十除病瘦死申子三卷劉向云申子名不害河東人鄭時賤臣學術以干韓昭侯秦兵不敢至學本黄老急刻無恩非霸王之事三寸之篋運而天下定六寸之基正而天下治妬妻不難破家亂臣不難破國一妻擅夫衆妻皆亂一臣專君羣臣皆蔽智均不相使力均不相勝鼓不預五音而爲五音主百世有聖人猶隨踵千里有賢者是比肩慎子十二卷名到學本黄老滕輔生小人食於力君子食於道詩往志也書往誥也春秋往事也愛赤子不慢其保絶險者不慢其御措鈞石使禹察之不能識也懸於權衡則氂髮識矣兩貴不相事兩賤不相使家富則踈族聚家貧則兄弟離非不相愛利不足相容也不聦不明不能王不瞽不聾不能公海與山争水海必得之有權衡者不可欺以輕重有尺寸者不可差以長短有法度者不可巧以詐僞一兔走百人追積兔於市過而不顧非不欲兔分定不可争也孝子不生慈父之家忠臣不生聖君之下六親不和育孝慈國家昏亂有忠臣匠人成棺不憎人死利之所在忘其醜廊廟之材非一木之枝狐白之裘非一狐之腋藏甲之國必有兵遁有意者必先作具市人可驅而戰安國之兵不由忿起燕丹子三卷丹者燕王喜之子身質於秦始皇之世丈夫耻於受辱貞女羞於節虧血勇怒而面赤脉勇怒而面青骨勇怒而面白田光云光知荆軻者神勇也怒而不變高行厲天美聲盈耳荆軻之燕謂太子曰光揚太子高行厲天芙聲盈耳軻出衞都望無路歷險不以勤望遠不以遐今太子禮之以舊故之恩接之以新人之敬所以不復讓者信知己故也風蕭蕭兮易水寒壯士一去兮不復還軻曰太子若以燕當秦猶以羊捕狼軻乃請樊於期曰將軍得罪於秦父母妻子皆見焚軻爲將軍痛之今願得將軍之首與燕督亢地圖進之秦王必喜喜必見軻軻因左手把其袖右手揕丁鴆切其胷數以負燕之罪責以將軍之讎於期執刀自刎頭墜背後兩目不瞑太子聞之伏尸而哭函盛於期首與燕督亢地圖以獻秦武陽爲副軻不擇日而發太子賔客皆素衣冠送之易水之上軻起爲壽歌高漸離擊筑宋臆和之爲壯聲之髮怒衝冠作哀歌則士皆流涕二人皆升車終已不顧也荆軻至咸陽秦王大喜陛戟見荆軻軻捧樊於期首柙并地圖以次進羣臣皆呼萬歲秦武陽大恐荆軻顧笑武陽前謝曰北蕃蠻夷之鄙人未見天子願陛下少假借之使得畢事於前秦王曰軻起督亢圖進之荆軻發圖圖窮而匕首見因左手把秦王袖右手揕其胷數之曰從我計則生不從則死秦王曰乞聽琴聲而死召姬人鼓琴琴聲曰羅縠單衣可掣而絶八尺屏風可超而越轆轤之劒可負而拔軻不解音秦王從琴聲負劒拔之秦王斷軻兩手軻因倚柱而笑箕踞而駡曰吾爲竪子所欺事不濟也鬼谷子五卷樂氏注名臺緫按其書云周時有豪士隱者居鬼谷自號鬼谷先生無鄉里族姓名此蘇秦作書記之也鬼之言遠猶司馬相如假無是公云爾自古及今其道一也變化無窮各有所歸或陰或陽或柔或剛或開或閉或弛或張是以聖人守司其門户審察其先後口者心之門户智謀皆從之出或遥聞而相思或前進而不御世無常責事無常師抱薪赴火燥者先燃平地注水濕者先濡此類相應也智者不用其所短而用愚人之所長也不用其所拙而用愚人之所工也墻壞於有隙木毁於有節人動我静人言我聽能固能去在我而問知性則寡累知命則不憂憂累去則心平心平而仁義著矣以德養民猶草木之得時以仁化人猶天生草木以雨潤澤之尹文子二卷劉歆注尹文子序云文子出於周之尹齊宣王時居稷下余黄初末始到京師繆熙伯以此書見示聊定之名有三科一曰命物之名方圓白黑是也二曰毁譽之名善惡貴賤是也三曰況謂之名賢愚愛憎是也法有四呈一曰不變之法君臣上下是也二曰齊等之法能鄙同異是也三曰理衆之法慶賞刑罰是也四曰平准之法律度權量是也有理而無益於治者君子不言有能而無益於事者君子不爲倕不貴獨工貴與衆共巧今世之人行欲獨賢事欲獨能辯欲出羣勇欲絶衆田駢曰天下之士莫不處其門庭臣其妻子必遊宦諸侯之朝名利引之也彭蒙曰雉兔在野衆皆逐之分未定也鷄豕滿市莫有志者分定故也兩智不能相使兩貴不能相臨兩辯不能相屈力均勢敵故也專用聦明則功不成專用晦昧則事必悖一明一晦衆之所載禄薄者不可與經亂賞輕者不可與入難處上者不可不慎尹文子見宣王宣王不言而歎尹文子曰何歎王曰吾歎國中寡賢尹文子曰國中悉賢誰處王下誰爲王使人有字長子曰盜少子曰歐盜出行其父在後追而呼之曰盜盜吏聞因而縛之其父呼歐喻吏遽而聲不轉但言歐歐吏因而歐之幾至於死公孫文子一卷心者衆智之要物皆求於心修心而不知命猶無室而歸君子行善必有報小人行不善必有報樂者先王所以飾喜也軍旅者先王所以飾怒也舟從流於河而無維檝求安不可得也人有三百六十節當天之數形體有骨肉如地之厚有孔竅血脉如川谷也多食甘者有益於肉而骨不利多食苦者有益於骨而筋不利多食辛者有益於筋而氣不利陸賈新書二卷太中大夫陸賈也陽出雷電陰成雪霜善言古者合之於今能述遠者考之於近道爲智者設馬爲御者良賢爲聖者用辯爲智者通秦以刑罰爲巢故有覆巢破卵之患文公種米曾子牧羊智者所短不如愚者所長近河之地濕近山之木長山出雲而丘阜生氣四瀆東流而百川無西衆口毁譽浮石沈木羣邪相抑以直爲曲犬不夜吠鷄不夜鳴家若無聲官府若無事亭落若無人閭里不訟耆老不愁君子之治也玉斗酌酒金椀刻鏤所以夸小人非厚己也晁錯新書三卷高皇帝不用同姓爲親故能以誅暴亂令之所加莫不之所誅莫不服吕后專制社稷不傾若髮漢書云如帶公羊云如綫善爲政者士實於朝野牛馬實於陸鳥獸實於林上及飛鳥下及蟲魚載之如地包之如海陛下之地東西盡冠蓋之民南北極寒暑之和匈奴不得當一縣號令不時命曰傷天焚林斬木不時命曰傷地斷獄立刑不當命曰傷人賈誼新書八卷寒者利裋褐飢者甘糟糠秦二世立天下莫不引領而觀其政是故勞民易爲政也主之與臣若日與星貴之與賤若白與黑如身使臂臂之使指天子如堂羣臣如堦衆庶如地若經制不定猶渡江無維檝也中流遇風波船必覆矣採銅者棄其田疇家鑄者損其農事建武函谷臨晉三關以備山東諸侯也不如定地勢使無可備天下一通也與正人居不能無正人也猶生長於楚不能無楚語志有四興朝廷之志清以嚴祭祀之志思以和軍旅之志精以厲喪紀之志憂以愁言有四術敬以正朝廷之言和以序祭祀之言併聲氣軍旅之言悲不足喪紀之言翟王使使至楚楚王誇使者以章華之臺臺甚高三休乃至楚王曰翟國亦有此臺乎對曰翟王茅茨不剪綵椽不刻猶以爲作之者勞居之者佚楚王大怍吕氏春秋二十六卷靡曼皓齒鄭衞之音伐命之斧肥肉厚酒爛腸之食雷則掩耳電則掩目耳聞所惡不如不聞目見所惡不如無見强令之笑則不樂强令之哭則不悲不由中心也流水不腐户樞不蠹動也形氣亦然水泉東流日夜不休上不竭下不滿耳有所聞不學而不如聾目有所見不學而不如盲戎人生乎楚楚人生乎戎則楚人戎言戎人楚言亡國之主則可化成賢主也櫻桃之爲鳥所含故曰含桃勇凶德兵凶器今有利劒刺則不及與惡劍無異也水出於山而歸於海惡山而欲海高下使然也人謂兔絲無根其根不連屬耳茯芩是也磁石召針皆相引猶聖人南面而立則天下莫不延頸周文王使人相地得枯骨令吏衣冠葬之天下聞之曰文王賢矣澤及於枯骨齊人好勇者其一人居東郭一人居西郭幸而相遇飲酒曰酒須肉乎各抽刀自割相啖遂至於死石可破不可奪堅丹可磨不可奪赤性受於天也魯有醜者其父出見美者商咄反而告其鄰曰商咄不如吾子也是至美不如至惡愛子不知其醜也人有臭者其親戚兄弟妻妾知識無能與居者自屏乎海海上有人悦其臭者晝夜隨之不離也趙襄子攻翟勝方飲而有憂色曰江河之大不過三日一朝而下翟勝兩城亡將及我矣孔子聞之曰憂所以昌喜所以亡管仲爲魯所縛檻車載之使役人送于齊皆謳歌而引車管仲恐魯悔而止之又欲速至齊國謂役人曰我爲汝唱汝和我也役人不倦取道甚速管仲可謂能因矣因役人用勢欲走乃爲歌唱勸令走也有道之士貴以近知遠以今知古以所見知所不見故審堂下之陰而知日月之行見瓶水之氷知天下之寒嘗一臠之肉知一鑊之味有人方且過江引嬰兒欲投於水人問其故對曰其父善游其父雖善游其子未必能耶楚國之政有似如此不如吾者吾不與處與我齊者吾不與處無益我也周旦云君子屈於不知己而申于知己穴深一尋則人臂不及智亦有不至者樂羊伐中山歸有責功之色魏文侯以謗書兩篋示之樂羊北面再拜曰一寸之書亦止何須兩篋人驥俱走則人不勝驥居於車上則驥不勝人猶人主争官事與驥俱走無異也目之見也藉於照心之智也藉於理無骨之蟲不可令知氷春生秋死不知冬氷十里之間耳不能聞帷墻之外目不能見三畒之間心不能知而欲東至開悟南撫多鷃西服壽靡北懷弭耳何以得哉四極之國名管夷吾百里奚霸王之船驥絶江者託於船致遠者託於驥楚王問詹何治國之道對曰何聞治身不聞治國國之本在身也詹何隱者管仲曰君子有三色懽然喜樂者鐘鼓之色愀然清浄者縗絰之色沸然充盈者兵革之色洧水大有富人溺者有人得富者尸請贖而求金甚多富人黨以告鄧析析曰但安之必無買此者得尸者患其不贖又告鄧析析曰但安之必無人更賣又必無不贖言不欺心言所以喻心言於相離則不祥也以繩墨取木則宫室不成材難得也引其紀萬目起引其綱萬目張治民如此也决積水於千仞之溪誰能當者戎夷去齊往魯天大寒與弟子一人宿於郭外寒轉甚謂其弟子曰可以衣活我我國士也天下所惜子不肖不足惜也弟子曰不肖人安能與國士衣乎戎夷歎息乃解衣與弟子戎夷至夜半而死弟子乃活晏子遭崔杼之患援綏而乘其僕將馳晏子曰安之疾不必生徐必不死鹿生於山命懸於厨今晏命有所懸矣以龍致雨以形逐影類同則相召氣同則相合聲比則相應故鼓宫商應王德不通民欲不達此國之鬱也樹鬱則蠹水鬱則汗國鬱則萬灾聚矣天爲高矣日月星辰雲氣雨露未嘗休也地爲大矣水泉草木毛羽未嘗息也冠所以飾頭衣所以飾身今人斷首以易冠殺身以易衣則不知所爲矣世之趨利似此亦不知所爲也黄帝之貴亦死堯舜之賢亦死孟賁之勇亦死相玉者患石似玉相劒者患劒似吴干將賢主患辯者似通人亡國之主似智亡國之臣似忠子夏過衞有讀史記者曰晉師三豕渡河子夏曰非者也是己亥得十良馬不如得一伯樂得十良劒不如得一歐冶得地千里不如得一賢人夏不衣裘非不愛裘也煖有餘冬不用翣非不愛翣也清有餘火燭一隅則半室無光骨節早成身心不長吕不韋始皇時相國乃集儒士爲十二紀八覽六論曝於咸陽市有能增損一字與千金無敢易者十二紀之禮此不抄淮南子二十二卷以湯沃沸亂乃愈甚猶鞭噬天捶提馬而欲教之雖伊尹造父不能化任數者勞而無功色者白立而五色成道者一立而萬物成聾者學歌無以自樂夫内心不開而强如聾者校歌出於口越而散矣氷迎春則釋爲水水向冬則凝爲氷以道爲竿以德爲綸禮樂爲鈎仁義爲餌投之江浮之海萬物皆得歷陽之都一夕成湖歷陽淮南縣也有一人告歷陽毋曰見城門有血則有去無顧此後門吏告污血於門限毋便上北山縣果陷水中毋遂化作石也越舼蜀艇不能無水而浮烏號弓溪子弩不能無弦而射人主誅暴則多飄風法苛則多蟲螟殺不辜則多赤地令不時則多淫雨南方有不死之草北方有不釋之氷食水者善浮而耐寒魚屬也食土者無心而惠蚯蚓是也食木者多力而愚麋鹿是也食桑者有絲而蛾蠶屬也食肉者勇敢而悍虎豹是也食氣者神明而壽龜蛇之類王喬赤松是也食穀者智慧而夭人是也晝生者類父莫生者似母勇士一人爲三軍雄聖人若鏡不將不迎應而不藏乞火不若取燧寄汲不如鑿井譬羿請不死之藥於西王母姮娥竊而食之不知不死之藥所由生也生有七尺之形死爲一棺之土安知喜憎利害耶天地雖大可以短長知之星月之行可以律曆知之倉頡作字天雨粟鬼夜哭倉頡黄帝史臣也造文字則詐僞生故鬼哭也今執政者薄德增刑有似執彈而欲來鳥柙棁而欲狎犬柙棁挾杖也假輿馬者足不勞而致千里乘舟檝者不假游而絶江海譬智不任己才力木擊折軸水戾破舟不怨木石而罪巧拙何也智有不周債少者易償職寡者易守風疾而波興木茂而鳥集相生之勢文王智而好問故聖武王勇而好問故勝力勝其任則舉之者不重智能其事則爲之者不難天下之物莫凶於溪毒良醫藏之有所用也草莽猶不可棄況復人乎溪毒附子也十圍之木能持千鈞之屋五寸之楗能制門闔非材有巨細所居要耳使孔墨爲天下天下盡儒墨得其要也聖人之道若中衢置罇過者斟酌雖多少不同而各得其宜也衢六通罇酒罇三月嬰兒未知利害而慈母愛焉情也慈父愛子聖王養民若火自熱若氷自寒性使然也及其用力賴其功如失火舟中矣同心救火也車無三寸轄則不可馳户無五寸楗則不可閉故君子所須要也治國者若張琴瑟大絃䋎小絃絶治國者若設網引其綱萬目張多欲虧義多憂害智多懼妨勇虎豹以文彩射猨狖以捷來刺故子路以勇死長幼以智困吹灰而欲無眯涉水而欲無濡不可得也廣厦宏屋連闥通房人所安也鳥入之而憂深林藂薄人入而畏鳥入之則安深溪峭岸峻木尋枝猨狖所樂人則慄也翻基丸於地圓者走澤方者處高戴哀者聞歌而泣戴樂者見哭而笑强哭者雖戚不哀强歡者雖笑不樂芻狗土龍始成則衣以綺繡及其用畢則棄之土壤芻狗事以謝過士龍事以請雨禀道通物名異得道一也猶屠牛而烹其肉或甘劑萬方本一牛也伐豫章或爲棺槨或爲梁柱亦一木也蕭條者形之君寂寞者音之主客有見子賤賤曰客獨有三過望我而笑是慢也交淺而言深是患也語不稱名是反也客一體耳或爲君子或爲小人此視之異也待騕䮍飛兔而駕之則世莫有乘者待毛嬙西施而配之則終身無家矣待古英俊而用之則無人矣驥千里一日而通駕駑馬十駕旬日亦至猶人才不足專恃鳥窮則啄獸窮則觸人窮則詐峻刑嚴法不可以禁姦道德之論譬如日月江南河北不能易其指馳騖千里不能改其處趣舍禮裕猶宅之居也東家謂之西西家謂之東扣門求火無不與者饒足也故林中不貨薪湖上不鬻魚者有餘也不乘人之利不迫人之險叔向云墨者曰鳩欲見秦惠王三年不得見一至楚楚王悦之物固有近而之遠遠之而近故大丈夫行不可掩未得獸者唯恐創少已得唯恐創多古人婚禮不稱主人必稱父母兄弟舜不告瞽叟而娶非禮文王立伯邑可非制禮三十而家文王十六而生非法治國有常利民爲政本教有經令行爲上苟利其心不必法古苟周於事不必循常法度制令各因其宜變古未可非循俗不足多百川異源皆歸於海百家異業皆務於治盲者行於道人謂左則左謂右則右遇君子則得其平易遇小人則陷於溝壑東面而望不見西墻南向而視不覩北方唯無向者無所不通父溺則攬父髮而拯之非敢驕侮以救死也至賞不費至刑不濫乘船遇風波至而恐死自投於水中非不貴生畏死惑於畏死而反忘生也人之嗜慾者亦復如此溜水足以溢壺榼江河不能滿漏巵醉者赴淮以爲尋常之溝俛入城門以爲七尺之閨酒濁其神也馬免人於難者死葬之以蓋蒙之以衾牛有德於人葬之以大車用兵之道示之以柔乘之以剛示之以弱乘之以强若欲西者示之以東使知吾所出而不知吾所入若鬼無跡若水無創若電之激不可備也高城深池矢石如雨廣澤平原白刃交接士卒争先者爲其賞信罰明也暑不張蓋寒不披裘古之善將也軍通井而後飲軍食而後食所以同飢渴也矢石所及之處所以同安危也天下莫相憎於膠漆膠漆相賊膠漆相抱不得還其本也天下莫相愛於氷炭氷炭相思氷得炭則解故得歸其本也蘭生幽谷不爲莫服而不芳舟在江河不爲莫乘而不浮人有嫁其女而教之曰慎無爲善女問其故曰善尚不爲況不善乎拘囹圄者患日長當死市者患日短嫁女於消渴者夫死則言女妨狐白之裘天子披之在狐計者不如走澤先鍼而後縷可以成帷先縷而後鍼不可以成衣因媒而嫁不因媒而成顧人而交不因人而親披羊裘而賃顧其事過也衣貉裘而負籠甚可怪也君子不容非類日月不應非氣非禮而禮譬躶而追狂人盗而與乞者竊間寫法律蹲踞誦論詩書馬似鹿者千金天下無千金之鹿畫孟賁之目大而不可不畏畫西施之面美而不可不悦同污無異泥衆曲不容直衆枉不容正故人衆則食狼狼衆則食人郢人買屋棟與人車轂大雖可而長不足孕婦見兔則子缺脣文公棄衽席咎犯辭歸晉文公棄席之黑者捐故舊也故咎犯辭去知天將赦而多殺人或知天赦多活人人望欲同刑罰異也侏儒問天高於長人長人曰吾不知也曰爾去天近於我也問事當問近者自賣其母而請買者曰此母老矣望善飴之此大不義而欲爲小義狂人傷人莫之怨嬰疾無心也佳人不同體美人不同面而皆悦於目梨橘棗栗不同味皆訓於口一棋不足以見智一弦不足以見悲遺腹不思父無愛心也湯沐具而蟻蝨相弔大厦成而鷰雀相賀釣者静之網者動之罩者抑之罾者舉之爲道異得魚一田中之水流入海附耳之語聞千里中夏用䈉至冬不去舉衣過水至陸不下此不知變也靨在頰則好在顔則醜繡爲被則宜爲冠則穢山雲蒸柱礎潤茯苓抽兔絲死兔絲無根而生蛇無足而行魚無耳而聽蟬無口而鳴鶴千歲亦極其樂朝生暮死亦盡其樂明珠蚌之病也我之利也百星之明不如一月之光十牖之開不如一户之明披簑救火鑿瀆止水乃益多也鴻鵠在卯也一指蔑之則破及其羽翅成也背負青天膺磨赤霄哺且子不能得也戟以攻城鏡以照形宫人得戟則以刈葵盲人得鏡則以蓋巵堯八眉眉理八字也人有烹狙召鄰鄰者以爲狗羹食甚美後聞其狙據地吐之未始知味也邯鄲有吹者託名李奇人争學之後知其非皆棄其曲未始知音者李奇趙之善音者原蠶一歲再熟非不利也王法禁之爲其殘葉離稻熟農夫耨之不以小利傷大穫也稻米落地而生曰離稻屠者食藿羹爲車者多步行陶人用缺盆匠人居狹廬舟覆乃見善游馬奔乃見良馭林木茂而斧斤入質的張而弓矢集意林卷之二意林卷之三瑟
