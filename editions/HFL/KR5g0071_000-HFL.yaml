  text: 意林序瑟一
  hash: sha256:74978c7e122da9c438a4442575983e6d04cc6f7a094889e6f8043d630c685b35
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0071_HFL_000-001a, image: hfl/1000/1000-004.png}
body:
  text: 撫州刺史戴叔倫撰三聖相師大易光著天地之功立矣經傳之功生焉輔成一德謂之六學漢收秦業其道方興置講習訓授之官明君臣父子之體雖禮樂文缺亦足以新忠孝仁義之大綱至如曾孔荀孟之述其蓋數百千家皆發揮隱微羽翼風教祖儒尊道持法正名縱横立權變通其要崇儉而有别即農而得序傍行而不流小説去泥而篇簡繁夥罕備於士大夫之家有梁頴川庾仲容略其要會爲子書抄三十卷將以廣搜採異而立言之本或不求全大理評事扶風馬緫元會家有子史幼而集録探其旨趣意必有歸遂增損庾書詳擇前體裁成三軸目曰意林上以防守教之失中以補比事之闕下以佐屬文之緒有䟽通廣博潔浄符信之要無僻放拘刻譤蔽邪盪之患君子曰以少爲貴者其是之謂乎余元會之執友故序而記之貞元二年五月二十一日也子書起於鬻熊六韜盛於春秋六國時莊老道宗起覆載之功横日月之照高視六經爲天下式故絶於稱言矣墨翟大賢其旨精儉教名亞孔聖至矣管晏文言可謂庶矣而部帙繁廣尋覽頗難梁朝庾仲容抄成三帙汰其沙石簸其粃糠而猶蘭蓀雜於蕭艾璠璵隱於璞石扶風馬緫精好前志務於簡要又因庾仲容之抄略存爲六卷題曰意林聖賢則糟粕靡遺流略則精華盡在可謂妙矣隋代博陵李文博攓掇諸子編成理道集十卷唐永興公虞世南亦採前史著帝王略論五卷天后朝宰臣朱翼祖則又述十代興亡論一帙洎扶風意林究子史大略者蓋四人意矣予扁舟塗水留滯廬陵扶風爲余語其本尚且日編録所取先務於經濟次存作者之意罔失篇目如面古人予懿馬氏之作文約趣深誠可謂懷袖百家掌握千卷之子用心也遠乎哉旌其可美述於篇首俾傳好事貞元丁卯歲夏之晦文廢瞍河東柳伯存重述意林目録卷之一鬻子一卷太公金匱二卷太公六韜六卷曾子二卷晏子八卷子思子七卷孟子十四卷管子十八卷道德經二卷荀卿子十二卷魯連子五卷文子十二卷鄧析子一卷范子十二卷胡非子一卷墨子十六卷纏子一卷隨巢子一卷尸子二十卷韓子二十卷卷之二列子八卷莊子十卷鶡冠子三卷王孫子一卷申子三卷慎子十二卷燕丹子三卷鬼谷子五卷尹文子二卷公孫文子一卷陸賈新書二卷晁錯新書三卷賈誼新書八卷吕氏春秋二十六卷淮南子二十二卷卷之三鹽鐵論十卷説苑二十卷太玄經十卷法言十五卷論衡二十七卷新論十七卷潜夫論十卷正論五卷卷之四風俗通三十一卷商君書四卷阮子四卷正部十卷士緯十卷通語八卷抱朴子四十卷卷之五周生烈子五卷荀悦申鑒五卷仲長昌言十卷典論五卷魏子十卷人物志三卷任子十卷篤論四卷體論四卷傅子一百二十卷唐子一十卷秦子二卷梅子一卷物理論十六卷太元經十四卷化清經十卷鄒子一卷成敗志三卷古今通論三卷中論六卷意林目録終意林卷之一扶風馬緫元會編
