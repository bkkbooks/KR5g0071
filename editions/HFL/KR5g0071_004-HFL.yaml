  hash: sha256:754a9d5828d502f19ae91df8f089811d9affe9e0a487b20528975700f7c90f75
body:
  text: 扶風馬緫元會編風俗通三十一卷應劭序云風者天氣有寒煖地形有險易水泉有美惡草木有剛柔俗者含血之類象之而生百里不同風千里不同俗周秦常以八月遣輶軒使者採異代芳言藏之祕府及嬴氏之亡遺棄殆盡蜀人嚴君平有千餘言林閭翁孺才者有梗槩與揚雄注云續二十七年凡九千字張竦云懸諸日月不刊之書余雖不才敢比隆於斯人神農者神信也農濃也其德濃厚若神五帝黄帝顓頊帝嚳堯舜也黄光也顓專也頊信也嚳考也堯高也舜推也修也言推德行修堯之緒三王禮號謚云夏禹殷湯周武王禹輔也湯昌也王往也言天下所歸往五伯春秋云齊桓晉文秦繆宋襄楚莊伯者白也長也言其咸建五長功實明白霸者把也言其把持天下之政按秦昭王太后始臨朝也牧守長不宜數易按尚書有考績孔子曰如有用我者期月而已三年有成鄭子産從政三年民乃歌之賢聖尚須漸進況中才乎數易豈不紛錯道路也古制本無奴婢奴婢皆是犯事者奴者劣婢者卑陋里語云取官漫漫怨死者半昔在清平之世使明恕君子哀矜折獄尚有怨言況在今時耶應劭三國時人此當時語光武車駕徙都洛陽載素簡紙經凡二千兩董卓盪覆王室天子西移中外倉卒所載書七十車於道遇雨分半投棄卓又燒焫觀閣經籍盡作灰燼所有餘者或作囊帳先王之道幾烟滅矣俗説有功得賜金者皆黄金也按孫子兵書日費千金千金百萬錢也陳平諫楚千金贈二踈金五十斤並黄金也或云一金亦是一萬錢也不養併生三子俗説似六畜妨父母按春秋國語越王時民生二子與之餘生三子與之乳母遂滅强吴何害之有不舉父同月子俗云妨父按左傳魯桓公子與父同月因名子同生漢明帝亦與光武同月生不宜歸生俗云令人衰按人婦好以女易他男故不許歸封泰山俗説岱宗上有金篋玉策能知人年壽脩短武帝探得十八因倒讀之曰八十按岱宗封者立石高一丈二尺刻之曰事天以禮立身以義事父以孝成名以仁四方之内莫不師服刻石紀號著功績也其時武帝已年三十七因何更得十八若言倒讀神無福矣余承乏東嶽忝素六載數經祈祀咨問長老更上泰山者云無金篋玉牒探壽之事東方朔是太白精黄帝時作風后堯時作務成子後又生於越在越作范蠡在齊作鴟夷子言其變化無常也按朔滑稽之雄俗人因以怪語附之安得神耶彭城相表元服父伯楚作光禄卿於服中生子自謂年長不孝莫大於無後故收舉之君子不隱其過因以服作字按元服名賀母汝南人祖名京作侍中安帝時生元服百官來賀垂老而孫兒生喜其嘉會因名作賀字元服父伯楚歷典三郡早喪妻不肯娶臨終勑子便留葬無取汝母喪柩若亡者有知往來不難若無知只爲煩耳清高若此豈有服中生子而名作賀汝南王叔漢父子方出遊二十餘年不還叔漢作尚書郞有人告子方死於汝南即遣兄伯三往迎喪叔漢即發衰詔書賻錢二十萬既而子方從蒼梧還叔漢詣闕乞納賻錢受虚妄罪靈帝詔將相大夫會議之博士任敏議云凡人中壽七十視父同儕亡可製服也子方在遠人指其處不可驗也罪不可加焉詔書還錢復本官汝南張妙會杜士士家娶婦酒後相戲張妙縛杜士捶二十又懸足指士遂致死鮑昱决事云酒後相戲原其本心無賊害之意冝减死也汝南周翁仲婦産一女會屠者妻産一男翁仲妻密以錢易屠者之男後翁仲作北海相使見鬼主簿周光與兒同祭先塋主簿回謂翁仲曰祭所但見屠兒弊衣繿縷持刃割肉别有人帶青綬仿偟東厢不進何也翁仲乃持劒問妻妻具陳其事翁仲曰凡有子者欲承先祖先祖不享何用遂以車馬送還屠家乃迎其女女已嫁賣餅人取歸適安平李文思文思官至南陽太守神不歆非類明矣豈得養他人子乎陳留有富翁年九十無男娶田舍女一宿身死後産一男至長女曰我父娶一宿身亡此子非父之子遂争財數年不决丞相邴吉决云老翁兒無影不耐寒其時八月中取同歲小兒俱解衣試之老翁兒獨呼寒日中行果然無影遂以財與之頴川有兄弟同居兩婦俱懷妊長婦數月胎傷不言知産期至俱卧産房候弟婦産得一男夜盗之因争三年不决丞相黄霸殿前令以兒去兩母各十步叱兩婦令争取之長婦把持甚急兒大啼弟婦恐傷放之長婦色喜弟婦愴然霸曰此弟婦子也即劾長婦果然伏罪臨淮有一人持一疋縑到市賣之遇雨披之後有一人求庇廕一頭之地雨霽共争之丞相薛宣决曰縑直數百何用紛紛遂中斷各與半續察之縑主稱冤不已後人有喜色宣知其情考而伏之周公樂曰勺勺者斟酌先祖之道武王樂曰武功定天下也舜樂曰韶韶者紹紹堯也堯樂曰大章章者彰也帝嚳樂曰五英英者華也劉向云商章也物成就可章度也角觸也物觸地載芒角而生也宫者中也徵者祉也物盛大而繁祉羽者宇也物聚藏宇覆之聞宫聲使人温潤而廣大聞商聲使人方正而好義聞角聲使人齊整而好禮聞徵聲使人隱惻而博愛聞羽聲使人善養而好聞琵琶近世樂家所作不知誰也以手琵琶因以得名長三尺五寸法天地人與五行也四絃象四時易云利見大人大人與聖人其義一也論語云君子上達臧孫紇曰後有達者將在孔丘乎儒者區也别古今賢愚章家時以賈逵曰通儒時人語曰問事不休賈長頭禮云羣居五人長者必異席今呼權貴作長者非也管子云先生施教弟子則之非知古之道是師者之稱諸生弟子學者非一故曰諸先生者當如醒學者譬如醉言生俱醉獨有醒者祭酒禮云飲酒必祭尊其先也孫卿在齊最是師老故三稱祭酒士詩云殷士膚敏髦士俊秀雅士博達列士有不易之分處士隱居放言易云師貞丈人吉非徒尊老須德行先人也傳云杖德莫如信者其恩德可信杖也禮云十尺曰丈成人之長也夫者膚也言其智膚敏弘教也故曰丈夫論語云匹夫匹婦傳云一晝一夜成一日一男一女成一室按古人男女作衣用二疋今人單衣故言疋夫人當龍變起不繫郷里若止繫風俗見善不徙故謂之俗人禮言簡不肖按生子鄙陋不似父母曰不肖今人謙辭亦曰不肖方曰人不事事而放蕩謂之無賴不可恃賴也猶高祖謂太上皇云大人以臣無賴也司徒中山祝恬字伯休公車徵在道得温疾過友人謝著著拒不受至汲郡止客舍舍六七日諸生見恬轉劇欲告汲令恬曰友人尚不相容汲令不相識告之何益死生命也不須醫藥諸生潜告汲令令即汝南應融聞之大驚至疾所泣曰伯休不世英才當作國家幹輔何乃默止客舍不遣人知融遂躬御而歸親自侍疾疾漸損融謂伯休曰吉凶不諱憂怖交心已備凶具對之悲喜伯休停傳舍數十日遂去拜侍中尚書令又拜司隸薦融自代歷典五郡謝著不謂公府所取上古之時草居霜宿冬則山南夏則山北彭城孝廉張子矯議云若君臣不得相襲作名周穆王諱滿至定王時有王孫滿厲王諱胡莊王之子名胡俗云五月到官至免不遷今年有茂才除蕭令五月到官破日日入舍視事五月四府所表遷武陵令余爲營陵令正觸太歲主簿令余東北上余不從在事五月遷太山守楚辭云風伯飛廉也按周禮祀風師箕星也主簸揚能致風氣戊戌之神作風伯故丙戌日祀於西北按周禮雨師畢星也土中之衆莫若水故雨稱師丑之神作雨師故己丑日祀之桓帝元嘉中京婦女作愁眉啼粧墜馬髻折腰步齒笑愁眉者細而折啼粧者薄拭眼下似啼痕墜馬髻側在一邊折腰步足不在體齒笑若齒痛此事並出梁冀傳曰趙王好大眉人間皆半額楚王好廣領國人皆没項齊王好細腰後宫有餓死者京師有胡服胡帳胡牀胡箜篌胡笛胡舞按董卓時兵填塞是也靈帝宫中遊西園駕四白駝躬自操轡公卿倣效價與馬齊桓帝世謡言直如絃死道邊曲如鈎反封侯梁冀欲樹幼主李固欲立清河王梁冀遂奏李固死于獄中曝屍路邊如鈎梁冀如絃李固千里草何青青十月卜不得一日生此董卓字也青青暴盛之貌秦漢以來尊者號作宫室已前貴賤無别按世本鮌作城郭城盛也郭大也按天子有外屏令臣下屏氣息菀菀藴也薪蒸之所藴積孫子云金城湯池而無粟者太公墨翟不能守之郡者羣也左傳云上大夫受縣下大夫受郡至始皇方以郡監縣縣平也傳舍按使者傳言乃得舍於傳也南北曰阡東西曰陌按易傳上古有恙由善與人作患故人平居曰無恙城門失火禍及池魚俗説池與魚人姓字居近城門也按城門失火取池水故魚皆死獄自三王制肉刑始有獄夏曰下臺周曰囹圄令人思諐改惡獄字二犬守言無情狀犬亦得之囚罪人置諸圓土故囚字從口中人罪字本從自辛苦憂之秦皇謂辠字似皇故改作罪會稽多淫祀家貧不得牛祀者死作牛鳴太守第五倫嚴科絶之桂陽太守李叔堅少時作州從事家有狗作人立叔堅曰此狗喻人人行何害叔堅作縣令解冠榻上狗戴之而走叔堅曰此狗誤觸冠纓冠纓挂其耳矣犬復與人竈前畜火鄰里告之叔堅曰狗能畜火幸不須人犬遂暴死叔堅至大位商君書四卷夫有高人之行見非於世有獨知之眀見怨於人螟𧑞春生秋死一出而民數年乏食今一人耕百人食有甚於螟𧑞矣農者少而遊食遊食者衆則農怠農怠則治荒以强去弱者弱以弱去强者强上世之士衣不暖膚食不滿腹苦其心意勞其四支古者民叢生而羣處亂立君蠹衆則木折隙大則墻壞不勝而生不敗而亡自古及今未嘗有也使見戰如餓狼之見肉則可用矣聖人制民也如高下制水如燥濕制火阮子四卷漁人張網於淵以制吞舟之魚明主張法於天下以制强梁之人立法以隄民百姓不能干立防以隄水江河不能犯防而可犯則江河成灾法而可干則百姓成害不樹者死無棺不蠶者身無帛不績者凶無縗君子暇豫則思義小人暇豫則思邪高鳥相木而集智士擇土而翔一盜不誅害在穿窬修譽不誅害在詞主正部十卷凡人矇矇冥冥學以啓志行以處身進於道則成君子非於禮則曰小人君子之舉履德而榮光小人之動陷惡而傷刑皎皎練練得藍則青得丹則赤得蘗則黄得涅則黑玉不琢則南山之圓石穿窬之徒不避腰領奔北之士不憚斧鉞漢家窮天涯究地沂左湯谷右虞淵前炎楚後塞門祁連以北黄山以南碣石以東合黎以西莫不襁負來貢仲尼叙書上謂天談下謂民語兼該男女究其表裏淮南浮僞而多恢太玄幽虚而少效法言雜錯而無主新書繁文而鮮用玉符云赤如鷄冠黄如蒸栗白如脂肪黑如淳漆此玉之符也言成雅訓辭作典謨此人之符也山神曰螭物精曰魅土精曰羵羊水精曰罔象木精曰畢方火精曰遊光金精曰清明天下有道則衆精潜藏天以仙人曰子衆人曰芻狗愛其子私其壽賤芻狗聽其夭若不學譬如無目而視無脛而走無翅而飛無口而語不可得也桀紂雖有天子之位而無一人之譽猶朽株枯樹逢風則仆明刑審法憐民惠下生者不怨死者不恨諺曰政如氷霜姦宄消亡威加雷霆㓂賊不生士緯十卷姚信孔文舉金性太多木性不足背陰向陽雄倬孤立絲俱生於蠶銅等出於石作繒則賤作錦則貴鑄鈴則小鑄鐘則大經漸車之水歷繞輪之沙趾跡高下不可論凡水温則成湯寒則成氷氷湯異氣而水性猶同蠶能投練匪湯不綿人性推移蓋此比也琴瑟張而鄭衞作五色成而綺穀生孟軻驅世事於仁義之域行者步中正之塗若使南海無採珠之氏崑山無破玉之工則明珠不御於椒室美玉不佩於桂宫通語八卷輪者車之跡檝者舟之羽身之須道如此二物毁彼者雷同而鳴噪稱此者火燎而波駭或問陳蕃忠乎答云單車作討賊之斧直階非亂世之資知其忠不如其智也才貴精學貴講質勝文石建文勝質蔡邕文質彬彬徐幹庶幾也抱朴子四十卷外篇二十卷内篇二十卷葛洪宇稚川清醪芳醴亂性者也紅華素質伐命者也班狄不能削石作芒針歐冶不能鑄鉛錫作干將漢中起居注云李少君欲去武帝夢與同登嵩高山半道有使者乘龍持節從雲中來云太一請少君帝曰少君將舍我去矣數日而少君死久之發看唯衣冠在焉以蟻鼻之缺捐無價之淳鈎分寸之瑕棄盈尺之夜光朱公所以鬱邑薛灼所以永歎猶人不學仙也道術乃令變形易貌吞刀吐火坐在立亡興雲起霧召致蛇蟲聚合魚鼈入淵不溺蹴刃不傷陳仲弓異聞記云同郡人張廣遭亂有女四歲不能行棄冢中以數月糧與之後三年乃還欲收葬之女猶坐冢中問其故女曰糧盡以後見冢角有一物申頸吞氣乃效之轉不復飢尋看乃大龜也將女還食食飮初小腹痛久乃習之湯師蜘蛛而結網金天據九鴈以正時唐堯見蓂莢而知月道能登虛躡影飮玉醴食翠芝彭祖云天上多尊官新仙者位卑奉事非一也農夫得彤弓以驅烏南城得衮衣以負薪猶世人得仙丹而不貴也元君老君師也世人唯競飛蒼走黄依榮逐利上士得道成天官中士得道棲集崑崙下士得道長生世間朱草莖如珊瑚刻之汁流如血以玉投汁中丸之如泥久即成水以金投之曰金漿以玉投之曰玉醴服之長生石先生丹法取烏未生毛者以眞丹和牛肉飴之長毛羽赤色煞陰乾服之壽五百歲素顔紅膚或其目清商流徴亂其聽此眞埋之德也龍淵以靡豁常新斧斤以日用速弊寸蛕泛濫跡水之中則謂天下無四海之廣芒蝎宛轉果核之内則謂天下無八極之大漏脯救飢酒止渴非不暫飽死亦及之貴明珠而賤淵潭愛和璧而惡荆山不知淵潭是明珠所出荆山是和璧所生方今士有待次之滯官無暫曠之職景風起則裘鑪息世道夷則奇士退肉芝是萬歲蟾蜍頭上有丹書八字五月五日中時取之以足畫地則水流帶之左手則辟兵行山中見小兒乘車馬長七八寸者肉芝也服之得仙千歲蝙蝠白如雪住則倒懸腦重故也千歲燕窠門向北雲英雲珠雲液雲母雲沙服之用玉水成帝獵於終南山見一人無衣身生黑毛合圍取之絶坑踰岸有如飛烏及得是婦人自云秦時宫人關東賊至秦王出降驚走入山垂當飢死有老翁令食松實遂不復飢乃是秦王子嬰宫人至成帝二百許歲人將還以穀食之毛稍脫落轉老而死欲長生服山精山精术也陵陽子仲服遠志二十年有子三十七人讀書不忘得聖人是黄老世聖是周孔二人善圍碁者謂之碁聖故嚴子卿馬綏眀有碁聖人之名彭祖自嚳佐堯歷夏至殷殷王遣宫女受房中之術有驗乃欲殺之以絶其法彭祖知之乃逃七十年有人見于流沙欲得長生腹中清欲得不死腹無屎里語云人在世間日失一日如牽牛羊諧屠所每進一步去死轉近老君姓李名聃字伯陽長九尺黃色鳥喙隆鼻眉五寸住金樓玉堂雞舌香黄連乳汁治目中百病諺曰無肥仙人富道士雖能作金銀皆自貧諺曰書三寫魚成魯帝成虎亦如神符今用少驗白石似玉姦佞似賢鸞不掛網麟不墮穽寸膠不能治黄河之濁尺水不能却蕭丘之熱穿舟以息漏猛爨以止沸不可得也若使素士行耕以餬口夜薪火以修業則游夏不足多矣大厦既燒取水於滄海洪潦凌空伐舟於長川則不及矣臣猶手足履氷執熱不得辭焉高嚴將隕非細縷所綴龍門沸騰非掬壤所遏劒戟不長於縫緝可以剸割牛馬錐鑚不可剸割牛馬而長於縫緝材有大小不可棄也六軍如林未必皆勇仁者政之脂粉刑者世之轡策當殺不殺大賊乃發鑚端之火口水可滅鵠卵未乳指掌可縻及其乘衝飈燎巨野奮六翮凌朝霞雖智勇不能制也委轡筴而乘奔馬於險途捨柂櫓而泛輕舟於江海豈不險哉金舟不能淩陽侯之波玉馬不任聘千里之跡或輸自售之寳或賣要人之書或父兄貴顯望門而辟命或低頭屈膝積習而見收語曰舉秀才不知書察孝廉父别居寒素清白濁如泥高第良將怯如蠅諺曰古人欲達勤讀書經今世圖官免治生余謂朋友之交不宜浮雜面而不心揚雄所譏明鏡舉則傾冠見羲和照則曲影覺周勃杜稷之臣不能答錢穀之數識珍者必拾濯水之明珠賞氣者必將穢藪之芳蕙自非懸鑑誰能披泥抽淪玉澄川掇沈珠智大者盤桓以山峙器小者蓬飛而萍浮直繩枉木之所憎清公姦慝之所讎文王之接吕望桑陰未移而知其可師矣玄德之見孔明晷景未改而腹心以委矣貌望豐偉者不必賢形氣尪𦍕者不必愚伯喈識絶音之器於烟燼之餘平子别逸響之竹於未用之前威儀如龍虎盤族成規矩酒後體輕耳熱冠脫帶解遲重者蓬轉而波偃整肅者鹿勇而魚臞口訥者皆揺掌以譜聲不競者皆裨膽而高發以九折同蟻封以吕梁同牛跡禁之彌極不可向也君若畏酒如畏疾憎醉如憎大病則無荒沈之咎矣民有穴地而釀酒囊懷酒者法輕利重安能令絶乎管輅頓仰三斗而清辯綺粲揚雄酒不離口而太玄乃就慕惡者如宵蟲之赴眀燭學惡者如輕埃之應飈風有斧無柯無如之何以傾倚屈申者妍媚以風格端嚴者田舍豈不惑也窮巷諸生吟誦而向枯簡匍匐而守黄卷低眉屈膝趨事豪貴毛成翼長蟬脫泉壤自乃軒昂此碑碎之徒也昔西施以心痛卧於道側蘭麝芬芳人皆美之鄰女慕焉人皆憎之猶世人效戴叔鸞阮嗣宗也逢世所貴則蹇驢蒙龍駿之價狐白不可以當暑龍艘不可以乘陸夫良將剛則法天可望而不可干柔則象淵可觀而不可入去如收電可見而不可追住如丘山可觀而不可動春以長矛在前夏以大戟在前秋以弓弩在前冬以刀盾在前此行軍四時應天法也太公云從孤擊虛萬人無餘一女子當百丈夫風鳴葉者賊在十里鳴條者百里揺枝者四百里金器自鳴及焦器鳴者軍疲也氣如驚鹿敗軍氣也雨露霑衣裳者謂潤兵不霑衣裳者謂泣軍軍兵太一玉帳之中不可攻也兵地生蟹者宜速移余嘗聞嵇生曰左太冲張茂先可謂通人乎君道答曰通人者聖人之次也其間無所復容余問班班云吕氏望雲而知高祖所在天豈獨開吕氏之目而掩衆人之目耶閹官無情不得謂貞倡獨不飲不可謂廉文王食子羹佯不知非甘也董仲舒學見深而天才鈍以蜉蜂是神龍者非但不識神龍亦不識蜉蜂王仲任撫班固背曰此兒必爲天下知名五嶺無冬殞之木南海晉安有九熟之稻老君玉策云松脂入地千年作茯苓茯苓千年作琥珀琥珀千年作石膽石膽千年作威喜炙鼓使鳴絞絃令悲實使鼓速穿絃早絶磨刀殺馬立可驗也蜉蜂窠作蠟水沫作浮石落星惘謂昊時星落汲冢書云黃帝仙去其臣有夫徹者削木作黄帝之像帥諸侯奉之食鵲胎令人能夜書河伯華陰人以八月上庚日渡河溺死天帝署作河伯鵝鬼昊景帝有疾召巫覡帝試之乃殺鵝埋於苑中架小屋施牀帳以婦人履著其前巫云但見一白鵝不見婦人也帝乃重之瀰猴鬼余友人膠永叔嘗養一大獼猴以鐵鎖鎖之於牀間大齧殺經百日許鬼見者云承塵上有獼猴被瘡流血余從祖得道能分形座上有一葛公與一談話又一葛公迎來送去余見二陸之文百卷許似未盡也方之他人若江漢與潢汙也嵇生云每讀二陸之文未嘗不廢卷而歎恐其卷盡也陸子十篇誠謂快書其辭富者雖精思不可損也其理約者雖鴻筆不可益也觀此二人豈徒儒雅之士文章之人也抱朴子曰秦時不覺無鼻之醜陽翟憎無癭之人陸君深識文章放蕩不作虛誕之言非不能也陸君之文猶玄圃玉無非夜光却後數百年若有幹跡如二陸猶比肩也不謂踈矣孔鄭之門耳聽口受者皆已滅絶唯託竹素者可謂世寳羈鞍仁義纓鎖禮樂余友人玄伯先生以儒墨作城池以機神作干戈上世之人氷結而不寒資粮絶而不飢獺多則魚擾鷹衆則鳥亂盈丈之尾必非咫尺之軀尋仞之牙必非膚寸之口禰衡常云孔融荀强可與語餘人酒甕飯囊洪宇稚川丹陽句容人其先葛天氏洪累遭火典籍盡乃負笈徒步借書抄寫賣薪買紙然火披覽所寫皆反覆有宇人少能讀之性質容易冠纓垢弊或廣衣大帶或促身脩袖或長裾曳地或短不蔽膝時人咸稱抱朴之士因以著書名焉洪貧無僕童籬落不修常披榛出門排草入室洪性不干犯官長不煩擾親族稽君道作廣州刺史表洪參軍乃非所樂利得避身於南地也洪不圍碁樗蒲見人博奕了不觀之洪年十五大作詩賦自謂可行於代至弱冠尋覽殊不稱意一時毁之意林卷之四意林卷之五瑟五扶風馬緫元會編
