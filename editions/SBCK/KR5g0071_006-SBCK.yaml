front:
  text: 意林卷六照宋刻全本補
  hash: sha256:5e4700d2d194f2db88be7df163a3e9871938b0cc5d3fed95acff105e86318648
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0071_SBCK_006-1a}
body:
  text: 萬機論八卷蔣濟甲作乙婦丙來殺乙而甲不知後甲遂嫁與丙作妻生二子丙乃語甲甲因丙醉殺之並害二子於義剛烈則寛死否參者云女子潔行專一不以鼓刀稱義今又改嫁巳絕先夫之恩親害胞胎又無慈母之道也法訓八卷名用公人好人之公私人好人之私念巳之短好人之長近仁也有財不濟交非有財也有位不舉能非有位也相憎者能生無辜之毁相愛者能飾無實之譽君子好聞過而無過小人惡聞過而有過新言呉太常顧譚字默造刑者小人之防禮者君子之稔佞人之入雖燃膏莫見其淸也鍾子芻蕘五卷士季珪玉棄於糞土鉛錫列於和肆觀者以鉛錫是眞珪璧是僞膠之與漆合而不離煙之與水離而不合典語十卷陸景榮辱所以化君子賞罰所以禦小人受金行穢非貞士之操背主事讐非忠臣之節唯高帝用陳平齊桓用管仲耳拘烏之手雖錙銖不能勝掩離婁之目雖崇岱不能睹絆騄驥之足雖跬步不能發斷鴻鵠之翮雖尋常不能奮默記三卷呉大鴻臚張儼字子節堯舜不能化朱均使爲善瞽瞍不能染重華使行惡新言五卷裴糸鷙鳥之擊必俛其首猛獸之攫必匿其爪虎豹不外其牙噬犬不見其齒故用兵者示之以柔迎之以剛見之以弱乗之以强烏鳶之卵不毁則鳯凰至誹謗之言不誅則忠言達千里之隄以螻蟻之穴漏百材之屋以突之煙焚正書二十五卷袁凖交接廣而信衰于友爵祿厚而忠衰于君曾子妻將適市兒隨啼謂兒曰吾還與汝殺犬妻還曾子援弓將射犬妻日向與兒戲乎曾子曰教化始于童昏若之何其以訓耶正論十九卷袁字耀卿鴟抱鼠而仰號恐鵷鶵之奪己蘇子十八卷名淳衛人也蘭以芳致燒膏以肥見翠以羽殃身蚌以珠碎腹女惡蛾眉士惡多口由來尙矣周之管蔡秦之趙高其惡何比吾欲比之狗馬狗馬能致遠伏狩吾欲比之虎豹虎豹則君子愛其文章吾欲比之蝮蛇蝮蛇則療偏枯之疾吾欲比之鴆鳥鴆鳥又能去公子牙而安魯國惟有靑蠅蒼鼠覆國殘家可比世要十卷桓範字元則魏大司農加脂粉則嫫母進不潔則西施屏今學亦如此學之脂粉亦厚矣伐一樹除一苗猶先看可伐而除之况害人而不詳審也遇不遇命也善不善人也君子能修善而未必遇小人不能修善未必不遇中才之人知隨年長事以學增故年長則智廣疑缺二字則見博陸子十卷名雲字士龍晉人水則有波釣則有磨我入便之無如之何物動而亹已將形而行迹以在木而音和絲在繡而服美神觸物而機駭情遭變而思易新論十卷夏侯湛字孝若晉散騎常侍爪生于肉去爪而肉不知髪生于皮去髪而皮不知萬物之在天地同爪髪之在身體皆統于神明不可亂也擇才而官之則明主不用不肖之臣擇主而事之則君子不事昏闇之主析言十卷張顯被仁義作府庫食道德作棃棗古人有言君不稽古無以承天臣不稽古無以事君始皇李斯是巳幽求子二十卷杜夷字晉國子祭酒凡人旣飽而後輕食旣煖而後輕衣服臨觴念感則旨酒失甘對饗思哀則嘉餚易味裘以嚴霜見愛葛以當暑見親玉以石辨白以黑昭故醜好相招從山林猶朝延猶飛鴻之與雞鶩獵者嗜肉不多於不獵者及其凌崗巒超溪壑而有遺身之志耳干子十卷名寶字令升執杓而飮河者不過滿腹棄室而灑雨者不過濡身弱于巳則虎步而凌之勢强于巳則躐行而事之此姦雄之才也亦且小人新論十卷華譚字令恩仕晉干雲之枝不育於垤之顚徑寸之珠不産于渟汙之渚志林二十四卷盧達東海之魚墜一鱗崑崙之木棄一葉世人皆能知之孫子十二卷名綽字興公仕晉教之治性猶藥之治病疾若倒懸而求藥于崑崙之山是身後也大光明乎天燈燭何施矣時雨濡乎地漑灌何用焉朱門之家鬼守其闕多藏之室人窺其牆義記十卷名夷衣煖而忘百姓之寒食美而忘百姓之飢非人也假天下之目以視則四海毫末可見借六合之耳以聽則八表之音可聞國無道而尸大位可恥也國有道而有抱關擊柝亦恥也遊女見人悅之則自謂逾于西施桀紂見人尊之則自謂過于禹湯登高使人意遠臨深使人志淸諸葛子一卷縱盗飮酒非翦惡之法絕纓加賜非防邪之萌要言十四卷食穀而鄙田衣帛而笑蠶豈不惑耶符子二十卷名朗水生于石未有居山而溺者火生于木未有抱木而焦者神農本草六卷稽首再拜問于太一小子曰自鑿井出泉五味煎煮口别生熟後乃食咀男女異利子識其父曾聞太古之時人壽過百無殂落之咎獨何氣使然耶太一小子曰天有九門中門最良日月行之名曰國皇字曰老人出見南方長生不死衆耀同光神農乃從而嘗藥以救人命相牛經一卷寗戚相馬經二卷伯樂相鶴經一卷浮公司馬兵法三卷穰苴國雖大戰必亡天下雖平天下亦危古者國容不入軍軍容不入國國容入軍則軍亂軍容入國則國亂順命上賞犯令上戮孫子兵法十卷名武黃石公記三卷與衆好生者靡不成與衆同惡者靡不傾四民用虛國家無儲四民用足國家安樂汜勝之書二卷相貝經一卷淮南萬畢術一卷首澤浮針取頭中垢塞針孔置水中則浮燒角入山則虎豹自遠惡其息也取大鏡高懸置水盆于其下則見四鄰矣取沸湯置瓮中密以新縑沈中三日成冰取鴻毛縑囊貯之可以渡江不溺馬好嚙人取殭蠶塗其上唇卽差取門冬赤黍漬以狐血陰乾之欲飮酒者取一丸置舌下以含之令人不醉博物志十一卷張華字茂先竹譜一卷戴凱之筆墨法一卷韋仲將筆用羊靑作心明曰羊柱以毫衣羊靑使中心高並去其穢毛使毛不髯茹也新序三十卷五教五卷譙周周髀一卷夢書十卷九章算術一卷卷二補二家本有目無文卷六全補共四十一家内有目無文十三家勤圃先生所採逸文略見於此惟袁準正書太歲在酉一條此轉失去大都宋本亦不全矣此從選樓鈔得成完璧實爲可寶惜周先生未見也嘉慶丙子四月李遇孫識
