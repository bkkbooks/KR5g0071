body:
  text: 扶風馬緫元會編鬻子一卷藝文志云名熊著子二十二篇今一卷六篇發政施令天下福謂之道上下相親謂之和不求而得謂之信除天下之害謂之仁信而能和者帝王之器聖王在位百里有一士猶無有也王道衰千里一士則猶比肩也知善不信謂之狂知惡不改謂之惑昔文王見鬻年九十文王曰嘻老矣鬻子曰若使臣捕虎逐麋臣已老矣坐策國事臣年尚少太公金匱二卷武王問太公曰殷已亡其三人今可伐乎太公曰臣聞之知天者不怨天知己者不怨人先謀後事者昌先事後謀者亡且天與不取反受其咎時至不行反受其殃非時而生是爲妄成故夏條可結冬氷可釋時難得而易失也武王平殷還問太公曰今民吏未安賢者未定如何太公曰無故無新如天如地得殷之財與殷之民共之則商得其賈農得其田也一目視則不明一耳聽則不聦一足步則不行選賢自代上下各得其所武王問五帝之戒可得聞乎太公曰黄帝云余在民上摇摇恐夕不至朝故金人三緘其口慎言語也堯居民上振振如臨深淵舜居民上兢兢如履薄氷禹居民上慄慄如恐不滿湯居民上翼翼懼不敢息道自微而生禍自微而成慎終與始完如金城行必慮正無懷僥倖書履忍之須臾乃全汝軀書鋒刀利皚皚無爲汝開書刀源泉滑滑連旱則絶取事有常賦歛有節書井太公六韜六卷有求賢之名無用賢之實文王曰君務舉賢不獲其功何也太公曰舉不容易文王曰舉賢若何太公曰案賢察名選才考能名實得之也涓涓不塞將成江河兩葉不去將用斧柯熒熒不救炎炎奈何文王曰國君失民者何也太公曰不慎所與也君有六守三寳六守者仁義忠信勇謀三寳者農工商六守長則君安三寳完則國昌國柄借人則失其威淵乎無端孰知其源天下非一人天下天下之天下也取天下若逐野鹿而天下共分其肉太公云伏羲神農教而不誅黄帝堯舜誅而不恕聖人恭天静地和人敬鬼文王在岐召太公曰吾地小奈何太公曰天下有粟賢者食之天下有民賢者牧之屈一人下伸萬人上唯聖人能行之冠雖弊加於首履雖新履於地武王問太公曰士高下有差乎太公曰人有九差惡口舌爲衆所憎夜卧早起此妻子之將知人飢渴習人劇易此萬人之將戰戰慄慄日慎一日此十萬之將知天文悉地理理四海如妻子此天下之主軍中之事不聞君命武王問太公曰吾欲令三軍親其將如父母攻城則争先登野戰則争先赴聞金聲而怒聞鼓音而喜可乎太公曰作將冬日不服裘夏日不操扇天雨不張幔寒過泥塗將先下步軍未舉火將不食士非好死而樂傷其將知飢寒勞苦也用兵之害猶與最大起之若驚用之若狂當之者破近之者亡使如疾雷不暇掩耳也貧窮忿怒欲决其志者名曰必死之士辯言巧辭善毁善譽者名曰間諜飛言之士曾子二卷君子愛日以學及時而成難者不避易者不從旦就業夕自省可謂守業年三十四十無藝則無藝矣至五十不以善聞則無聞矣鄙夫鄙婦相會於墻之陰可謂密矣明日或有知之故云執仁與義莫不聞也蓬生麻中不扶自直白沙在涅與之皆黑君子之遊苾乎如入蘭芷之室久而不聞則與之化矣小人之遊戲乎如入鮑魚之室久亦不聞而亦化矣故君子慎其去就也與君子遊如日之長加益不自知也與小人遊如履薄氷幾何而不行陷乎天圓地方則是四角不掩也聞之夫子曰天道曰圓地道曰方晏子八卷景公作臺臺成復欲作鐘晏子諫曰斂民作鐘民必哀斂哀以謀樂不祥景公嬖妾死名曰嬰子公守之三日不食膚著於席而不去晏子曰外有良醫將作鬼神之事公信之屏而沐浴晏子令棺入殮死者公大怒晏子曰已死不復生公乃止仲尼聞之曰星之昭昭不如日月之靉靉景公時雨雪三日披狐白之裘坐於堂側謂晏子曰三日雨雪天下何不寒晏子曰夫賢君飽則知人飢温則知人寒公乃去裘冠足以修敬不務其飾衣足以掩形不務其美土事不文木事不鏤足以示民也景公曰吾欲霸諸侯若何晏子曰官未具也臣聞仲尼處陋巷廉隅不正則原憲侍志意不通則仲由侍德不辱則顔回侍今君未有能侍故未具也君擇臣使之臣雖賤亦擇君事之一心可以事百君百心不可以事一君事貴人不能過禮貴人惡之晏子治阿三年毁聲於國景公召而問之對曰嬰舉儉罰偷墮民惡之决獄不畏强貴强貴惡之是二邪毁於内二讒去於外臣請改轍更治三年必有譽也景公病水數十日夢與二日鬥而不勝使召夢者占之占者至門晏子使對曰公病陰也與二日鬥日陽也不勝疾將退也三日而愈公賞占夢者占夢者辭曰晏子之力也公問晏子晏子曰臣若自對則不信也景公病疽在背欲見不得問國子國子曰熱如火色如日大如未熟李也公問晏子晏子曰色如蒼玉大如璧公曰不見君子不知野人之拙也晏子使楚楚王令左右縛一人作盜者過王問何處人也對曰齊人也王視晏子齊國善盜乎晏子曰橘生江南江北則作枳地土使然也今民生長於齊不盜入楚則盜臣不知也楚王自取弊耳晏子使楚楚王以晏子短作小門於大門之側晏子曰往詣狗國從狗門入今來使入楚不可從狗門入也遂大門入楚王問齊之臨淄都無人耶對曰臨淄三百閭張袂成帷揮汗成雨比肩繼踵何容無人也曾子將行晏子送之曰贈人以財不以言和氏之璧井里璞耳良工修之則成國寳習俗移性可不慎乎晏子殁後十有七年景公封諸侯大夫皆稱善公曰自晏子殁後不復聞不善之事弦章對曰君好之則臣服之君嗜之則臣食之尺蠖食黄則黄食蒼則蒼是也公曰善吾不食諂人之言也以魚五十車賜弦章固不受是弦章有晏子之遺行也子思子七卷慈父能食子不能使知味聖人能悦人不能使人必悦國有道以義率身無道以身率義荀息是也言而信信在言前令而化化在令外聖人在上而遷其化終年爲車無一人之輪則不可馳百心不可得一人一心可得百人君本也臣枝葉也本美則葉茂本枯則葉凋君子不以所能者病人不以人之不能者愧人小人溺於水君子溺於口也繁於樂者重於憂厚於義者薄於行見長不能屈其色見貴不能盡其辭雖有風雨吾不入其門也君子以心導耳目小人以耳目導心孟子十四卷蜀郡趙臺卿作章句章句曰指事孟子謂惠王曰虐政殺人何異刃耶庖有肥肉廐有肥馬民有飢色野有餓莩此謂率獸食人且人惡之況虐政乎敬老愛幼推心於民天下運掌中也故推恩足以保四海不推恩不足以保妻子雖有智慧不如乘勢雖有鎡基不如待時孟子云齊人譏管晏飢者易爲食渴者易爲飲若久塗炭則易政如渴不擇飲也宋人有閔其苗不長揠拔之使其長其子趨而視之苗則槁矣非但無益乃有害也見孺子入井非孺子之父母亦有惻隱之心無惻隱之心非人也無羞惡之心亦非人也無辭讓之心亦非人也無是非之心亦非人也孟子云子路人告之有過則喜禹聞善言則拜用夏變夷不聞用夷變夏枉己者未能直人當以直矯枉若自曲何以正人景春曰公孫衍張儀豈不誠大丈夫一怒而諸侯懼安居而天下息孟子曰是焉得爲大丈夫乎富貴不能淫貧賤不能移威武不能屈此之謂大丈夫天子不仁不保四海諸侯不仁不保社稷士不仁不保四體今惡死亡而樂不仁猶惡醉而强酒民之歸仁猶水就下存乎人莫良於眸子眸子不能掩其惡胷中正則眸子瞭焉胷中不正則眸子眊焉淳于髠曰男女不親授受若嫂溺援之手乎孟子曰若不援是豺狼也天下溺則援之以道嫂溺必援以手子産以其乘輿濟人於溱洧孟子聞之曰不知政也不如以時修橋梁良人出饜酒肉齊人有一妻一妾其夫出行則饜飽而反欺其妻云與富貴人共飲食耳妻後伺之見乞人祭餘食之妻乃告妾相與泣於中庭其夫自外來未知猶驕其妻妾由君子枉道得富貴而驕人也良人即夫也伊尹不以一芥與人亦不取一芥於人非其道在野曰草莽之臣在國曰市井之臣性猶湍水决東則東决西則西白羽白性輕白雪白性消白玉白性貞雖俱白其性不同也冬日飲湯夏日飲水欲問寒暑者中心也仁義忠信樂善不倦天爵也公卿大夫人爵也古之人修天爵而人爵從之今之修天爵以要人爵得人爵棄天爵終亦亡矣孟子曰仁之勝不仁也猶水勝火今之爲者猶一杯水救一車薪之火也不熄則謂水不勝火此又與於不仁之甚者也亦終必亡而已矣君子有三樂父母具存一樂仰不愧天俯不怍人二樂得天下英才而教育三樂鷄鳴而起孜孜爲善者舜之徒也鷄鳴而起孜孜爲利者跖之徒也九仞無泉猶棄井也古人之關禦暴今人之關爲暴今之關出入征税惡似而非者惡莠亂苗惡佞亂義惡利口亂信惡鄭聲亂雅樂惡紫亂朱惡郷原亂德堯至湯湯至文王文王至孔子孔子至孟子各五百餘歲管子十八卷倉廪實知禮節國多財遠者來衣食足知榮辱野無積草府不積貨市不成肆朝不合衆治之至也觀其交游則賢不肖可察一年之計莫若樹穀十年之計莫若樹木終身之計莫若樹人爵禄滿則忠衰室富足則行衰釜鼓滿則人槩之人滿則天槩之故先王不滿也凡赦者小利而大害故久而不勝其禍無赦小害而大利久而不勝其福惠者民之仇讎法令民之父母惠者多赦先易後難法者無赦先難後易堂上遠於百里有事十日而君不知堂下遠於千里有事一月不知門庭遠於萬里有事期年不聞桓公謂管仲曰寡人有大邪三不幸好畋晦夜從禽不反一不幸好酒日夜相繼寡人汙行二不幸好色姑姊有未嫁者三不幸管仲曰惡則惡矣非其急也人君唯不愛與不敏不可耳不愛則亡衆不敏則不及事齊水躁而復故民貪而勇楚水溺而清其民輕果好賦越水濁而重其民疾妬秦水汩而滯其民貪戾晉水滯而雜其民好詐宋水勁而清其民簡易有法度之制者不可巧以詐僞有權衡之稱者不可欺以輕重先王治國威不兩措政不二門有尋尺之數者不可差以短長也桓公問廐吏何事最難吏未答管仲曰臣嘗作圉人唯賦馬棧最難先搏曲木則直無所施先搏直木則曲無所施冬日不盥非愛水也夏日不煬非愛火也爲不適於身明王不治宫室非愛小也爲本矣楚王好小美人省食吴王好劒國士輕死故主好宫室則工匠巧主好文彩則工女靡利之所在雖千仞之山無所不上深泉之下無所不入商人通賈倍道兼行夜以繼日千里不遠利在前也漁人入海海水百仞衝波逆流日夜不出利在水也蛟龍得水而神立人主得民而威成海不辭水故能成大山不辭土故能成高主不厭人故能成衆士不厭學故能成聖烏合之衆初雖有懽後必相吐雖善不親也殺生之柄不制於主而在羣下也五穀民之司命黄金刀弊民之通施農有常業女有常事一農不耕民有飢者一女不織民有寒者桓公謂管仲曰吾欲伐楚楚强不可下如何曰王但鑄錢於莊山往楚貴市生鹿楚王聞之喜必廢農而獵鹿公藏粟五倍楚足錢而無粟公閉關楚降者十分有四地大而不耕非其地卿貴而不仁非其卿民衆而不親非其民無翼而飛者聲也無根而固者慎也公但謹聲耳道德經二卷生而不有爲而不恃元炁生萬物不有道所施不求其報挫其鋭解其紛鋭進也人欲鋭慎進取功名當挫止之法道不自見也紛結恨也當念道無上解釋也和其光雖有獨見之明當如暗昧不曜亂人也同其塵當與衆同垢塵不自别殊多言數窮口開舌舉必有禍患不如守中不如守德於中育養精神愛氣希言也聖人後其身而身先先人後己天下之先以官長也外其身而身存薄己而厚人人愛之如父母神明祐之如赤子故身而長存也金玉滿堂莫之能守嗜慾傷神財多累身富貴而驕自遺其咎夫富當賑貧貴當憐賤反驕恣必被禍患也絶仁棄義民復孝慈德化淳也絶巧棄利盜賊無有上化公正下無私邪曲則全曲則從衆不自專則全也枉則直枉屈己而伸人久久自得直少則得天道祐謙自受則得多多則惑財多者惑於守身學多者惑於所聞善行無轍跡善行道者求之身不下堂不出門故無轍跡善言者無瑕謫擇言而出之故無瑕謫知足者富知足則長保禄位故富也死而不亡者壽目不妄視耳不妄聽口不妄言則無怨於天下故能長壽也將欲噏之必固張之先開張之欲令極其奢淫將欲弱之必固强之先强大之欲使遇害將欲廢之必固興之先興之使驕危將欲奪之必固與之先與之者欲極其貪心也是謂微明此四事道明微其效明也人之不善何棄之有當以道伏之蓋三皇之前無棄民德化厚也故立天子置三公欲化不善人也報怨以德修道行善絶禍於未生也圖難於易圖難事先於其時求成也失道而後德道衰德生失德而後仁德衰而仁愛見失義而後禮義衰即施禮聘行玉帛也夫禮者忠信之薄禮廢本治末忠信日以消薄而亂之首禮賤質貴文故正日以消邪亂日以生貴必以賤爲本言欲尊貴當以賤薄爲本禹稷躬耕舜陶河濱周公下白屋是也高必以下爲基言欲高立先以下爲基如築墻造功因卑成高下不堅固高必傾危也上士聞道勤而行之中士聞道若存若亡下士聞道大笑之不笑不足以爲道不爲下士笑不足名曰道明道若昧明道之人若暗昧無所見也進道若退進取道者若退不及夷道若類夷平也大道之人不自别殊若多比類上德若谷若深谷不耻垢辱也廣德若不足德行廣大之人若愚頑不足也大方無隅大方正之人無委曲廉隅也大器晚成成器之人如瑚璉不可卒成大音希聲如雷電待時而動喻常愛氣希言也大象無形大法象道之人質朴無形容也物或損之而益取之不得推讓必遠益之而損大增者崩貪禄致患也名與身孰親名遂則身退也身與貨孰多財多則害身也得與亡孰病好得貨利則病於行甚愛必大費甚愛色費精神甚愛財遇患害所愛者少所費者多故言必大費也多藏必厚亡生多藏於府庫死多藏於丘墓生有攻劫之愛死有掘塚探柩之患大成若鈌鈌者滅名藏譽如不備大巧若拙不見其然大辯若訥無知疑口無辯不出户以知天下以己身知人身以己家知人家不窺牖以見天道天道與人道同其出彌遠其知彌少謂去其家觀人家去其身觀人身其視雖遠而所見至少也爲學日益謂教禮樂之學爲情欲文飾日以多爲道日損謂自然之道情欲文飾日以消損之又損之以至於無爲無爲而無不爲情欲斷絶德與道合則無所不施無所不爲善者吾善之不善者吾亦善之不善則教道使就善信者吾信之不信者吾亦信之亦以教道善攝生者陸行不遇兕虎自然合遠避入軍不被甲兵不好戰殺塞其兑兑目也不妄視閉其門門口也不妄言終身不勤終身不勤苦也開其兑視情欲濟其事濟益情欲之事終身不救禍亂成也大道甚夷而民好俓俓邪不平正也善建者不拔善以道建身建國者不可得引而拔之知者不言貴其行也言者不知駟不及舌多言多患也其政悶悶音門政教寬大悶悶昩昧似不明其民淳淳淳淳親厚其政察察政急疾言决於口聽决於身其民缺缺政教急民不聊生政教缺日以疎薄也直而不肆肆申也聖人雖直曲己從人不自申光而不耀雖有獨見之明如暗昧不炫耀深根固蔕長生久視之道人以氣作根以精作蔕如樹根不深則拔蔕不堅則落言能深藏氣固守精無所泄漏乃長生久視之道以道莅天下者其鬼不神鬼不敢干犯其精神非其鬼不神其神不傷人聖人在位不傷害人故鬼不干人夫兩不相傷故德交歸焉人能治於陽全其性命鬼得治於陰保其精神故德交歸也夫輕諾必寡信多易必多難不慎患也其安易持治國治身安静者易守持也其未兆易謀爲之於未有治之於未亂以智慧治國國之賊使智慧之人治國必背道德妄作威福乃是國之賊不以智慧治國國之福民守正直不作邪飾上下相親君臣同力善爲士者不武貴道德不好武力也善戰者不怒善以道戰者禁邪於心胷絶隔於禾萌無所怨怒代大匠斲者希有不傷其手矣云云天之道損有餘而補不足天道益謙常以中和是上人之道則不然損不足以奉有餘世俗之人損貧以奉富奪弱以益强也鄰國相望鷄犬之聲相聞民至老死不相往來無情欲也知者不博博者不知知道守一則不必博多見聞失要真故不知也荀卿子十二卷二十二篇青出於藍而青於藍氷生於水而寒於水君子居必擇郷遊必擇士防邪僻也肉腐岀蟲木枯生蠹驕慢在身灾禍作矣君子之學入乎耳著乎心布乎四支動静皆可法則小人之學入乎耳出乎口口耳之間才四寸耳何足以美七尺之軀夫驥一日千里駑馬十駕則亦及之窮無窮極無極也跬步不休跛鼈千里累土不輟丘山崇成三不祥幼而不肯事長賤不肯事貴不肖不肯事賢是也天不言人推其意地不言人歸其厚四時不言百姓期焉與人善言煖若錦帛與人惡言深於矛戟枉而不求直影猶不能察明而務見幽也伯樂不可欺以馬君子不可欺以人川泉深而魚鼈歸之山林茂而禽獸歸之刑政平而百姓歸之禮義備而君子歸之天行有常不爲堯存不爲桀亡淺不足與測深愚不足與謀智埳井之蛙不可與語東海之樂聖人無兩心天下無二道鳥獸失亡其匹越月逾時必反過故郷徘徊鳴號躑躅踟蹰然後而去何況人乎歲不寒無以知松栢事不難無以知君子妻子具而愛衰於親爵禄盈而忠衰於君唯舜及賢者不然荀卿子名況齊宣王時人春申君再請作蘭陵令因家焉爲李斯師後卒於蘭陵魯連子五卷白刃交前不救流矢急不暇緩也財者君之所輕死者士之所重君不能以所輕與士欲得士之所重不亦難乎百足之蟲斷而不蹶持之者衆也人心難知於天天有春夏秋冬以作時人皆深情厚貎以相欺不知宜與不宜將以錦純薦不知時與不時猶冬耕也不知行與不行猶以方作輪也文子十二卷周平王時人師老君先唱者窮之路後動者達之源齒堅於舌而齒先弊剛强者死之徒柔弱者生之幹立井而飲耕田而食不布施以求德不高下以相傾此古人之德也河不滿溢海不湧波景雲見而黄龍下祥風至醴泉出此聖人順天道也晝冥夜光山崩川涸冬雷夏霜此國之將亡也水濁則魚噞政苛則民亂上多欲下多詐冬日之陰萬物歸之而莫使皋陶喑而大理天下無虐刑何貴言乎君子猶射差此毫末於彼尋丈神者智之淵神清則智明智則心之府智公則心平精神難清而易濁猶盆水也清之終日乃能見眉睫不過一撓即不能見方圓也量腹而食度形而衣節乎己者貪心不生山生金反自刻木生蠧還自蝕人生事還自賊使信士分財不如探籌使廉士守財不如閉户全封有心於平不如無心之不平善游者必溺善騎者必墜上學以神聽之學在骨髓矣中學以心聽之學在肌肉矣下學以耳聽之學在皮膚矣鐸以聲自毁膏以明自煎一淵無兩蚊有必争得鳥者羅之一目一目之羅不可得鳥欲致魚者先通於谷欲來鳥者先樹於木水積魚聚木茂鳥集目見百步之外不能自見其眥水之勢勝火一杓不能救一車之薪金之勢勝木一刃不能殘一林土之勢勝水一塊不能塞一河飢馬在廐寂然無聲投芻其傍争心乃生農夫勞而君子食之愚者言而智士擇之日月欲明浮雲翳之河水欲清沙土穢之叢蘭欲茂秋風敗之人性欲平嗜慾害之濟溺者以金石不如尺索花太早者不須霜而自落入水憎濡懷臭求芳不可得也乳犬噬虎伏鷄搏狸冶不能銷木匠不能斲冰金石有聲不扣不鳴簫管有音不吹不聲事者難成而易敗名者難立而易廢往古來今謂之宙四方上下謂之宇孔子無黔突墨子無煖席非其貪禄慕位欲爲天下除害耳獸窮則觸鳥窮則啄人窮則詐人主之有民猶城之有基木之有根根深則本固基厚則上安屈寸而伸尺小枉而大直聖人爲之今人貴不許其大功而求其小善失賢也貴則觀其所舉富則觀其所欲貧則觀其所愛霸王之道扶義而動尊其秀士顯其賢良百姓開户而待之漬米而儲之不義之兵至於伏尸流血而不伏也冬日之扇夏日之裘無用於己則生塵垢鄧析子一卷二篇劉向云非子産殺鄧析推春秋驗之修名責實君之事也奉法宣令臣之職也君有三累親所信以名取士近故踈親臣有四責受重賞而無功臣居大位而不治爲埋官而不平在軍陣而奔北勢者君之輿威者君之策臣者君之馬民者君之輪勢固則輿安威定則策勁臣順則馬馴民和則輪利治國者失此必有覆輿奔馬折策敗輪輪敗策折馬奔輿覆則載者亦傾矣慮不先定不可以應卒兵不預整不可以當敵廟筭千里帷幄之奇百戰百勝黄帝之師凶飢之歲父死於室子死於户而不相怨者無所顧也同船涉海中流遇風救患若一所憂同也張羅之畋唱和不差者其利同也故體病者口不能不唾心悦者顔不能不笑自見則明借人見則暗自聞則聦借人聞則聾一言而非駟馬不能追一言而急駟馬不能及明君之治民若御奔而無轡負而履氷喜而便賞不必當功怒而便誅不必值罪忠怠於宦成孝衰於妻子范子十二卷並是陰陽曆數也計然者蔡丘僕上人姓辛名文子其先晉國公子也爲人有内無外形狀似不及人少而明學陰陽見微而知著其行浩浩其志汎汎不肯自顯諸侯陰所利者七國天下莫知故稱曰計然時遨遊海澤號曰漁父范蠡請見越王計然曰越王爲人鳥啄不可同利也掩目别白黑雖時時一中猶不知天道論陰陽有時誤中耳范子問何用九宫計然曰陰陽之道非獨於一物也聖人之變如水隨形形平則平形險則險胡非子一卷負長劒赴榛薄析兕豹搏能羆此徒獵之勇也負長劒赴深泉斬蚊龍搏黿鼉此漁人之勇也登高陟危鵠立四望顔色不變此陶缶之勇也剽必刺視必殺此五刑之勇也齊桓公以魯爲南境魯公憂之三日不食曹沫請擊頸以血濺桓公公懼不知所措管仲乃勸與之盟曹沫匹夫之士布衣柔履之人一怒却萬乘之師存千乘之國此君子之勇也墨子十六卷君子自難而易衆人自易而難靈龜先灼神蛇先暴君子雖有學行爲本焉戰雖有陣勇爲本焉喪雖有禮哀爲本焉墨子見染絲而歎曰染於蒼則蒼染於黃則黃非獨染絲然人固亦有染舜染許由桀染子辛紂染崇侯也聖人爲舟車完固輕則可以任重致遠子自愛不愛父欲虧父而自利弟自愛不愛兄欲虧兄而自利非兼愛也盜愛其室不愛異室故竊異室以利其室亦能兼愛節葬之法三領之衣足以朽肉三寸之棺足以朽骸深則通於泉諸侯不得恣己爲政有三公政之三公不得恣己爲政有天子政之天子不得恣己爲政有天下政之斷指以存脛以免於身者利君子如鐘扣則鳴不扣則不鳴美女處不出則争求之行而自衒人莫之娶墨子勸弟子學曰汝速學君當仕汝弟子學期年就墨子墨子曰汝聞魯人乎有昆弟五人父死其長子嗜酒不肯預葬其四弟曰兄若送葬我當爲兄沽酒葬訖就四弟求酒四弟曰子葬父豈獨吾父也吾恐人笑欺以酒耳令不學人自笑子故勸子也遂不復求仕墨子謂門人曰汝何不學對曰吾族無學者墨子曰不然豈謂欲好美而曰吾族無此辭不欲邪欲富貴而曰吾族無此辭不用邪强自力矣甘瓜苦蔕天下物無全美古之學者得一善言附於其身今之學者得一善言務以説人言過而行不及君子服美則益敬小人服美則益驕纏子一卷纏子修墨氏之業以教於世儒有董無心者其言修而謬其行篤而庸言謬則難通行庸則無主欲事纏子纏子曰文言華世不中利民傾危繳繞之辭者並不爲墨子所修勸善兼愛則墨子重之董子曰子信鬼神何異以踵解結終無益也纏子不能應隨巢子一卷執無鬼者曰越蘭問隨巢曰鬼神之智何如聖人曰聖也越蘭曰治亂由人何謂鬼神耶隨巢子曰聖人生於天下未有所資鬼神爲四時八節以紀育人乘雲雨潤澤以繁長之皆鬼神所能也豈不謂賢於聖人有踈而無絶有後而無遺大聖之行兼愛萬民踈而不絶賢者欣之不肖者則憐之賢而不欣是賤德也不肖不憐是忍人也尸子二十卷鹿馳走無顧六馬不能望其塵所以及者顧也水積則生吞舟之魚土積則生豫章之木學積亦有生焉農夫比粟商賈比財烈士比義卑墻來盜榮辱由中出敬侮由外生樹葱韭者擇之則蕃仁義亦不可不擇也唯善無基義乃繁滋敬灾與凶禍乃不重鷄司夜狸執鼠日燭人此皆不令自全日在井中不能燭十步目在足下不可以視遠雖明何益堯瘦舜黑皆爲民也陳繩則木之枉者有罪措準則地之廢險者有罪審名分則羣臣不審者有罪農夫之耨去害苗者賢者之治去害義者虎豹之駒未成文而有食牛之炁鴻鵠之鷇羽翼未合而有四海之心見人有善如己有善見人有過如己有過此虞氏盛德也買馬不論足力而以白黑爲儀必無走馬矣買玉不論美惡必無良寳矣舉士不論賢良則無士矣孔子云誦詩讀書與古人居讀詩誦書與古人謀玉者色不如雪澤不如雨潤不如膏光不如燭取玉甚難越三江五湖至崑崙之山千人往百人反百人往十人至中國覆十萬之師解三千之圍車輕道近鞭策不用鞭策所用道遠任重見驥一毛不知其狀見畫一色不知其美屠者割肉則知牛長少弓人剺筋則知牛長少雕人裁骨則知牛長少各有辨焉草木無大小必待春而後生人待義而後成韓子二十卷劉向云秦始皇重韓非書曰寡人得與此人遊死不恨矣李斯姚賈害之與藥令自殺始皇悔遣救之已不及無與禍鄰禍乃不存臣所以難言者滑澤洋洋見者以謂華而不實敦厚秪恭見者以謂虚而無用省而不飾見者以謂訥而不辯激忽近親探知人意見者以謂𢡚而不讓宏大廣博深而不測見者以謂夸而無用臣所以爲難言而患重也二柄刑罰也虎所以能伏犬者爪牙也若虎釋其爪牙則反伏於犬也故田常請爵禄大㪷斛施百姓北齊簡公失德而田常得之韓昭侯醉甚而卧典冠見君寒加衣其上昭侯覺乃罪典衣殺典冠以典衣失事以典冠侵官侵官甚於寒也故明王畜臣不得越官而有功不得陳言而無當越官則死不當則罪香美病形皓齒損精去甚去泰身乃無害使鷄司夜令狸執鼠物有所宜才有所施各處其宜故上下無爲上失膚寸下失尋常君不可不慎託宴處之娱乘醉飽之時求其所欲則必聽也鄰國有聖人敵國之憂彌子遐有寵於衞君竊駕君車君聞之曰子遐母病而矯駕孝子也與君遊果園食桃不盡以半啖君君曰愛我也及其色衰得罪於君君曰是矯駕吾車者啖我餘桃者以前所賢而後獲罪愛憎變也愛人不得獨利待譽而後利之憎人不得獨害待非而後害之輿人欲人富貴棺人欲人死喪人不貴則輿不用人不死則棺不價非有仁賊利在其中相愛者則比周而相譽相憎者則比黨而相誹誹譽交争則生惑矣家有常業雖飢不餓國有常業雖危不亡若捨法從私意則臣下飾其智能飾其智能則法禁不立矣君以計畜臣臣以計事君害身而利國臣不爲也害國而利身君不爲也譬之如水溺者飲之則死渴者飲之則生桓公伐孤竹失道管仲曰老馬之智可用遂縱馬從而得歸桓公伐孤竹行出山中無水隰朋曰蟻冬居山之陽夏居山之陰蟻壤寸而有水使掘之果得水焉以人言善我者必以人言罪我也置猿於檻則與㹠同勢不能呈能也刻削之道鼻莫如大目莫如小鼻大可小小不可大目小可大大不可小舉事亦然古人目短於自見故以鏡觀面身短於自知故以道正己失鏡無以正鬚眉失道無以知迷惑耳西門豹性急佩韋以自緩董安于性緩佩弦以自急斷手續之以玉故世有易身之患舜爲匹夫不能正三家有才而無勢雖賢不能制也故立木於高山之上下臨千仞之溪材非長也其位高也不敝人之美不言人之惡韓昭侯掘瓜而佯亡求之甚急左右而取備之昭侯以此察左右之虚實衞嗣君使人過關市關吏乃呵之因以金與關吏關吏乃捨嗣君謂關吏曰汝何得受客金以明察之僖侯時宰人上食羹中有生肝乃問之宰人曰當是人置之欲去宰自處也後僖侯將浴湯中有礫僖侯曰有人欲代湯者文公宰上食肉而有髮繞之文公召宰人曰汝使吾哽乎宰人頓首曰臣有三罪刀利如干將切肉而髮不斷臣罪一也援錐貫臠而不見髮臣罪二也熾洪炮肉盡赤而髮尚繞臣罪三也有人欲代臣也齊景公惡仲尼爲魯政梨沮曰去仲尼如吹毛耳乃使遺魯哀公怠於政仲尼諫不納而之齊鄭人相與争年一人云吾與堯同年一人云吾與黃帝兄弟同年争此不决以後罷爲勝客有爲齊王畫者王問何者最難對曰畫狗馬爲最難鬼魅最易狗馬人共知鬼魅無形像也冠雖穿决必戴於上履雖五彩必踐之地齊宣王問情曰儒者鼓琴乎對曰不也琴者小弦大聲大弦小聲大細易位貴賤易序故儒者不爲以骨去蟻蟻愈多桓公問管仲曰官少而索多如何管仲曰君勿聽人人有請因能而授禄録功而與官宋人有酤酒者斗槩甚平遇客甚謹醖酒甚美懸幟甚高而酒不售遂致於酸問閭長倩倩曰汝狗惡也孺子懷錢挈壺往酤輙有狗齧之猶大臣齧有道之士也故桓公問管仲治國何患患社鼠焚則木焚也税勿輕勿重重則利入於上輕則利歸於民也晉文公與楚戰問舅犯曰楚衆我寡奈何對曰君其詐之又問雍季曰以詐御民一時之利也與楚戰大勝而歸行賞先雍季而後舅犯曰舅犯之言權也雍季之言萬世之利也齊桓公飲酒醉遺其冠耻之三日不朝管仲曰此有國之耻公何不雪之以政因發倉賜貧窮三日而民歌之曰公何不更遺其冠也古諺曰政若沐雖有棄髮之費而有長髮之利也饑歲之春從弟不讓穰歲之秋踈客必食非踈骨肉多少之心異也墨子死後有相里氏之墨相芬氏之墨鄧陵氏之墨孔墨之後儒分爲八離爲三也待自直之箭則百世無矢矣待自圓之木則千歲無輪矣法度賞罰國之脂澤粉黛也三寸之管無當不可滿也意林卷之一
