front:
  text: 意林卷之三瑟三
  hash: sha256:a290796cdf4a321a7e46a1824eeddda6742279385f8d0db0f8e6cf8069f53183
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0071_SJB_003-320499b, image: sjb/32/320499b.png}
body:
  text: 扶風馬緫元會編鹽鐵論十卷並是文學與大夫相難善剋者不戰善戰者不師善師者不陣工不出則物用乏商不出則寳貨絶川原不能實漏巵山海不能贍溢欲宅近市則家富富在術數不在力耕善歌者使人續其聲善作者使人治其功孔子能方不能圓故飢於黎丘茂林之下無豐草大塊之間無美苗行遠者假於車濟海者因於舟成名者因於資歐冶能因國君銅鐵作金鑪大鍾而不能自作壺鼎盤孟香餌非不美龜龍聞而深藏鸞鳳見而高逝玉屑滿篋不成其寳仲尼之門七十子去父母捐家負荷而隨孔子不耕而學其亂愈滋猶玉屑滿篋也若能安國利人寧須文辭者哉有粟而不能食無益於飢觀賢而不能用無益於利歌者不期於利聲而貴於中節論者不期於麗辭而務在事實公卿者四海之儀表神化之丹青上有輔明主之任下有隨聖化之治諸生抱枯竹守空言不知趨舍之宜時世之變林中多疾風富貴多諛言古者君子思德小人思利今人堅額健舌代以致業九層之臺傾公輸子不能正大朝一邪伊望不能復吏道雜而不選富貴以財買官垂青綬擐銀龜擅殺生之柄專萬民之命乘肩驅良列騎成行者不知負檐步行之勞中國與邊境猶支體與腹心肌膚寒於外腹心疾於内以仁義阻之道德塞之賢人守之則莫能入也秦法繁於秋茶罔密於凝脂然而上下相遁姦僞並生廐焚孔子問人不問馬賤畜貴人也秦法盗馬者死盜牛者刑苛也説苑二十卷劉向東風則靡而西西風則靡而東上之化下如風靡草禹見罪人下車而泣左右曰此人不恭故得罪君王何痛之禹曰堯民以堯爲心今百姓各以其心爲心故痛之齊景公出獵上山見虎下山見蛇問晏子曰此不祥耶晏子曰有賢而不知知而不用用而不任此不祥也山是虎之室澤是蛇之穴何不祥也晏子侍景公公朝寒請進煖食於寡人對曰嬰非厨養之臣社稷之臣晉平公問師曠曰吾年七十欲學恐晚如何師曠曰日暮豈不炳燭耶臣聞少而學者如日出之陽壯而學者如日中之光老而學者如炳燭之明豈不愈於暗乎公曰善哉曾子衣弊而耕魯君使人致其邑不受曰吾聞受人者畏人與人者驕人安知君能不驕我我能不畏乎遂不受夫仕者身歸於君禄歸於親忠臣不仕二君貞女不更二夫居無垣墻人莫之毁傷行無防衛人莫之暴害此君子之行也楚莊王賜羣臣酒燭或有引美人衣者美人援絶其纓告王王曰賜人酒醉乃顯婦人之節吾不取也乃命左右勿上火凡與寡人飲者不絶纓者不盡歡也羣臣遍絶纓而後舉火後與晉戰引美人衣者五合以報莊王陽虎得罪於衞北見趙簡子曰自今以後不復樹人矣堂下之人臣所樹者過半今反危臣矣簡子曰樹桃李者夏得休息樹蒺䔧者秋得其刺今子所樹蒺䔧也自今以後擇人而樹之夫政者無迎而拒無望而許臨財莫如廉臨富莫如平廉平之守莫能攻國不務大務得民心佐不務多務得賢俊齊宣王謂淳于髠曰先生云寡人何好對曰古者所好者四而王所好者三古者好馬王亦好馬古者好玉王亦好玉古者好色王亦好色古者好士王不好士王曰國無士耳若有寡人亦好之對曰驊騮騏驥本無王求之豹象之胎本無王求之毛嬙西施本無王求之而不求士何也楊回見趙簡子曰臣居郷三逐事君五去聞君好士故來左右曰居郷三逐是不容於衆也事君五去是不忠於上也簡子曰美女者醜婦之仇也盛德君子者亂世所踈也正直之行邪枉所憎也遂用之作相衣成則缺衽宫成則缺隅示不成也鬼神害滿也周公誡伯禽示無以魯驕人國有五寒凍不預焉一曰政二曰厲三曰謀泄四曰不敬一而國敗五曰不能治内而務外也官不與勢期而勢自至勢不與富期而富自至富不與貴期而貴自至貴不與驕期而驕自至驕不與罪期而罪自至魯有恭士行年七十其恭益甚魯君問曰長年恭可以釋也對曰君子恭以成名小人恭以除刑一言不安尚有蹉跌一飯雖美尚有哽咽鴻飛于天矰者得之虎豹雖猛人食其肉譽人者少惡人者多得不恭乎歲飢民疫不足患也大臣禄重而不極諫近臣畏罪而不敢言此大患也趙襄子謂子路曰吾嘗問孔子曰先生事七十君豈無明君耶孔子不對何謂賢耶子路曰建天下之鳴鐘撞之以梃豈能發其聲乎善夜居者不能早起盛於彼者衰於此長於左者短於右一貴一賤交情乃見一死一生乃知交情口者兵也出言不當反自傷丹所藏者赤漆所藏者黑君子慎所藏也飛鳥愛羽虎豹愛爪所以輔身也積恩曰愛積愛曰仁積仁曰靈臺靈臺者積仁也神靈者天之本晏子爲上卿妾不衣帛馬不食粟何以華國對曰德以華國不聞以妾與馬趙簡子乘弊車瘦馬衣羖羊之裘其宰曰車新則安馬肥則疾狐裘則温君冝改也簡子曰君子服善則益恭小人服善則益踞子貢謂子石曰何不學詩子石曰父母求吾孝兄弟求吾悌朋友求吾信何暇學哉子貢曰損吾詩學于詩河平四年都水使者諫議大夫劉向上言曲彌高者和彌寡水所以載舟亦能以覆舟楚丘先生年七十披裘見孟嘗君君曰先生老矣何以教寡人先生曰欲使追車趁馬逐鹿搏虎吾即死矣何暇老耶若使决嫌疑定猶豫吾即少也何老之有孟嘗乃有愧色魏王欲築中天之臺曰敢有諫者死許綰負蔂操畚入曰聞王欲爲中天之臺願效力焉臣聞天去地一萬五千里今王因而半之應高七千五百里基廣八千里盡王之地不足以成臺址王宜起兵伐諸侯盡有其地猶不足也又伐西夷乃足之矣須具材木人徒稱此然可作也魏王默然後乃罷築有遺鄭相魚不受人曰子嗜魚何故不受對曰謂嗜魚故不受受魚失禄無以食魚不受魚得禄終身食魚以老者智少者决必能治阿子奇年十六齊君使治阿既而君悔之遣使追追者反國子奇必能治阿共載皆白首也子奇至阿鑄庫兵以作耕器魏曰聞童子治邑庫無兵倉無粟乃起兵擊之阿人父率子兄率弟以私兵戰遂敗魏師法言十五卷揚雄撰李軌弘範注務學不如務求師師者人之模範晞顔之人亦顔之徒晞驥之馬亦驥之乘詩人之賦麗以則辭人之賦麗以婬若孔氏之門而用賦則賈誼升堂相如入室矣四重何謂四重言重則有法行重則有德貌重則有威好重則有觀四輕何謂四輕言輕則招憂行輕則招辜貌輕則招辱好輕則招婬刀不利筆不銛宜加削天可度則覆物淺矣地可測則載物薄矣説天者莫辯乎易説地者莫辯乎書説體者莫辯乎詩説理者莫辯乎春秋孔子東國之逐臣夷齊西山之餓夫不屈其志不辱其身不夷不惠可否之間仲尼之道猶四瀆經營中國終入大海太玄經十卷揚雄撰虞翻注鷹萃于林獺入于泉鳴鳩在林笑彼衆禽淮南王安多華少實齊桓晉文之霸如日繼月孔子文足老君玄足山川藪澤萬物歸焉君子得位則昌失位則良小人得位則橫失位則喪新論十七卷桓譚三皇以道治五帝以德化三王由仁義五霸用權智無制令刑罰謂之皇有制令無刑罰謂之帝賞善誅惡諸侯朝事謂之王興兵衆約盟誓謂之伯王者往也言其惠澤優游天下歸往也王道純粹其德如彼霸道駁雜其功如此俱有天下而君萬民垂統子孫其實一也圖王不成亦可以伯治國者輔佐之本其任用咸得大才大才乃主之股肱羽翮也明鏡龜策也章程斛斗也銓衡丈尺也前世俊士立功垂名圖畫於殿閣宫省此乃國之大寳亦無價矣雖積和璧累夏璜囊隋侯篋夜光未足喻也伊宫良平何世無之但知人君不知羣臣勿用也賢有五品謹勑於家事順悌於倫黨鄉里之士也作健曉惠文史無害縣廷之士也信誡篤行廉平公理下務上者州郡之士也通經術名行高能達於從政寬和有固守者公輔之士也才高卓絶踈殊於衆多籌大略能圖世建功者天下之士也賈誼不左遷失志則文彩不發淮南不貴盛富饒則不能廣聘駿士使著文作書太史公不典掌書記則不能條悉古今揚雄不貧則不能作玄言殷之三仁皆暗於前而章於後何益於事何補於君世有圍碁或言兵法之類上者張置踈遠多得道路而勝中者務相遮絶争便求利下者守邊隅趨作罣目生於小地猶薛公之言黥布反也上計取吴楚廣地道中計塞城皋遮要争利下計據長江以臨越守邊隅趨作罣目者也更始將相不防衛罣中死基中生也文王葬枯骨無益衆庶衆庶悦之恩義動人也王翁觀人五藏無損生人生人惡之殘酷也東方朔短辭薄語以謂信驗人皆謂朔大智後賢莫之及譚曰人有以狐爲狸以瑟爲箜篌比非徒不知瑟狐又不知狸與箜篌乃非但言朔亦不知後賢也夫以人言善我亦必以人言惡我王翁使都尉孟孫往泰山告祠道過徐州徐州牧宋仲翁道余才智陳平留侯之比也孟孫還喜謂余曰仲翁盛稱子德子乃此耶余應曰與僕遊四五歲不吾見稱今聞仲翁一言而奇怪之若有人毁余子亦信之吾畏子也余前作王翁掌教大夫有男子殺母有詔燔燒其子屍余謂此事不宜宣布余封事云宣帝時公卿大夫朝會丞相語次云梟生子子長食其母乃能飛時有賢者應曰但聞烏子反哺其母丞相大慙自悔也人皆少丞相多彼賢人賢人之言益於化也鳥獸尚與之諱況於人乎不宜發揚也龍無尺水無以昇天聖人無尺土無以王天下讖出河圖洛書但有兆眹而不可知後人妄復加增依託稱是孔丘誤之甚也張子侯曰揚子雲西道孔子也乃貧如此吾應曰子雲亦東道孔子也昔仲尼豈獨是魯孔子亦齊楚聖人也畫水鏤氷與時消釋孔子以四科教士隨其所喜譬如市肆多列雜物欲置之者並至聞東里語云人聞長安樂則出門西向而笑肉味美對屠門而哨此猶時人雖不别聖亦復欣慕顔淵所以命短慕孔子殤其年也如庸馬與良駿相追銜尾至暮良馬鳴食如故庸馬垂頭不食何異顔孔优劣余少時見揚子雲麗文欲繼之嘗作小賦用思大劇立致疾病子雲亦言成帝詔作甘泉賦卒暴遂倦卧五藏出地以手收内之及覺氣病一年由此言之盡思慮傷精神也莊周病劇弟子對泣之應曰我今死則誰先更百年生則誰後必不得免何貪於須臾子貢問蘧伯玉曰子何以治國答曰弗治治之古孝經一卷二十章一千八百七十二字今異者四百餘字左氏云經與傳猶衣表裏相待而成堯能則天者貴其能臣舜禹二聖劉子政子政駿駿兄弟子伯玉俱是通人尤重左氏教授子孫下至婦女無不讀誦此亦蔽也舉網以綱千目皆張振裘持領萬毛自整治大國者亦當如此以賢伐賢謂之煩以不肖謂之亂王平仲云周譜言定王五年河徙故道今所行處非禹所穿揚子雲工於賦王君大習兵器余欲從二子學子雲曰能讀千賦則善賦君大曰能觀千劍則曉劒喭曰伏習象神巧者不過習者之門五福壽富貴安樂子孫衆多百足之蟲共舉一身安得不濟曲陽侯迎方士西門君惠從其學却老之術君惠曰龜稱三千歲鶴言千歲以人之材何乃不及蟲鳥耶余應曰誰當久與龜鶴同居而知其年歲耳聖人何不學仙而令死耶聖人皆形解仙去言死者示民有終也昔神農伏羲王天下梧桐作琴三尺六寸有六分象期之數厚寸有八象三六數廣六分象六律上圓而斂法天下方而平法地上廣下狹法尊卑之禮琴者禁也古者聖賢玩琴以養心窮則獨善其身而不失其操故謂之操達則兼善天下無不通暢故謂之暢堯暢經逸不存舜操其聲清以微微子操其聲清以淳箕子操其聲淳以激論衡二十七卷王充操行有常賢仕宦無常遇賢不賢才也遇不遇時也才高行潔不可保以必貴能薄操濁不可保以必賤或同操而異主伊尹箕子是也二人俱命世之臣伊尹遇成湯作相箕子遇商紂作奴故知遇與不遇也清受塵白受垢青蠅所汙常在練素邑犬羣吠吠所怪也絃者思折伯牙之指御者願斷王良之手惡彼勝己也玉變作石石化作礫毁謗使然也採玉者破石取玉選士者棄惡取善命不勉也智者歸之於天取富貴若鑿溝伐薪鑿不休則溝深斧不止則薪多亦有溝未成而遇湛薪未多而逢火樂貧勝禍勉己勤事以致富才明操以取貴農夫力耕得穀多商賈遠行得利深命富之人筋力自强命貴之人才智自高若千里馬氣力目勁頭目蹄足自相副魯城門朽蝢欲頽孔子疾行而過之左右曰如此久矣孔子曰吾惡其久也脱遇壞則不幸蟲墮一器酒棄不飲鼠殘一筐飯捐不食墨家云人死無命儒家云人死有命歷陽之郡一宿化成湖白起坑趙卒四十萬衆此並有命耶言命者曰命當溺死故相聚於歷陽命當壓死故相聚於平原沛公初起相攻人入豐沛之市云多封侯人也人命繫於國物命繫於人齊人舒緩秦人慢易楚人促急燕人戇敢四國之民更相出入張次公娶鄰巫女卜工曰女相當貴公後位至丞相乃是次公亦貴遂與女相合也世謂宅有吉凶徙有歲月余謂天道難知假今有觸犯者命吉凶之人也按相黥布當先刑而後王衞青當封亞夫而餓死鄧通當貧餓此骨節皮膚各異也文王在母腹中便有四乳非長大修道德乃生也后稷作兒以種樹而戲孔子能行以爼豆而弄石生而堅蘭生而香生禀善氣長大乃成就也蚊蝱不如牛馬之力馬困於蚊蝱有勢也十圍之牛爲牧竪所驅數仞之象爲越僮所鈎無便也孔子吹律自知殷後項羽重瞳虞舜苗裔聖人自有種族堯與高祖安得是龍子也宋景公有三善言獲三十一年燕丹執于秦天雨粟馬生角杞梁妻哭城崩湯旱剪髮作牲致雨南陽卓公作緱氏令蝗蟲不入境孫叔敖埋兩頭蛇有陰德已上並云虚也龍若遁逃在樹中爲天所敗則非神也若必有神則不應有龍肝豹胎故立知水火相薄作雷龍聞雷聲即起武王伐紂兵不血刃虚言也晨舉脂燭血流漂杵何謂不血刃耶漢誅王莽軍至漸臺血流没趾用天下兵未有不血刃也紂糟丘酒池牛飲者三千人長夜之飲亡其甲子車行酒騎行炙百二十日作一月按紂或是覆酒滂沲於地因名作池釀酒積糟因名作丘以酒作池以車行酒以肉懸林因謂騎行炙男女裸而相逐林中奔走侍者惡之故言三千人實非也町町若荆軻之閭言秦王誅軻九族夷其一里一里皆滅故曰町町按秦雖無道不應盡誅軻里也始皇幸梁山宫見李斯車騎盛出怪之左右私告李斯斯損車騎始皇不知左右誰告止殺在傍荆軻之里必不盡誅之魯班刻大鵝飛三日不下爲母作木車木人御之機關之發去不還此恐不實孔子遊説七十餘國按孔子自衞反魯在陳絶糧削跡於衞伐樹於宋不過十國子羔泣血三年未嘗見齒言其不笑語豈得不見齒耶禽息碎首薦百里奚於秦繆公恐是叩頭流血謂之碎首祖伊諫紂云天下之人無不欲王亡者此增益也恐紂不懼耳若天下皆願紂亡即當時瓦解不應與周戰血流漂杵也子謂子貢曰汝與回也孰愈子貢曰回也聞一以知十按孔子知顔淵愈子貢則不須問問則子貢何敢言勝孔子意者恐子貢淩顔淵故此問以抑之鯉也死有棺而無槨其時作大夫乘三馬何不截而貨之作槨也作士之時乘二馬截一以賻舊館舊館不賻未亂制葬子無槨實非法何重舊人之恩乃輕父子之禮不貨車以葬子豈不以貪官仕乎伯夷叔齊爲庶兄奪國餓死首陽山非讓國與庶兄也豈得稱賢人乎共工與顓頊争天下不勝怒而觸不周山天柱折地維絶女媧鍊五色石以補蒼天斷鼇足以立四極按共工有力折山戰何不勝女媧能以石補天天審是玉石耶天本以山作柱鼇足何能柱之鼇必長大則女媧不能殺之必被其所殺何能補天天門在北地户在東方地最下者揚兖二州洪水之時二上最被水害天有日月星辰謂之文地有山川陵谷謂之理地理上向天文下向地合氣而萬物生焉天地夫婦也天南方高北方下日出高故見日入下故不見天之形若倚蓋蓋倚地則不能運懸之樹然後能運日不入地譬人把火夜行平地去人十里則不見非滅也日亦如此雲霧雨雪皆由地發不自天降夏則作霧冬則作霜温則作雨寒則作雪才能之士隨世驅馳節操之人守隘迸竄驅馳日以巧迸竄日以拙非才智不及狎習異也齊郡世刺繡恒女無不能者襄邑能織錦恒女無不巧者目見而手狎也朝廷之人幼稱幹吏者以朝廷作田畒以刀筆作耒耜以文書作農桑猶家人子弟生長狎習具知曲折愈於賔客雖孔墨之才不能分别手中無錢而欲市貨貨主死不與之胸中無學而欲求仕猶無錢市貨不可得也知古不知今謂之陸沈知今不知古謂之盲瞽見驥足不異衆馬之蹄躡平陸而馳千里方可知也有人於此其智如源其德如山力不能自舉須人舉之人莫之舉竄於閭巷無由達矣器空無食飢者不顧胷虚無懷朝廷不御蘭臺之吏班固賈逵揚雄傅毅之徒名芳文美無大用也夫能説一經者儒生博覽古今者通人採掇書傳能奏記者文人能精思著文結連篇章者鴻儒若劉子政父揚子雲桓君山之徒猶文武周公並出一時班叔皮續太史公書百篇已上紀事詳悉讀者以謂甲子以太史公作已子孟堅文比叔皮非徒五百里也龜三百歲大如錢蓍七十歲生一莖此神物故生遲生亦長久賢儒在世猶靈蓍神龜也楓桐之樹生而速長故其皮肥不能堅檀欒後榮强勁可作車軸湍瀨迴沙轉石而大石不動者是石重而沙輕大儒俗吏同在世有如此也上天之心在聖人之胷其譴告在聖人之口世無聖人安能知天人在天地之間如蚤蝨在衣裳之内若螻蟻於巢穴之中正朝占四方風從南來旱從北來湛從東來疫從西來兵秦將滅都門崩霍光亦敗茅墻亦壞杞梁之妻崩城何也亡獵犬於山林大呼犬名則號呼而應人犬異類而相應者識其主也東風至酒湛溢按酒味從酸東方木其味酸故酒湛溢將有赦獄鑰動感應也蠶合絲而商絃易新穀登而舊穀缺按子生而父母氣衰亂龍者亂有終也劉子政董仲舒説龍不盡論衡終之故曰亂龍釣者刻木作魚丹漆其身迎水浮之起水動作魚謂之真並來會聚土龍之事何得不能致雨少政卯在魯與孔子並孔子之門三盈三虚唯顔淵不去知孔子聖也屈軼生於庭見佞人則指必若如此舜何用令皋陶陳知人之術堯湯水旱豈二聖政所致也天理曆數自然耳猶慈父治家亦不能使子孫皆孝也瑯琊兄子明兄曾爲饑人欲食弟自縛叩頭代兄饑人善其義皆舍之後兄卒養其孤遇歲凶饑殺己子活兄之子臨淮許君升亦餓殺己子全兄之孤人貴鵠賤鷄者謂鵠遠而鷄近也畫工好畫上古之人不畫秦漢之士者重古也揚雄作太玄法言張伯松不肯一觀與其人並肩故賤其言也若揚子雲生周金匱矣武王伐紂太公陰謀食小兒以丹令身赤長教言殷亡殷亡殷人見兒身赤謂是天神又言殷亡謂其必亡周人諱其事古之帝王建鴻德者須鴻筆之臣褒頌紀德也龍無雲雨不能參天鴻筆之人國之雲雨文章載人之行傳人之美豈徒調弄筆墨空馭英麗哉人生者精氣也能作精氣者血脉也人死血脉竭精氣亡骨肉化灰土何能作鬼耶若言死者無知聖人恐開不孝之門故不言死者無知其實無知也諱舉五月子言不利父母按田文不害田嬰礪刃井上恐墜井中又刀邊井刑字礪刀井上恐被刑人意也無偃寢象尸也無以著相受不固也子日沐令人愛卯日沐令人白頭愛憎白黑不由沐耳使嫫母子日沐人能愛乎使十五童子卯日沐能令白髮乎子路見孔子猪肩牛膊可以得兆何必蓍龜孔子曰蓍者耆也龜者舊也狐疑之事當問耆舊蓍龜者未可神也取其名耳武王伐紂上筮大凶太公推蓍蹈龜曰枯骨死草何能知吉凶乎商家門不冝向南徵家門不冝向北堂盡南向何不擇也聖人前知千歳後知萬世孔子將死遺書曰有一男子自云秦皇上我之牀顛倒我衣裳致沙丘而亡後秦皇果至沙丘而亡孔子又云董仲舒亂我書後仲舒論春秋著傳記又云亡秦者胡後胡亥亡秦此孔子後知萬世也吹律自知殷後此孔子前知千歲也唐者蕩蕩也民無得而名焉虞者樂也夏者大也殷中也周至也志有所存顧不見泰山知屋漏者在宇下知政安者在草野知纏者在諸子論衡者銓輕重立真僞非苟論文飾奇麗所以弘世俗也王充會稽上虞人字仲任充書形露易觀文語不與俗通石多玉寡寡者爲珍龍少魚衆少者爲神人有難充書繁重如此充答云文衆勝寡財富愈貧世無一引吾有百篇人無一字吾有萬言孰者可貴充章和二年徙家避難歷年寢廢年漸七十時可懸輿髮白齒落儔倫彌索貧無供養志不虞快乃作養性書六十篇正論五卷崔元始見信之臣括囊守禄踈遠之臣言以賤廢是以王綱縱弛於上智士伊鬱於下夫君政陵遲如乘弊車若能求巧工使葺理之折則接之緩則揳之可復新矣世主莫不願得尼軻以輔佐及得之未必珍也夫貞一之士不曲道以媚時不詭行以邀名恥郷原之譽絶比周之黨必待題其面曰魯仲尼鄒孟軻不可得也命世之士常抑於當時無不見思於後日以往揆來亦何容易圖王不成弊猶足霸圖霸不成弊將如何農桑勤而利薄工商逸而利厚故農夫輟耒而彫鏤女工投杼而刺繡上行下效然謂之教陳兵策於安平之世譬令未病者服藥昔人有慕讓財之名推田業與弟俄而貧乏反以威力就弟强貸此不當也舉彌天之網以羅海内之士同類翕集而蛾附計士頻踧而脅從黨成於下君孤於上馬不素養難以追遠士不素簡難以趨急葉公之好攘羊雖可發姦君子不貴也國不信道工不信度亡可待也無賞罰之君而欲世治猶不著梳櫛而求髮治不可得也術家曰冬榮者春必殺里語曰州郡記如霹靂得詔書但掛壁洗濯民心湔浣浮俗潜夫論十卷王符字節信仁義不能月昇財帛而欲日增余所惡也一犬吠形百犬吠聲世之疾此固已矣嬰兒有常病貴臣有常禍父母有常失人君有常過嬰兒病飽貴臣傷寵父母失於媚子人君過於驕臣十步之間必有茂草十室之邑必有俊士攻玉以石治金以鹽濯錦以魚濯布以灰夫物固有醜治好也君之明者兼聽所暗者信南面之大務莫急於知賢知賢之近塗莫若於考功諺曰曲木惡直繩重罰惡明政欲知人將病不嗜食欲知國將亡不嗜賢也病非無嘉饌病不能食至於死國非無賢人君不能用故速亡理世不得真賢猶治病不得真藥治病當得真人參反得蘿菔服之增劇非藥無効也先世欲赦先遣馬分行市里聽乎路隅咸云當赦是謂天赦遂乃施行孝明帝嘗問曰今旦何故無上書者左右曰爲反支日也帝曰民庶遠來詣闕不可奪其日使受章者無避反支此明王謂民愛日也聖王之政普覆兼愛不私近密不忽踈遠吉凶禍福與民同之排簾障風探沙擁河無益於事徒自弊耳猶不命大將掃除醜虜而州縣興兵不息也扁鵲治病審閉結而通鬱滯虚者補之實者瀉之猶邊境犬羊不可久荒以開敵心一宅同姓相代或吉或凶一官同姓相代或遷或免成康居之而興幽厲居之而衰吉凶興衰在人不由宅矣師曠曰赤色不壽姓大者易滅姓或有因官因號因居因地者司馬司徒中行下軍因官也東門西都南宫北郭因居也三烏五鹿青牛白馬因地也季勝造父以善御事周穆王穆王遊西海忘歸徐偃作亂造父王御者日行千里以征之王封造父於趙因以得氏昆弟世踈朋友世親此人情也富貴人争附之貧賤人争去之富貴交者上有稱舉之用下有貨財之益與貧賤交者大有賑貸之費小有假借之損夫官人有跖之惡結駟過士以謂榮況實有益乎處子有顔閔之賢被褐造門人以謂辱況實有損乎故富貴易爲容貧賤難得適好服謂之奢僣惡衣謂之困阨徐行謂之飢餧疾行謂之逃責不候謂之倨傲數來謂之求食空造以謂無意奉贄以謂欲貸恭謙以謂不肖抗陽以謂不德此處子貧賤之苦酷也凡今之人言方行圓口正心邪君上治世先其本後其未慎其心治其行則姦慝不生古訓著三皇五帝多以伏羲神農二皇其一或云燧人或云女媧我又聞古有天皇地皇人皇未可知也意林卷之三
